function saveCondBaseline(condId){
  const config=condId==='parkinsons'?PARKINSONS_CONFIG:DIABETES_CONFIG;
  const cid=S.activeClientId||'default';
  const key='cond_'+condId+'_'+cid;
  const bl={date:todayISO(),setBy:S.user.name,notes:document.getElementById('cbl-notes-'+condId)?.value||''};
  config.categories.forEach(cat=>{
    const el=document.getElementById('cbl-'+condId+'-'+cat.key);
    if(el&&el.value) bl[cat.key]=el.value;
    const ni=document.getElementById('cbl-num-'+condId+'-'+cat.key);
    if(ni&&ni.value) bl[cat.key+'_num']=ni.value;
  });
  save(key+'_baseline',bl);
  toast('Baseline saved');
  S['cond_'+condId+'_section']=null;
  renderPage();
}

function saveCondObs(condId){
  const config=condId==='parkinsons'?PARKINSONS_CONFIG:DIABETES_CONFIG;
  const cid=S.activeClientId||'default';
  const key='cond_'+condId+'_'+cid;
  const baseline=load(key+'_baseline',null);
  const obs={id:condId+Date.now(),date:todayISO(),time:now(),by:S.user.name,timeOfDay:S['cond_'+condId+'_tod']||'',notes:document.getElementById('cobs-notes-'+condId)?.value||''};
  let hasData=false;
  config.categories.forEach(cat=>{
    const el=document.getElementById('cobs-'+condId+'-'+cat.key);
    if(el&&el.value){obs[cat.key]=el.value;hasData=true;}
    const ni=document.getElementById('cobs-num-'+condId+'-'+cat.key);
    if(ni&&ni.value){obs[cat.key+'_num']=ni.value;}
  });
  if(!hasData){toast('Please select at least one observation.');return;}
  const all=load(key+'_obs',[]);
  all.push(obs);
  save(key+'_obs',all);
  if(baseline){
    const changes=config.categories.filter(cat=>obs[cat.key]&&baseline[cat.key]&&obs[cat.key]!==baseline[cat.key]);
    if(changes.length>0) addNotif('[!] '+(config.label)+' CHANGE: '+(patientProfile.name||'Client')+'  -  '+(changes.map(c=>c.label).join(', '))+' changed from baseline.','all');
  }
  toast('Observation saved');
  S['cond_'+condId+'_section']=null;
  S['cond_'+condId+'_tod']='';
  S._condObsVals={};  // Clear saved form values after saving
  renderPage();
}

function renderCondObs(o,baseline,config){
  const changes=config.categories.filter(cat=>baseline&&o[cat.key]&&baseline[cat.key]&&o[cat.key]!==baseline[cat.key]);
  return `<div style="border:1px solid ${changes.length>0?'#e67e22':'var(--border)'};border-radius:var(--radius-sm);padding:10px;margin-bottom:8px">
    <div style="display:flex;justify-content:space-between;margin-bottom:6px">
      <div style="font-size:12px;font-weight:600;color:var(--text)">${formatDateNice(o.date)} - ${o.time}${o.timeOfDay?(" - "+o.timeOfDay):""}</div>
      <div style="font-size:11px;color:var(--text3)">${o.by}</div>
    </div>
    ${changes.length>0?'<div style="font-size:11px;color:#e67e22;margin-bottom:5px;font-weight:600">[!] '+changes.length+' change'+(changes.length>1?'s':'')+' from baseline</div>':'<div style="font-size:11px;color:var(--accent-light);margin-bottom:5px">Within baseline</div>'}
    ${config.categories.filter(cat=>o[cat.key]).map(cat=>{
      const changed=baseline&&baseline[cat.key]&&o[cat.key]!==baseline[cat.key];
      return '<div style="font-size:12px;color:'+(changed?'#e67e22':'var(--text2)')+'">'+cat.icon+' <strong>'+cat.label+':</strong> '+o[cat.key]+(o[cat.key+'_num']?' ('+o[cat.key+'_num']+')':'')+(changed?' <em style="font-size:10px">(was: '+baseline[cat.key]+')</em>':'')+'</div>';
    }).join('')}
    ${o.notes?`<div style="font-size:12px;color:var(--text2);margin-top:5px;padding:5px;background:var(--surface2);border-radius:4px;font-style:italic">"${o.notes}"</div>`:''}
  </div>`;
}

  </table>`:'<p style="color:#e67e22">No baseline assessment set.</p>'}
  <h2>Observation Summary</h2>
  ${observations.length===0?'<p>No observations recorded yet.</p>':`
  <table><tr><th>Date</th><th>Time</th><th>Time of Day</th><th>Changes from Baseline</th><th>By</th></tr>
  ${observations.map(o=>{
    const changes=config.categories.filter(cat=>baseline&&o[cat.key]&&baseline[cat.key]&&o[cat.key]!==baseline[cat.key]);
    return `<tr><td>${formatDateNice(o.date)}</td><td>${o.time}</td><td>${o.timeOfDay||' - '}</td><td class="${changes.length?'changed':'ok'}">${changes.length?''+changes.map(c=>c.label).join(', '):'Within baseline'}</td><td>${o.by}</td></tr>`;
  }).join('')}

  <h2>Detailed Observations</h2>
  ${observations.map(o=>{
    const changes=config.categories.filter(cat=>baseline&&o[cat.key]&&baseline[cat.key]&&o[cat.key]!==baseline[cat.key]);
    return `<div class="obs-card">
      <strong>${formatDateNice(o.date)} at ${o.time}${o.timeOfDay?(" - "+o.timeOfDay):""}</strong>  -  ${o.by}
      ${changes.length?`<div class="changed">Changes from baseline: ${changes.map(c=>c.label).join(', ')}</div>`:'<div class="ok">✓ All within baseline</div>'}

function saveGlucoseReading(){
  if(requiresClockIn()) return;
  
  const type=document.getElementById('glucose-type')?.value||'Random';
  const value=parseInt(document.getElementById('glucose-value')?.value);
  const note=document.getElementById('glucose-note')?.value||'';
  if(!value||isNaN(value)){toast('Please enter a glucose reading.');return;}
  const cid=S.activeClientId||'default';
  const log=load('glucoseLog_'+cid,[]);
  const entry={id:'gluc'+Date.now(),date:todayISO(),time:now(),by:S.user.name,type,value,note};
  log.push(entry);
  save('glucoseLog_'+cid,log);
  // Alert on concerning readings with full modal popup
  var glucoseLevel=null;
  if(value<70){
    addNotif('[!] LOW GLUCOSE: '+(patientProfile.name||'Client')+' '+value+' mg/dL ('+type+'). Treat immediately.','all');
    glucoseLevel='low';
  } else if(value>=250){
    addNotif('[!] VERY HIGH GLUCOSE: '+(patientProfile.name||'Client')+' '+value+' mg/dL ('+type+'). Contact physician.','all');
    glucoseLevel='veryhigh';
  } else if(value>=180){
    addNotif('[!] HIGH GLUCOSE: '+(patientProfile.name||'Client')+' '+value+' mg/dL ('+type+'). Monitor closely.','all');
    glucoseLevel='high';
  } else if(value>=126){
    addNotif('[Glucose] ELEVATED: '+(patientProfile.name||'Client')+' '+value+' mg/dL ('+type+').','all');
    glucoseLevel='elevated';
  } else {
    toast('Glucose reading saved — '+value+' mg/dL — Normal range');
  }
  // Show alert modal for concerning readings
  if(glucoseLevel){
    S.glucoseAlertModal={level:glucoseLevel,value:value,type:type};
  }
  document.getElementById('glucose-value').value='';
  document.getElementById('glucose-note').value='';
  if(glucoseLevel) renderShell();
  else renderPage();
}

function updateScale(idx,field,val){
  const cid=S.activeClientId||'default';

function renderGlucoseTrendGraph(){
  var cid=S.activeClientId||'default';
  var glucoseLog=load('glucoseLog_'+cid,[]);
  if(glucoseLog.length<2){
    return '<div style="font-size:12px;color:var(--text3);padding:8px 0">No glucose trend yet. Record at least 2 readings to see the trend.</div>';
  }
  var last=glucoseLog.slice(-14);
  var svgW=300, svgH=90, pad=24;
  var values=last.map(function(r){return r.value||0;});
  var maxV=Math.max.apply(null,values.concat([250]));
  var minV=Math.min.apply(null,values.concat([70]));
  var range=maxV-minV||1;

  function dotColor(v){
    if(v<70) return '#5b8dd9';
    if(v>=250) return 'var(--danger)';
    if(v>=180) return '#e8875a';
    if(v>=126) return '#e8c05a';
    return 'var(--accent)';
  }

  var pts=last.map(function(r,i){
    var x=pad+(i/(last.length-1||1))*(svgW-pad*2);
    var y=svgH-pad-((r.value-minV)/range)*(svgH-pad*2);
    return {x:x,y:y,r:r};
  });

  var polyline=pts.map(function(p){return p.x+','+p.y;}).join(' ');

  // Target range band (80-180)
  var yHigh=svgH-pad-((180-minV)/range)*(svgH-pad*2);
  var yLow=svgH-pad-((80-minV)/range)*(svgH-pad*2);
  var bandH=Math.max(0,yLow-yHigh);

  var dots=pts.map(function(p){
    var col=dotColor(p.r.value);
    var label=p.r.date?p.r.date.slice(5):'';
    return '<circle cx="'+p.x+'" cy="'+p.y+'" r="4" fill="'+col+'" />'      +'<text x="'+p.x+'" y="'+(p.y-8)+'" text-anchor="middle" font-size="9" fill="var(--text2)">'+p.r.value+'</text>'      +'<text x="'+p.x+'" y="'+(svgH-4)+'" text-anchor="middle" font-size="8" fill="var(--text3)">'+label+'</text>';
  }).join('');

  // Trend calculation
  var recent=values.slice(-5);
  var avg=recent.reduce(function(a,b){return a+b;},0)/(recent.length||1);
  var trend=avg<126?'✓ In range':avg<180?'↑ Elevated':'⬆ High';
  var trendCol=avg<126?'var(--accent)':avg<180?'#e8875a':'var(--danger)';

  return '<div style="margin-top:8px">'    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">'    +'<span style="font-size:12px;font-weight:600;color:var(--text)">Glucose Trend ('+last.length+' readings)</span>'    +'<span style="font-size:12px;font-weight:700;color:'+trendCol+'">'+trend+' avg '+Math.round(avg)+'</span>'    +'</div>'    +'<svg width="100%" viewBox="0 0 '+svgW+' '+svgH+'" style="overflow:visible">'    +'<rect x="'+pad+'" y="'+yHigh+'" width="'+(svgW-pad*2)+'" height="'+bandH+'" fill="rgba(91,188,176,0.1)" />'    +'<polyline points="'+polyline+'" fill="none" stroke="#5b8dd9" stroke-width="2" stroke-linejoin="round"/>'    +dots    +'</svg>'    +'<div style="display:flex;gap:8px;font-size:10px;color:var(--text3);margin-top:2px;flex-wrap:wrap">'    +'<span style="color:var(--accent)">● Normal</span>'    +'<span style="color:#e8c05a">● Elevated</span>'    +'<span style="color:#e8875a">● High</span>'    +'<span style="color:var(--danger)">● Very High</span>'    +'<span style="color:#5b8dd9">● Low</span>'    +'<span style="color:rgba(91,188,176,0.4)">■ Target range</span>'    +'</div>'    +'</div>';
}

  </div>`;

  var glucoseTrendCard=`
  <div class="card">
    <div class="card-title" style="margin-bottom:4px"><i class="ti ti-trending-up" style="color:#5b8dd9"></i> Glucose Trend</div>
    ${renderGlucoseTrendGraph()}
  </div>`;

  return threshCard + glucoseCard + glucoseTrendCard + renderConditionTracker(config);
}

function toggleVoice(targetId){
  if(S.recording&&S.recordTarget===targetId){
    if(S.recognizer){try{S.recognizer.stop();}catch(e){}}
    S.recognizer=null;S.recording=false;S.recordTarget=null;
    // Remove interim placeholder
    var el=document.getElementById(targetId);
    if(el&&el._voiceBase!==undefined){el.value=el._voiceBase;delete el._voiceBase;}
    renderPage();return;
  }
  if(S.recognizer){try{S.recognizer.stop();}catch(e){}}
  if(!('webkitSpeechRecognition' in window||'SpeechRecognition' in window)){
    toast('Voice input needs Chrome browser.');return;
  }
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  const rec=new SR();
  rec.lang='en-US';
  rec.continuous=true;
  rec.interimResults=true;  // Show text AS you speak
  rec.maxAlternatives=1;
  S.recording=true;S.recordTarget=targetId;S.recognizer=rec;
  // Update button without full re-render to keep mic active
  var btn=document.querySelector('.voice-btn');
  if(btn){btn.classList.add('listening');}
  // Update all voice buttons for this target
  document.querySelectorAll('.voice-btn').forEach(function(b){
    if(b.onclick&&b.onclick.toString().includes(targetId)){
      b.classList.add('listening');
      b.innerHTML='<i class="ti ti-microphone" style="color:var(--danger)"></i> Listening...';
    }
  });
  renderPage();
  rec.onresult=function(e){
    var interim='';
    var el=document.getElementById(targetId);
    if(!el) return;
    // Save base text before interim
    if(el._voiceBase===undefined) el._voiceBase=el.value;
    for(var i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal){
        el._voiceBase=(el._voiceBase?el._voiceBase+' ':'')+e.results[i][0].transcript;
        interim='';
      } else {
        interim+=e.results[i][0].transcript;
      }
    }
    // Show base + interim in real time
    el.value=el._voiceBase+(interim?' '+interim:'');
    el.dispatchEvent(new Event('input'));
    // Auto-scroll to bottom
    el.scrollTop=el.scrollHeight;
  };
  rec.onerror=function(err){
    if(err.error==='no-speech') return;
    S.recording=false;S.recordTarget=null;S.recognizer=null;
    toast('Voice stopped: '+err.error);renderPage();
  };
  rec.onend=function(){
    if(S.recording&&S.recordTarget===targetId){
      try{rec.start();}catch(e){S.recording=false;S.recordTarget=null;S.recognizer=null;renderPage();}
    }
  };
  try{rec.start();}catch(e){toast('Could not start voice input.');S.recording=false;S.recordTarget=null;S.recognizer=null;renderPage();}
}

document.addEventListener('DOMContentLoaded',function(){
try{
  render();
}catch(e){
  console.error('App error:',e);
  var d=document.getElementById('app');
  if(d){
    d.style.padding='20px';
    d.style.color='red';
    d.style.fontFamily='Arial';
    var h=document.createElement('h3');
    h.textContent='App Error';
    var p=document.createElement('p');
    p.textContent=e.message;
    var b=document.createElement('button');
    b.textContent='Reset app';
    b.onclick=function(){localStorage.clear();location.reload();};
    d.innerHTML='';
    d.appendChild(h);
    d.appendChild(p);
    d.appendChild(b);
  }
}
});
// Check for overdue medications every 5 minutes
setInterval(()=>{if(S.user) checkMedAlerts();},5*60*1000);
