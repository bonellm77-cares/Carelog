// -- VERSION  -  bump this with every GitHub upload -------------
const APP_VERSION='1.1.3';
(function(){
  const prev=localStorage.getItem('appVersion');
  if(prev&&prev!==APP_VERSION){
    console.log('Stewards of Care: updated '+prev+' → '+APP_VERSION);
  }
  localStorage.setItem('appVersion',APP_VERSION);
  // Unregister any service workers and clear caches so phone gets fresh code
  if('serviceWorker' in navigator){
    navigator.serviceWorker.getRegistrations().then(r=>r.forEach(reg=>reg.unregister()));

<script>
// Persist to localStorage
function save(key,val){try{localStorage.setItem('cl_'+key,JSON.stringify(val));}catch(e){}}
function load(key,def){try{const v=localStorage.getItem('cl_'+key);return v?JSON.parse(v):def;}catch(e){return def;}}

// -- DATE/TIME UTILITIES  -  must be defined early ------------------
function now(){
  const d=new Date();
  return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
}
function todayISO(){
  // Use LOCAL date (not UTC) so midnight doesn't flip to next day in US timezones
  return localDateStr(new Date());
}
function localDateStr(d){
  // Convert any Date to YYYY-MM-DD using LOCAL timezone (not UTC)
  var yr=d.getFullYear();
  var mo=String(d.getMonth()+1).padStart(2,'0');
  var dy=String(d.getDate()).padStart(2,'0');
  return yr+'-'+mo+'-'+dy;
}
function today(){
  return todayISO();
}

// -- CLIENT REGISTRY ----------------------------------------------
let CLIENTS=load('clients',[]);
function saveClients(){save('clients',CLIENTS);}
function getActiveClient(){
  if(typeof S==='undefined'||!S.activeClientId) return null;
  return CLIENTS.find(c=>c.id===S.activeClientId)||null;
}

// Migrate existing data to a default client on first run
function migrateToMultiClient(){
  if(load('clientsMigrated',false)) return;
  const existing=load('patientProfile',null);
  const defaultClient={
    id:'client-default',
    name:existing&&existing.name?existing.name:'Default Client',
    dob:existing&&existing.dob?existing.dob:'',
    room:existing&&existing.room?existing.room:'',
    diagnosis:existing&&existing.diagnosis?existing.diagnosis:'',
    allergies:existing&&existing.allergies?existing.allergies:'',
    terminology:existing&&existing.terminology?existing.terminology:'Patient',
    fluidGoalOz:existing&&existing.fluidGoalOz?existing.fluidGoalOz:64,
    primaryDoc:existing&&existing.primaryDoc?existing.primaryDoc:{name:'',specialty:'',phone:'',fax:'',address:''},
    specialists:existing&&existing.specialists?existing.specialists:[],
    emergencyContacts:existing&&existing.emergencyContacts?existing.emergencyContacts:[],
    insurance:existing&&existing.insurance?existing.insurance:{provider:'',policyNum:'',groupNum:''},
    notes:existing&&existing.notes?existing.notes:'',
    createdAt:today()
  };
  CLIENTS=[defaultClient];
  saveClients();
  // Tag all existing logs with default client
  const allLogs=load('logs',[]);
  const tagged=allLogs.map(l=>({...l,clientId:'client-default'}));
  save('logs',tagged);
  save('clientsMigrated',true);
}

// Dynamic caregiver registry stored on device
let CAREGIVERS=load('caregivers',[]);
function saveCaregiver(cg){
  const i=CAREGIVERS.findIndex(c=>c.id===cg.id);
  if(i>=0)CAREGIVERS[i]=cg;else CAREGIVERS.push(cg);
  save('caregivers',CAREGIVERS);
}
function getInitials(name){return name.trim().split(' ').map(w=>w[0]||'').join('').toUpperCase().slice(0,2);}

// Run migration
migrateToMultiClient();

let S={
  user:null,
  tab:'log',
  activeClientId:load('lastClientId',CLIENTS.length===1?CLIENTS[0].id:null),
  logs:[],

    meal:{type:'Breakfast',items:'',amount:'Full portion',note:'',foodItems:[],newItemPortion:'All of it'},

// Load today's logs for the active client
function loadTodayLogs(){
  const td=todayISO();
  const cid=S.activeClientId;
  const allLogs=load('logs',[]);
  S.logs=allLogs.filter(l=>{
    const dateMatch=!l.date||l.date===td||l.date===today();
    const clientMatch=!cid||!l.clientId||l.clientId===cid;
    return dateMatch&&clientMatch;
  });
}

function saveLogs(){
  const td=todayISO();
  const cid=S.activeClientId;
  const allLogs=load('logs',[]);
  // Remove today's logs for this client, then re-add from S.logs
  const historical=allLogs.filter(l=>{
    const isToday=l.date===td||l.date===today();
    const isThisClient=!l.clientId||l.clientId===cid;
    return !(isToday&&isThisClient);
  });
  save('logs',[...historical,...S.logs]);
  save('notifs',S.notifications);
}

// Client-scoped storage helpers
function clientKey(key){return S.activeClientId?key+'_'+S.activeClientId:key;}
function loadForClient(key,def){return load(clientKey(key),def);}
function saveForClient(key,val){save(clientKey(key),val);}

function formatDateNice(d){
  try{
    if(!d) return 'Unknown date';
    const td=todayISO();
    if(d===td) return 'Today';
    let obj;
    if(/^\d{4}-\d{2}-\d{2}$/.test(d)){
      obj=new Date(d+'T12:00:00');
    } else {
      obj=new Date(d+', '+new Date().getFullYear());
      if(isNaN(obj.getTime())) obj=new Date(d+' '+new Date().getFullYear());
      if(isNaN(obj.getTime())) return d;
    }
    if(isNaN(obj.getTime())) return d;
    const yesterday=new Date();yesterday.setDate(yesterday.getDate()-1);
    if(obj.toDateString()===yesterday.toDateString()) return 'Yesterday';
    return obj.toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'});
  } catch(e){ return d||'Unknown date'; }
}

function toast(msg){
  const t=document.getElementById('toast');
  if(!t) return;
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

function myNotifs(){
  if(!S.user) return [];
  return S.notifications.filter(n=>n.forUser==='all'||n.forUser===S.user.id);
}
function unreadCount(){return myNotifs().filter(n=>!n.read).length;}

function addNotif(text,forUser){
  S.notifications.push({id:'n'+Date.now()+Math.random(),text,time:now(),date:today(),read:false,forUser});
  saveLogs();
}

const app=document.getElementById('app');
function uploadLogo(input){
  var f=input.files[0];
  if(!f) return;
  var r=new FileReader();
  r.onload=function(ev){
    localStorage.setItem('cl_customLogo',ev.target.result);
    location.reload();
  };
  r.readAsDataURL(f);
}

function removeLogo(){
  localStorage.removeItem('cl_customLogo');
  location.reload();
}

function render(){
  if(!S.user){
    const saved=load('session',null);
    if(saved&&saved.id){
      const cg=CAREGIVERS.find(c=>c.id===saved.id);
      if(cg){
        S.user=cg;
        S.tab=saved.tab||'vitals';
        S.activeClientId=saved.clientId||load('lastClientId',null);
        const existing=load('shiftStart','');
        if(existing&&existing.caregiver===cg.name&&!existing.clockedOut){
          S.shiftStart=existing;
        }
        if(S.activeClientId){
          loadClientProfile();
          // Restore section lock state for this client
          const lockKey='profileSectionLocked_'+S.activeClientId;
          S.profileSectionLocked=load(lockKey,{});
        }
      }
    }
  }
  if(!S.user){renderAuth();return;}
  // Must select a client before proceeding
  if(!S.activeClientId||!CLIENTS.find(c=>c.id===S.activeClientId)){
    renderClientSelect();return;
  }
  loadTodayLogs();
  renderShell();
}

function selectClient(clientId,goToTab){
  S.activeClientId=clientId;
  save('lastClientId',clientId);
  // Always go to patient profile  -  force it in both state AND session
  const targetTab=goToTab||'patient';
  S.tab=targetTab;
  // Persist to session so render() restores correctly after any re-render
  const sess=load('session',null);
  if(sess) save('session',{...sess,clientId,tab:targetTab});
  else save('session',{clientId,tab:targetTab});
  loadTodayLogs();
  loadClientProfile();
  // Reset per-client state
  S.showClientInfo=false;
  S.adlMode='choose';
  S.adlBaselineForm={};
  S.fallMode='choose';
  S.fallBaseline=null;
  S.fallForm=null;
  S.profileEditMode=false;
  S.profileSectionLocked={};
  // Use setTimeout to ensure state is fully set before rendering
  setTimeout(()=>{
    S.tab=targetTab; // Re-assert tab after any async operations
    renderShell();
  },0);
}

// Explicit switch  -  also goes to patient profile
function switchClient(clientId){
  selectClient(clientId,'patient');
}

function addClient(){
  const name=document.getElementById('new-client-name')?.value?.trim();
  if(!name){toast('Please enter client name.');return;}
  const term=document.getElementById('new-client-term')?.value||'Patient';
  const room=document.getElementById('new-client-room')?.value?.trim()||'';
  const client={
    id:'client-'+Date.now(),
    name,terminology:term,room,
    dob:'',diagnosis:'',allergies:'',
    diagnoses:[],cognitiveType:'',
    fluidGoalOz:64,
    primaryDoc:{name:'',specialty:'',phone:'',fax:'',address:''},
    specialists:[],emergencyContacts:[],
    insurance:{provider:'',policyNum:'',groupNum:''},
    notes:'',createdAt:todayISO()
  };
  CLIENTS.push(client);
  saveClients();
  // Set as active client
  S.activeClientId=client.id;
  save('lastClientId',client.id);
  const sess=load('session',null);
  if(sess) save('session',{...sess,clientId:client.id});
  loadTodayLogs();
  loadClientProfile();
  // Go straight to patient profile to fill in details
  S.tab='patient';
  toast(''+name+' added  -  please complete their profile');
  renderShell();
}

function removeClient(clientId){
  const client=CLIENTS.find(c=>c.id===clientId);
  if(!client) return;
  const name=client.name;
  // Two-step confirmation for destructive action
  if(!confirm(`Remove "${name}" from your client list?\n\nThis will permanently delete ALL their data including:\n• All logs, vitals, meals, fluids\n• Medications and dose history\n• Cognitive, Parkinson's, Diabetes tracking\n• Patient profile and notes\n\nThis CANNOT be undone.`)) return;
  if(!confirm(`Final confirmation: permanently delete ALL data for "${name}"?`)) return;
  // Wipe all client-specific data
  const keysToWipe=[
    'logs','patientProfile','bpThresholds','dietProfile',
    'medications','doseLog',
    'dailyMeds_'+clientId,
    'pillboxLog_'+clientId,
    'dailyDoseLog_'+clientId,
    'missedMedLog_'+clientId,
    'calendarEvents','cog_baseline','cog_obs',
    'cond_parkinsons','cond_diabetes','glucoseLog',
    'adlBaseline_'+clientId,'fallBaseline_'+clientId
  ];
  keysToWipe.forEach(k=>{
    // Delete client-scoped key (key_clientId)
    localStorage.removeItem('cl_'+k+'_'+clientId);
  });
  // Remove from logs array (filter out this client's entries)
  const allLogs=load('logs',[]);
  save('logs',allLogs.filter(l=>l.clientId!==clientId));
  // Remove from client list
  CLIENTS=CLIENTS.filter(c=>c.id!==clientId);
  saveClients();
  toast(''+name+' and all their data removed');
  if(S.activeClientId===clientId){
    S.activeClientId=null;
    save('lastClientId',null);
    renderClientSelect();
  } else renderPage();
}

// Load client profile into patientProfile global
function loadClientProfile(){
  const client=getActiveClient();
  if(!client) return;
  // Fully replace patientProfile with this client's data
  // Don't merge - merging causes previous client's data to bleed through
  patientProfile={
    terminology:client.terminology||'Patient',
    name:client.name||'',
    dob:client.dob||'',
    room:client.room||'',
    diagnosis:client.diagnosis||'',
    allergies:client.allergies||'',
    diagnoses:client.diagnoses||[],
    cognitiveType:client.cognitiveType||'',
    fluidGoalOz:client.fluidGoalOz||64,
    primaryDoc:client.primaryDoc||{name:'',specialty:'Primary Care',phone:'',fax:'',address:''},
    specialists:client.specialists||[],
    emergencyContacts:client.emergencyContacts||[],
    insurance:client.insurance||{provider:'',policyNum:'',groupNum:''},
    notes:client.notes||'',
    // CRITICAL SAFETY FIELDS - must persist across logins
    dnrStatus:client.dnrStatus||'Not specified',
    fallRisk:client.fallRisk||'Not specified',
    dietPlan:client.dietPlan||'',
    dietaryRestrictions:client.dietaryRestrictions||'',
    foodRestrictions:client.foodRestrictions||[],
    medFoodRestrictions:client.medFoodRestrictions||[],
    otherDiagnoses:client.otherDiagnoses||'',
    language:client.language||'',
    documents:client.documents||[]
  };
}

function saveClientProfile(){
  const idx=CLIENTS.findIndex(c=>c.id===S.activeClientId);
  if(idx>=0){
    CLIENTS[idx]={...CLIENTS[idx],...patientProfile,id:S.activeClientId};
    saveClients();
  }
}

function toggleRememberMe(){
  const current=load('rememberedName','');
  if(current){save('rememberedName','');}
  else{const name=document.getElementById('login-name')?.value||S.regName||'';save('rememberedName',name);}
  renderAuth();
}

function doLogin(){
  const name=(document.getElementById('login-name')?.value||S.regName).trim();
  const pin=document.getElementById('login-pin')?.value||S.pinVal||'';
  if(!name){S.loginError='Please enter your name.';renderAuth();return;}
  if(!pin){S.loginError='Please enter your PIN.';renderAuth();return;}
  // Find by name (case-insensitive)
  const cg=CAREGIVERS.find(c=>c.name.toLowerCase()===name.toLowerCase());
  if(!cg){S.loginError='Name not found. Please create an account first.';renderAuth();return;}
  if(cg.pin!==pin){S.loginError='Incorrect PIN. Please try again.';renderAuth();return;}
  S.user=cg;S.loginError='';S.regName='';S.showPin=false;S.pinVal='';
  // Reset all form state - fresh start for each caregiver login
  S.form={
    vitals:{bp:'',pulse:'',temp:'',o2:'',weight:'',glucose:'',glucoseType:'Fasting',note:''},
    meal:{type:'',overall:'Full portion',note:'',foodItems:[],selectedFoods:[],mealMode:'foods'},
    fluid:{type:'Water',amount:'',unit:'oz',note:''},
    note:{text:'',visibility:'all',target:''},
    mileage:{miles:'',purpose:'',rate:'0.67'},
    adl:{},shower:{},
    bm:{occurred:null,consistency:'Normal',note:''}
  };
  S.medCheckinOpen=null;
  S.condCheckinOpen=null;
  S.dietFoodOpen=null;
  S.bpAlertModal=null;
  S.glucoseAlertModal=null;
  S.foodAlertModal=null;
  S.showMedUnlockModal=false;
  // Clear any med manager override - each session must be re-authorized
  if(cg.role!=='Lead Caregiver'&&cg.role!=='Care Manager'){
    save('medMgrOverride',null);
  }
  // Load this caregiver's accessibility preferences
  const accPrefs=load('accessibility_'+cg.id,{adhdMode:false,dyslexiaMode:false});
  S.adhdMode=accPrefs.adhdMode||false;
  S.dyslexiaMode=accPrefs.dyslexiaMode||false;
  S.tab='vitals';
  S.activeClientId=load('lastClientId',CLIENTS.length===1?CLIENTS[0].id:null);
  save('session',{id:cg.id,name:cg.name,tab:'vitals',clientId:S.activeClientId});
  const remembered=load('rememberedName','');
  if(remembered) save('rememberedName',cg.name);
  const existing=load('shiftStart','');
  if(existing&&existing.caregiver===cg.name&&!existing.clockedOut){
    S.shiftStart=existing;
  } else {
    S.shiftStart='';
  }
  if(S.activeClientId) loadClientProfile();
  // Reload notifications in case other caregiver added notes since page loaded
  S.notifications=load('notifs',[]);
  render();
  // Alert incoming caregiver about unread notifications
  setTimeout(function(){
    var myId=cg.id;
    var unread=S.notifications.filter(function(n){
      return !n.read&&(n.forUser==='all'||n.forUser===myId);
    });
    var noteUnread=unread.filter(function(n){return n.text&&n.text.toLowerCase().indexOf('note')>=0;});
    if(noteUnread.length>0||unread.length>0){
      // Show persistent acknowledgment modal instead of fleeting toast
      S.loginNotifModal={
        notes:noteUnread,
        allUnread:unread,
        caregiver:cg.name
      };
      renderShell();
    }
  },900);
}

function clockInSilent(cg){
  const shiftIn={caregiver:cg.name,time:now(),date:today(),timestamp:Date.now(),clockedOut:false,clockOutTime:null,clockOutTimestamp:null};
  S.shiftStart=shiftIn;save('shiftStart',shiftIn);
}

function clockIn(){
  clockInSilent(S.user);
  toast('Clocked in at '+now());renderShell();
}

function clockOut(){
  if(!S.shiftStart||S.shiftStart.clockedOut){toast('Not clocked in.');return;}

  const todayLogs=S.logs;
  const hasVitals=todayLogs.some(l=>l.type==='vitals');
  const hasMeal=todayLogs.some(l=>l.type==='meal');
  const hasFluid=todayLogs.some(l=>l.type==='fluid');
  const hasADL=todayLogs.some(l=>l.type==='adl');
  const hasBM=todayLogs.some(l=>l.type==='bm');

  const goal=patientProfile.fluidGoalOz||64;
  const totalOz=todayLogs.filter(l=>l.type==='fluid').reduce((sum,l)=>{
    if(l.data.ozVal) return sum+l.data.ozVal;
    const amtStr=l.data.amount||'';
    const ozMatch=amtStr.match(/(\d+\.?\d*)\s*oz/);
    if(ozMatch) return sum+parseFloat(ozMatch[1]);
    let amt=0;
    if(amtStr.includes('½')&&amtStr.includes('1'))amt=1.5;
    else if(amtStr.includes('½'))amt=0.5;
    else amt=parseFloat(amtStr)||0;
    if(l.data.unit==='cups'||amtStr.includes('cup')) return sum+(amt*8);
    return sum+amt;
  },0);

  const meds=load('medications',[]);
  const outTs=Date.now();
  const doseLog=load('doseLog',{});
  const upcomingMeds=[];
  const missedMeds=[];

  meds.filter(m=>m.active).forEach(med=>{
    (med.times||[]).forEach(t=>{
      const doseMs=parseTimeToMs(t);
      if(!doseMs) return;
      const key=today()+'-'+med.id+'-'+t;
      const given=doseLog[key];
      const diffMins=(doseMs-outTs)/60000;
      const overdueMins=(outTs-doseMs)/60000;
      if(!given&&diffMins>0&&diffMins<=120){
        upcomingMeds.push({med,time:t,minsAway:Math.round(diffMins)});
      }
      if(!given&&overdueMins>15){
        missedMeds.push({med,time:t,minsAgo:Math.round(overdueMins)});
      }
    });
  });

  // Check for incomplete calendar events today
  const events=load('calendarEvents',[]);
  const eventLog=load('eventLog',{});
  const todayEvents=events.filter(e=>{
    const eDate=e.date||'';
    return eDate===todayISO()&&(e.assignee==='All caregivers'||e.assignee===S.user.name||!e.assignee);
  });
  const incompleteEvents=todayEvents.filter(e=>{
    const status=eventLog[todayISO()+'-'+e.id];
    return !status; // not yet marked complete or incomplete
  });

  const missing=[];
  if(!hasVitals) missing.push('Vitals not logged');
  if(!hasMeal) missing.push('No meals logged');
  if(!hasFluid) missing.push('No fluids logged');
  if(!hasADL) missing.push('ADLs not completed');
  if(!hasBM) missing.push('BM not recorded');
  if(totalOz<goal) missing.push(`Fluid goal not met: ${totalOz.toFixed(0)} of ${goal} oz`);
  missedMeds.forEach(({med,time,minsAgo})=>{
    missing.push(`MISSED: ${med.name} ${med.dose} was due at ${time} (${minsAgo} min ago)`);
  });

  S.clockOutModal={show:true,missing,upcomingMeds,missedMeds,incompleteEvents,passedOn:{},passOnTarget:{},expandedPassOn:null};
  renderShell();
}

function markEventDone(eventId){
  const log=load('eventLog',{});
  log[todayISO()+'-'+eventId]={status:'completed',by:S.user.name,time:now()};
  save('eventLog',log);
  // Remove from incompleteEvents in modal
  if(S.clockOutModal.incompleteEvents){
    S.clockOutModal.incompleteEvents=S.clockOutModal.incompleteEvents.filter(e=>e.id!==eventId);
  }
  toast('Event marked as completed');
  renderShell();
}

function markEventMissed(eventId){
  const events=load('calendarEvents',[]);
  const event=events.find(e=>e.id===eventId);
  const log=load('eventLog',{});
  log[todayISO()+'-'+eventId]={status:'missed',by:S.user.name,time:now()};
  save('eventLog',log);
  if(S.clockOutModal.incompleteEvents){
    S.clockOutModal.incompleteEvents=S.clockOutModal.incompleteEvents.filter(e=>e.id!==eventId);
  }
  if(event) addNotif('[!] EVENT NOT COMPLETED: "'+(event.title)+'" was not done this shift. Logged by '+(S.user.name)+' at '+(now())+'.','all');
  toast('Event marked as not completed  -  team alerted');
  renderShell();
}

function getTodayEventStatus(eventId){
  const log=load('eventLog',{});
  return log[todayISO()+'-'+eventId]||null;
}

function markEventCompleteFromLog(eventId){
  markEventDone(eventId);
  renderPage();
}

function togglePassOnExpand(i){
  S.clockOutModal.expandedPassOn=S.clockOutModal.expandedPassOn===i?null:i;
  if(!S.clockOutModal.passOnTarget) S.clockOutModal.passOnTarget={};
  if(!S.clockOutModal.passOnTarget[i]) S.clockOutModal.passOnTarget[i]='all';
  renderShell();
}

function setPassOnTarget(i,target){
  if(!S.clockOutModal.passOnTarget) S.clockOutModal.passOnTarget={};
  S.clockOutModal.passOnTarget[i]=target;
  renderShell();
}

function getDefaultPassOnNote(missing){
  const m=missing.toLowerCase();
  if(m.includes('fluid')){
    const goal=patientProfile.fluidGoalOz||64;
    const total=S.logs.filter(l=>l.type==='fluid').reduce((sum,l)=>{
      const ozMatch=(l.data.amount||'').match(/(\d+\.?\d*)\s*oz/);
      return sum+(ozMatch?parseFloat(ozMatch[1]):0);
    },0);
    const rem=Math.max(0,goal-total);
    return `${rem} oz of fluids remaining to meet daily goal of ${goal} oz. Please continue offering fluids.`;
  }
  if(m.includes('vitals')) return 'Vitals were not recorded this shift. Please log BP, pulse and other vitals.';
  if(m.includes('meal')||m.includes('meals')) return 'Meals were not logged this shift. Please document all food intake.';
  if(m.includes('adl')) return 'ADLs were not logged this shift. Please document activities of daily living.';
  if(m.includes('bm')) return 'Bowel movement was not recorded. Please monitor and log.';
  return missing+'  -  please follow up this shift.';
}

function submitPassOn(i,itemLabel){
  const note=document.getElementById('passOn-note-'+i)?.value?.trim();
  if(!note){toast('Please enter a pass-on note.');return;}
  const target=(S.clockOutModal.passOnTarget||{})[i]||'all';
  if(!S.clockOutModal.passedOn) S.clockOutModal.passedOn={};
  S.clockOutModal.passedOn[i]={note,target,item:itemLabel};
  S.clockOutModal.expandedPassOn=null;
  // Create handoff notification
  const notifText=`HANDOFF from ${S.user.name}: ${note}${target!=='all'?' → '+target:''}`;
  addNotif(notifText,target==='all'?'all':target);
  // Also log to shift notes
  S.logs.push({id:Date.now(),type:'note',date:today(),time:now(),clientId:S.activeClientId,
    caregiver:S.user.name,data:{category:'Handoff'},
    note:`HANDOFF NOTE (to ${target}): ${note}`});
  saveLogs();
  toast('Pass-on note sent to '+target);
  renderShell();
}

function dismissClockOutModal(){
  S.clockOutModal={show:false};
  renderShell();
}

function confirmClockOut(){
  S.clockOutModal={show:false};
  const outTime=now();const outTs=Date.now();
  S.shiftStart.clockedOut=true;
  S.shiftStart.clockOutTime=outTime;
  S.shiftStart.clockOutTimestamp=outTs;
  const history=load('shiftHistory',[]);
  const mins=Math.round((outTs-S.shiftStart.timestamp)/60000);
  history.push({...S.shiftStart,durationMins:mins});
  save('shiftHistory',history);
  save('shiftStart',S.shiftStart);

  // Auto pass-on notes for upcoming meds within 2 hours
  const meds=load('medications',[]);
  const doseLog2=load('doseLog',{});
  meds.filter(m=>m.active).forEach(med=>{
    (med.times||[]).forEach(t=>{
      const doseMs=parseTimeToMs(t);
      if(!doseMs) return;
      const diffMins=(doseMs-outTs)/60000;
      const key=today()+'-'+med.id+'-'+t;
      if(!doseLog2[key]&&diffMins>0&&diffMins<=120){
        S.logs.push({id:Date.now()+Math.random(),type:'note',date:today(),time:now(),clientId:S.activeClientId,caregiver:S.user.name,
          data:{text:`MEDICATION HANDOFF: ${med.name} ${med.dose} due at ${t} (in ~${Math.round(diffMins)} min). Please confirm given and log dose.`,visibility:'all',target:''},note:''});
        saveLogs();
      }
      // Also note missed doses
      const overdueMins=(outTs-doseMs)/60000;
      if(!doseLog2[key]&&overdueMins>15){
        S.logs.push({id:Date.now()+Math.random(),type:'note',date:today(),time:now(),clientId:S.activeClientId,caregiver:S.user.name,
          data:{text:`MISSED DOSE ALERT: ${med.name} ${med.dose} was due at ${t} and was NOT given this shift. Please follow up.`,visibility:'all',target:''},note:''});
        saveLogs();
      }
    });
  });

  // Medication given-status is stored in S.shiftStart.medsGiven
  // It resets automatically when the next caregiver clocks in (new shiftStart object)
  // No manual reset needed here

  toast('Clocked out at '+outTime+' - '+formatDuration(mins));
  renderShell();
}

function doRegister(){
  const name=(document.getElementById('reg-name')?.value||S.regName).trim();
  const role=document.getElementById('reg-role')?.value||S.regRole;
  const pin=document.getElementById('reg-pin')?.value||S.regPin;
  const pin2=document.getElementById('reg-pin2')?.value||S.regPin2;
  const question=document.getElementById('reg-question')?.value||S.regQuestion||"What is your mother's maiden name?";
  const answer=(document.getElementById('reg-answer')?.value||S.regAnswer||'').trim().toLowerCase();
  if(!name){S.loginError='Please enter your full name.';render();return;}
  if(pin.length<4){S.loginError='PIN must be at least 4 digits.';render();return;}
  if(pin!==pin2){S.loginError='PINs do not match.';render();return;}
  if(!answer){S.loginError='Please provide a security answer.';render();return;}
  if(CAREGIVERS.find(c=>c.name.toLowerCase()===name.toLowerCase())){
    S.loginError='That name already has an account. Go back and sign in.';render();return;
  }
  // First user to register is always Lead Caregiver (they're setting up the app)
  const effectiveRole = CAREGIVERS.length===0 ? 'Lead Caregiver' : role;
  const cg={id:'u'+Date.now(),name,role:effectiveRole,pin,initials:getInitials(name),secQuestion:question,secAnswer:answer};
  saveCaregiver(cg);
  S.user=cg;S.authMode='login';S.loginError='';S.regName='';S.regPin='';S.regPin2='';S.regQuestion='';S.regAnswer='';
  toast('Account created! Welcome, '+name.split(' ')[0]+'!');
  render();
}

function changePin(){
  const cur=document.getElementById('cur-pin')?.value||'';
  const p1=document.getElementById('new-pin1')?.value||'';
  const p2=document.getElementById('new-pin2')?.value||'';
  const msg=document.getElementById('pin-change-msg');
  if(cur!==S.user.pin){if(msg)msg.innerHTML='<div class="err-text">Current PIN is incorrect.</div>';return;}
  if(p1.length<4){if(msg)msg.innerHTML='<div class="err-text">New PIN must be at least 4 digits.</div>';return;}
  if(p1!==p2){if(msg)msg.innerHTML='<div class="err-text">New PINs do not match.</div>';return;}
  const idx=CAREGIVERS.findIndex(c=>c.id===S.user.id);
  if(idx>=0){CAREGIVERS[idx].pin=p1;save('caregivers',CAREGIVERS);S.user.pin=p1;}
  if(msg)msg.innerHTML='<div style="color:var(--accent-light);font-size:13px;margin-bottom:8px"><i class="ti ti-check"></i> PIN updated successfully!</div>';
  toast('PIN changed!');
}

function doResetStep1(){
  const name=(document.getElementById('reset-name')?.value||S.resetName||'').trim();
  if(!name){S.loginError='Please enter your name.';renderResetPin();return;}
  const cg=CAREGIVERS.find(c=>c.name.toLowerCase()===name.toLowerCase());
  if(!cg){S.loginError='No account found with that name.';renderResetPin();return;}
  if(!cg.secQuestion){S.loginError='This account has no security question set. Please ask your lead caregiver to remove and recreate your account.';renderResetPin();return;}
  S.resetName=name;S.resetCgId=cg.id;S.resetQuestion=cg.secQuestion;S.resetStep=2;S.loginError='';
  renderResetPin();
}

function doResetStep2(){
  const answer=(document.getElementById('reset-answer')?.value||S.resetAnswer||'').trim().toLowerCase();
  const cg=CAREGIVERS.find(c=>c.id===S.resetCgId);
  if(!cg){S.loginError='Account not found.';renderResetPin();return;}
  if(answer!==cg.secAnswer){S.loginError='Incorrect answer. Please try again.';renderResetPin();return;}
  S.resetAnswer=answer;S.resetStep=3;S.loginError='';
  renderResetPin();
}

function doResetStep3(){
  const pin=document.getElementById('reset-pin1')?.value||S.resetNewPin||'';
  const pin2=document.getElementById('reset-pin2')?.value||S.resetNewPin2||'';
  if(pin.length<4){S.loginError='PIN must be at least 4 digits.';renderResetPin();return;}
  if(pin!==pin2){S.loginError='PINs do not match.';renderResetPin();return;}
  const idx=CAREGIVERS.findIndex(c=>c.id===S.resetCgId);
  if(idx<0){S.loginError='Account not found.';renderResetPin();return;}
  CAREGIVERS[idx].pin=pin;
  save('caregivers',CAREGIVERS);
  S.authMode='login';S.loginError='';S.resetStep=1;S.resetName='';S.resetAnswer='';S.resetNewPin='';S.resetNewPin2='';S.resetCgId='';
  toast('PIN reset successfully! Please sign in.');
  render();
}

function goTab(t){
  S.tab=t;
  // Save current tab to session so refresh stays on same page
  const sess=load('session',null);
  if(sess) save('session',{...sess,tab:t});
  renderShell();
}

function toggleMore(){
  const overlay=document.getElementById('more-overlay');
  const sheet=document.getElementById('more-sheet');
  if(!overlay||!sheet) return;
  const isOpen=sheet.classList.contains('open');
  if(isOpen){closeMore();}
  else{overlay.classList.add('open');sheet.classList.add('open');}
}

function closeMore(){
  const overlay=document.getElementById('more-overlay');
  const sheet=document.getElementById('more-sheet');
  if(overlay) overlay.classList.remove('open');
  if(sheet) sheet.classList.remove('open');
}

function goTabFromMore(t){
  closeMore();
  setTimeout(()=>{
    S.tab=t;
    const sess=load('session',null);
    if(sess) save('session',{...sess,tab:t});
    renderShell();
  },180);
}

function renderPage(){
  const p=document.getElementById('page');
  const tabs={log:renderLog,vitals:renderVitals,adl:renderADL,meals:renderMeals,diet:renderDiet,fluid:renderFluid,hygiene:renderHygiene,notes:renderNotes,notif:renderNotif,patient:renderPatient,myprofile:renderMyProfile,report:renderReport,terms:renderTerms,calendar:renderCalendar,meds:renderMeds,dailymeds:renderDailyMeds,addmed:renderAddMed,cognitive:renderCognitive,parkinsons:renderParkinsons,diabetes:renderDiabetes,activities:renderActivities,wellness:renderWellness};
  try {
    const html=(tabs[S.tab]||renderLog)();
    if(html===undefined||html===null){
      console.error('renderPage: tab '+S.tab+' returned empty');
      return; // Don't blank the page
    }
    p.innerHTML=html;
    // Restore observation form values after re-render (preserves selections when tapping Time of Day etc.)
    if(S._condObsVals){
      Object.keys(S._condObsVals).forEach(function(elId){
        var el=document.getElementById(elId);
        if(el){
          if(el.tagName==='SELECT') el.value=S._condObsVals[elId];
          else if(el.tagName==='TEXTAREA') el.value=S._condObsVals[elId];
        }
      });
    }
  } catch(e) {
    console.error('renderPage error on tab '+S.tab+':', e);
    p.innerHTML='<div class="card"><p style="color:var(--danger)">Error loading page: '+e.message+'</p><button onclick="goTab(\'log\')">Go to Log</button></div>';
  }
}

// -- LOG TAB ------------------------------------------------------
function openEditLog(id){
  // Find in today's logs first, then all logs
  let entry=S.logs.find(l=>l.id===id);
  if(!entry){
    const allLogs=load('logs',[]);
    entry=allLogs.find(l=>l.id===id);
  }
  if(!entry){toast('Entry not found.');return;}
  S.editLogModal={...entry};
  renderShell();
}

function saveEditLog(){
  const m=S.editLogModal;
  if(!m){return;}
  const note=document.getElementById('edit-note')?.value?.trim();
  // Build updated data based on type
  const updated={...m,editedBy:S.user.name,editedAt:now()};
  if(m.type==='note'){updated.note=note;}
  else if(m.type==='vitals'){
    updated.data={...m.data,
      bp:document.getElementById('edit-bp')?.value||m.data?.bp||'',
      pulse:document.getElementById('edit-pulse')?.value||m.data?.pulse||'',
      temp:document.getElementById('edit-temp')?.value||m.data?.temp||'',
      o2:document.getElementById('edit-o2')?.value||m.data?.o2||'',
      weight:document.getElementById('edit-weight')?.value||m.data?.weight||''
    };
    updated.note=note||m.note||'';
  } else if(m.type==='meal'){
    updated.data={...m.data,
      meal:document.getElementById('edit-meal')?.value||m.data?.meal||'',
      items:document.getElementById('edit-items')?.value||m.data?.items||'',
      amount:document.getElementById('edit-amount')?.value||m.data?.amount||''
    };
    updated.note=note||m.note||'';
  } else if(m.type==='fluid'){
    updated.data={...m.data,
      type:document.getElementById('edit-fluid-type')?.value||m.data?.type||'',
      amount:document.getElementById('edit-amount')?.value||m.data?.amount||''
    };
    updated.note=note||m.note||'';
  } else if(m.type==='adl'){
    updated.note=note||m.note||'';
  }
  // Update in today's live state
  const idx=S.logs.findIndex(l=>l.id===m.id);
  if(idx>=0) S.logs[idx]=updated;
  // Update in persistent storage
  const allLogs=load('logs',[]);
  const aidx=allLogs.findIndex(l=>l.id===m.id);
  if(aidx>=0) allLogs[aidx]=updated;
  else allLogs.push(updated); // was in S.logs only (today)
  save('logs',allLogs);
  saveLogs();
  S.editLogModal=null;
  toast('Entry updated');
  renderShell();
  renderPage();
}

function deleteLog(id){
  if(!confirm('Delete this entry?')) return;
  S.logs=S.logs.filter(l=>l.id!==id);
  saveLogs();renderPage();
}


function logConditionCheckin(condKey, status, note){
  if(requiresClockIn()) return;
  
  const cid=S.activeClientId||'default';
  const history=load('condHistory_'+cid,[]);
  const baselines=getClientBaselines();
  history.push({
    date:todayISO(),
    time:now(),
    condition:condKey,
    status:status, // 'same', 'change', 'improved'
    note:note||'',
    by:S.user?S.user.name:'',
    baseline:baselines[condKey]||{}
  });
  save('condHistory_'+cid, history.slice(-90)); // keep 90 days
  addNotif('['+condKey+'] '+status+(note?' - '+note:'')+'. By '+S.user.name+' at '+now(),'all');
  toast('\u2713 '+condKey+' logged: '+status);
  S.condCheckinOpen=null;
  renderPage();
}

function renderDailyMedCheckin(){
  if(!S.activeClientId) return '';
  const dailyMeds=load(dailyMedsKey(),[]).filter(function(m){return m.active;});
  if(!dailyMeds.length) return '';
  const cid=S.activeClientId||'default';
  const medLog=load('medCheckinLog_'+cid,[]);
  const todayLog=medLog.filter(function(l){return l.date===todayISO();});
  window._medCheckinList=dailyMeds;

  // Count today's status
  var givenCount=0,missedCount=0,pendingCount=0;
  dailyMeds.forEach(function(med){
    var last=todayLog.filter(function(l){return l.medId===med.id;}).slice(-1)[0];
    if(!last) pendingCount++;
    else if(last.status==='given') givenCount++;
    else missedCount++;

  var isOpen=S.medCheckinOpen==='__panel__';

  // Collapsed summary card
  var html='<div class="card" style="border-left:4px solid var(--accent);padding:12px 14px">';

  html+='<div style="display:flex;align-items:center;gap:10px">';

  html+='<div>';
  html+='<div style="font-size:14px;font-weight:600;color:var(--text)">Daily medications</div>';
  html+='<div style="font-size:12px;color:var(--text2);margin-top:1px">';
  if(pendingCount>0) html+='<span style="color:var(--accent-light);font-weight:600">'+pendingCount+' pending</span>';
  if(givenCount>0) html+=(pendingCount>0?' · ':'')+'<span style="color:var(--accent)">'+givenCount+' given</span>';
  if(missedCount>0) html+=((pendingCount+givenCount)>0?' · ':'')+'<span style="color:var(--danger)">'+missedCount+' missed/refused</span>';
  html+='</div>';
  html+='</div>';
  html+='</div>';
  html+='<div style="display:flex;align-items:center;gap:8px">';
  // Quick "Give all pending" button
  if(pendingCount>0&&!isOpen){
    html+='<button onclick="event.stopPropagation();giveAllPendingMeds()" style="padding:6px 12px;border:none;border-radius:100px;background:var(--accent);color:white;font-size:12px;font-weight:600;cursor:pointer">Give all</button>';
  }
  html+='<i class="ti ti-chevron-'+(isOpen?'up':'down')+'" style="color:var(--accent);font-size:16px"></i>';
  html+='</div>';
  html+='</div>';

  // Expanded list
  if(isOpen){
    html+='<div style="margin-top:12px;border-top:1px solid var(--border);padding-top:10px">';
    dailyMeds.forEach(function(med,idx){
      var lastEntry=todayLog.filter(function(l){return l.medId===med.id;}).slice(-1)[0];
      var statusCol=lastEntry?(lastEntry.status==='given'?'var(--accent)':'var(--danger)'):'var(--border)';
      var isThisOpen=S.medCheckinOpen===med.id;

      html+='<div style="border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:8px;overflow:hidden">';
      html+='<div style="padding:10px 12px;background:var(--surface2);display:flex;align-items:center;justify-content:space-between">';
      html+='<div style="flex:1;min-width:0">';
      html+='<div style="font-size:13px;font-weight:600;color:var(--text)">'+(med.name||'')+(med.dose?' — '+med.dose:'')+'</div>';
      html+='<div style="font-size:11px;color:var(--text3)">'+(med.schedule||'')+(med.amountPerDose?' · '+med.amountPerDose:'')+'</div>';
      html+='</div>';

      if(lastEntry){
        html+='<div style="display:flex;align-items:center;gap:6px;flex-shrink:0">';
        html+='<span style="font-size:11px;padding:3px 10px;border-radius:100px;background:'+statusCol+';color:white;font-weight:600">'+lastEntry.status+'</span>';
        html+='<button data-midx="'+idx+'" onclick="S.medCheckinOpen=window._medCheckinList[this.dataset.midx].id;renderPage()" style="background:none;border:1px solid var(--border);border-radius:100px;color:var(--text2);padding:3px 8px;font-size:11px;cursor:pointer">Edit</button>';
        html+='</div>';
      } else {
        html+='<div style="display:flex;gap:6px;flex-shrink:0">';
        html+='<button data-midx="'+idx+'" onclick="_quickGiveMed(this.dataset.midx)" style="padding:6px 14px;border:none;border-radius:100px;background:var(--accent);color:white;font-size:12px;font-weight:600;cursor:pointer">Given</button>';
        html+='<button data-midx="'+idx+'" onclick="S.medCheckinOpen=window._medCheckinList[this.dataset.midx].id;renderPage()" style="padding:6px 12px;border:1px solid var(--danger);border-radius:100px;background:none;color:var(--danger);font-size:12px;cursor:pointer">Not given</button>';
        html+='</div>';
      }

      if(isThisOpen){
        html+='<div style="padding:10px 12px;border-top:1px solid var(--border)">';
        html+='<div style="font-size:12px;font-weight:600;color:var(--text);margin-bottom:8px">Select reason:</div>';
        html+='<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px">';
        ['Refused by client','Client asleep','Missed — caregiver error','On hold per physician','Vomited after taking'].forEach(function(reason,ri){
          html+='<button data-midx="'+idx+'" data-ri="'+ri+'" onclick="logMedCheckin(window._medCheckinList[this.dataset.midx].id,window._medCheckinList[this.dataset.midx].name,window._reasonList[this.dataset.ri])" style="padding:6px 12px;border-radius:100px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:12px;cursor:pointer">'+reason+'</button>';
        });
        window._reasonList=['Refused by client','Client asleep','Missed — caregiver error','On hold per physician','Vomited after taking'];
        html+='</div>';
        html+='<input type="text" id="med-note-'+med.id+'" placeholder="Additional notes..." style="width:100%;padding:8px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:13px;outline:none"/>';
        html+='</div>';
      }

      if(lastEntry){
        html+='<div style="padding:4px 12px;font-size:11px;color:var(--text3);border-top:1px solid var(--border)">'+lastEntry.time+' by '+lastEntry.by+(lastEntry.note?' · '+lastEntry.note:'')+'</div>';
      }
      html+='</div>';
    });
    html+='<div style="font-size:11px;color:var(--text3);text-align:center;padding-top:4px">PRN & short-term meds → <strong>Meds tab</strong></div>';
    html+='</div>';
  }

  html+='</div>';
  return html;
}


function giveAllPendingMeds(){
  var cid=S.activeClientId||'default';
  var medLog=load('medCheckinLog_'+cid,[]);
  var todayLog=medLog.filter(function(l){return l.date===todayISO();});
  var pending=(window._medCheckinList||[]).filter(function(med){
    return !todayLog.find(function(l){return l.medId===med.id;});
  });
  pending.forEach(function(med){
    medLog.push({date:todayISO(),time:now(),medId:med.id,medName:med.name,status:'given',note:'',by:S.user?S.user.name:''});
  });
  save('medCheckinLog_'+cid,medLog.slice(-200));
  addNotif('[Meds] All '+pending.length+' pending meds given by '+(S.user?S.user.name:'caregiver')+' at '+now(),'all');
  toast('✓ '+pending.length+' medications marked as given');
  renderPage();
}

function _quickGiveMed(idx){
  var med=window._medCheckinList&&window._medCheckinList[idx];
  if(!med){toast('Could not find medication.');return;}
  logMedCheckin(med.id,med.name,'given');
}

function logMedCheckin(medId,medName,status){
  if(requiresClockIn()) return;
  
  var note=document.getElementById('med-checkin-note-'+medId)?.value||'';
  var cid=S.activeClientId||'default';
  var log=load('medCheckinLog_'+cid,[]);
  log.push({
    date:todayISO(),time:now(),
    medId:medId,medName:medName,
    status:status,note:note,
    by:S.user?S.user.name:''
  });
  save('medCheckinLog_'+cid,log.slice(-200));
  addNotif('[Med] '+medName+': '+status+(note?' — '+note:'')+'. By '+(S.user?S.user.name:'caregiver')+' at '+now(),'all');
  toast(status==='given'?'✓ '+medName+' given':'⚠ '+medName+' — '+status);
  S.medCheckinOpen=null;
  renderPage();
}

function renderConditionCheckin(){
  if(!S.activeClientId) return '';
  const conditions=getClientConditions();
  if(!conditions.length) return '';
  const baselines=getClientBaselines();
  const history=load('condHistory_'+(S.activeClientId||'default'),[]);
  const todayEntries=history.filter(function(h){return h.date===todayISO();});

  var isOpen=S.condCheckinPanelOpen!==false;
  var html='<div class="card" style="border-left:4px solid var(--accent)">'
    +'<div onclick="S.condCheckinPanelOpen=S.condCheckinPanelOpen===false?true:false;renderPage()" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:'+(isOpen?'12':'0')+'px;cursor:pointer">'
    +'<div class="card-title" style="margin:0"><i class="ti ti-activity" style="color:var(--accent)"></i> Condition check-in</div>'
    +'<div style="display:flex;align-items:center;gap:8px"><span style="font-size:11px;color:var(--text3)">'+(isOpen?'Tap Same or Changed':'')+'</span><i class="ti '+(isOpen?'ti-chevron-up':'ti-chevron-down')+'" style="color:var(--accent);font-size:16px"></i></div>'
    +'</div>';
  if(!isOpen) return html+'</div>';


  conditions.forEach(function(cond){
    const bl=baselines[cond.key]||{};
    const todayLog=todayEntries.filter(function(h){return h.condition===cond.key;});
    const lastEntry=todayLog[todayLog.length-1];
    const isOpen=S.condCheckinOpen===cond.key;
    const lockedBaseline=bl._locked;

    var statusBadge='';
    if(lastEntry){
      const col=lastEntry.status==='same'?'var(--accent)':lastEntry.status==='improved'?'var(--blue)':'var(--danger)';
      statusBadge='<span style="font-size:11px;padding:2px 8px;border-radius:100px;background:'+col+';color:white;margin-left:6px">'+lastEntry.status+'</span>';
    }

    html+='<div style="border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:8px;overflow:hidden">'
      +'<div style="padding:10px 12px;display:flex;align-items:center;justify-content:space-between;background:var(--surface2)">'
      +'<div style="display:flex;align-items:center;gap:6px">'
      +'<i class="ti ti-circle-dot" style="color:var(--accent);font-size:14px"></i>'
      +'<span style="font-size:13px;font-weight:600;color:var(--text)">'+cond.label+'</span>'
      +statusBadge
      +'</div>'
      +'<div style="display:flex;gap:6px">';

    if(!lastEntry||isOpen){
      html+='<button onclick="logConditionCheckin(\''+cond.key.replace(/'/g,"\'")+'\',\'same\',\'\')" '
        +'style="padding:5px 12px;border-radius:100px;border:none;background:var(--accent);color:white;font-size:12px;font-weight:600;cursor:pointer">&#10003; Same</button>'
        +'<button onclick="S.condCheckinOpen=S.condCheckinOpen===\''+cond.key.replace(/'/g,"\'")+'\' ?null:\''+cond.key.replace(/'/g,"\'")+'\';renderPage()" '
        +'style="padding:5px 12px;border-radius:100px;border:1px solid var(--danger);background:none;color:var(--danger);font-size:12px;cursor:pointer">Changed</button>';
    } else {
      html+='<button onclick="S.condCheckinOpen=\''+cond.key.replace(/'/g,"\'")+'\';renderPage()" '
        +'style="padding:4px 10px;border-radius:100px;border:1px solid var(--border);background:none;color:var(--text2);font-size:11px;cursor:pointer"><i class="ti ti-refresh"></i> Update</button>';
    }

    html+='</div></div>';

    // Depression: simple mood check-in
    if(cond.key==='Depression'&&!lastEntry){
      html+='<div style="padding:8px 12px;border-top:1px solid var(--border);background:rgba(91,188,176,0.03)">';
      html+='<div style="font-size:11px;color:var(--text3);margin-bottom:6px">Quick mood check-in:</div>';
      html+='<div style="display:flex;gap:5px;flex-wrap:wrap">';
      ['😊 Good','😐 Neutral','😔 Low','😢 Very low','😡 Irritable','😴 Fatigued'].forEach(function(mood){
        html+='<button onclick="logConditionCheckin(\'Depression\',\'checked\',\''+mood+'\')" '
          +'style="padding:5px 10px;border-radius:100px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:12px;cursor:pointer;font-family:inherit">'+mood+'</button>';
      });
      html+='</div></div>';
    }

    // Baseline reference (collapsed)
    if(lockedBaseline&&!isOpen){
      var blSummary=Object.keys(bl).filter(function(k){return k[0]!=='_';}).slice(0,3).map(function(k){
        var cfg=CONDITION_BASELINES[cond.key];
        var field=cfg&&cfg.fields.find(function(f){return f.id===k;});
        return field?field.label+': '+bl[k]:'';
      }).filter(Boolean).join(' · ');
      if(blSummary) html+='<div style="padding:6px 12px;font-size:11px;color:var(--text3);border-top:1px solid var(--border)">Baseline: '+blSummary+'</div>';
    }

    // Change form
    if(isOpen){
      html+='<div style="padding:12px;border-top:1px solid var(--border);background:rgba(192,57,43,0.03)">'
        +'<div style="font-size:12px;font-weight:600;color:var(--danger);margin-bottom:8px">Describe the change from baseline:</div>'
        +'<textarea id="cond-change-note-'+cond.key+'" placeholder="e.g. More confused than usual, refused breakfast, agitated at 10am..." style="width:100%;padding:10px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:13px;min-height:70px;resize:vertical;outline:none"></textarea>'
        +'<div style="display:flex;gap:8px;margin-top:8px">'
        +'<button onclick="logConditionCheckin(\''+cond.key.replace(/'/g,"\'")+'\',\'improved\',document.getElementById(\'cond-change-note-'+cond.key+'\')?.value||\'No details\')" '
        +'style="flex:1;padding:8px;border:none;border-radius:var(--radius-sm);background:var(--blue);color:white;font-size:12px;font-weight:600;cursor:pointer">&#8679; Improved</button>'
        +'<button onclick="logConditionCheckin(\''+cond.key.replace(/'/g,"\'")+'\',\'change\',document.getElementById(\'cond-change-note-'+cond.key+'\')?.value||\'Change noted\')" '
        +'style="flex:1;padding:8px;border:none;border-radius:var(--radius-sm);background:var(--danger);color:white;font-size:12px;font-weight:600;cursor:pointer">Change noted</button>'
        +'</div></div>';
    }

    html+='</div>';
  });

  // Trend mini-graph
  if(history.length>=3){
    html+='<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border)">'
      +'<div style="font-size:11px;color:var(--text3);margin-bottom:6px">Last 14 days — <span style="color:#5bbcb0">&#9679;</span> Same &nbsp;<span style="color:#c0392b">&#9679;</span> Changed &nbsp;<span style="color:#7ab8e8">&#9679;</span> Improved</div>'
      +'<div style="display:flex;gap:3px;align-items:flex-end;height:30px">';
    const last14=history.slice(-14);
    last14.forEach(function(h){
      const col=h.status==='same'?'var(--accent)':h.status==='improved'?'var(--blue)':'var(--danger)';
      html+='<div title="'+h.date+' '+h.condition+': '+h.status+'" style="width:14px;height:14px;border-radius:50%;background:'+col+';flex-shrink:0"></div>';
    });
    html+='</div></div>';
  }

  html+='</div>';

  // Fall Risk trend card
  if(conditions.some(function(c){return c.key==='fall risk'||c.key==='Fall Risk';})){
    html+='<div class="card" style="margin-top:0"><div class="card-title" style="margin-bottom:4px"><i class="ti ti-trending-up" style="color:#e8875a"></i> Fall Risk Trend</div>'+renderFallRiskTrendGraph()+'</div>';
  }

  return html;
}

function renderLog(){
  const cols={vitals:'#1a9e75',meal:'#e8854a',shower:'#3a8fd4',bm:'#7fa3be',note:'#e05252',adl:'#9b59b6',fluid:'#3a8fd4'};
  const icons={vitals:'ti-activity',meal:'ti-bowl-spoon',shower:'ti-droplet',bm:'ti-arrow-down-circle',note:'ti-notes',adl:'ti-checklist',fluid:'ti-droplet'};
  const allLogs=load('logs',[]);
  const td=today();
  const dateMap={};
  allLogs.forEach(l=>{const d=l.date||td;if(!dateMap[d])dateMap[d]=[];dateMap[d].push(l);});
  dateMap[td]=S.logs;
  const dates=Object.keys(dateMap).sort((a,b)=>b.localeCompare(a));
  const todayLogs=[...(dateMap[td]||[])].reverse();
  const pastDates=dates.filter(d=>d!==td&&(dateMap[d]||[]).length>0);

  // PRN suggestions from vitals trigger
  const prnCards=(S.prnSuggestions||[]).length>0?`
  <div style="background:rgba(232,135,90,0.1);border:2px solid #e8875a;border-radius:var(--radius);padding:14px;margin-bottom:12px">
    <div style="font-size:14px;font-weight:700;color:#e8875a;margin-bottom:4px">⚡ PRN medication triggered</div>
    <div style="font-size:12px;color:var(--text2);margin-bottom:12px">Based on the vitals just recorded, the following PRN medications may be needed:</div>
    ${(S.prnSuggestions||[]).map(({med,triggerReason,maxOk,intervalOk,todayGiven})=>`
    <div style="background:var(--surface);border-radius:var(--radius-sm);padding:12px;margin-bottom:8px;border:1px solid var(--border)">
      <div style="font-size:15px;font-weight:600;color:var(--text)">${med.name} ${med.dose}</div>
      <div style="font-size:12px;color:#e8875a;margin-top:2px">Trigger: ${triggerReason}</div>
      <div style="font-size:11px;color:var(--text2)">${med.route}${med.notes?' - '+med.notes:''}</div>
      ${!maxOk?`<div style="font-size:12px;color:var(--danger);margin-top:4px">⛔ Max daily doses (${med.prn.maxDaily}) already reached today</div>`:''}
      ${!intervalOk?`<div style="font-size:12px;color:var(--danger);margin-top:4px">⛔ Too soon  -  minimum ${med.prn.minInterval}hr interval not met</div>`:''}
      ${maxOk&&intervalOk?`
      <div style="margin-top:8px">
        <input type="text" id="prn-reason-${med.id}" placeholder="Reason / notes (optional)" value="${triggerReason}"
          style="width:100%;padding:8px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:13px;outline:none;margin-bottom:8px"/>
        <div style="display:flex;gap:8px">
          <button onclick="declinePRN('${med.id}')" class="btn" style="flex:1">Not given</button>
          <button onclick="givePRN('${med.id}','${triggerReason.replace(/'/g,"\\'")}'')" class="btn btn-primary" style="flex:1;background:#e8875a;border-color:#e8875a">
            Give ${med.name}
          </button>
        </div>
      </div>`:`<button onclick="declinePRN('${med.id}')" class="btn" style="width:100%;margin-top:8px">Dismiss</button>`}
    </div>`).join('')}
  </div>`:'';

  const buildDetail=(l)=>{
    let detail='';
    const mealName=(l.data&&(l.data.mealType||l.data.meal||l.data.type))||'Meal';
    if(l.type==='vitals'){
      const v=l.data;
      const parts=[v.bp&&`BP ${v.bp}`,v.pulse&&`♥ ${v.pulse}`,v.temp&&`${v.temp}°F`,v.o2&&`O₂ ${v.o2}%`].filter(Boolean);
      detail=parts.join(' - ');
      if(v.bpStatus&&v.bpStatus!=='normal'){
        const fc=v.bpStatus==='urgent'?'var(--danger)':'#e67e22';
        detail+=` <span style="font-size:10px;color:${fc};font-weight:600">${v.bpStatus==='urgent'?'URGENT':v.bpStatus==='high'?'⬆ HIGH':'⬇ LOW'}</span>`;
      }
    } else if(l.type==='meal'){
      if(l.data.foodItems&&l.data.foodItems.length){
        const items=l.data.foodItems.slice(0,2).map(i=>[i.amount,i.unit,i.name].filter(Boolean).join(' ')).join(', ');
        detail=`${mealName}: ${items}${l.data.foodItems.length>2?` +${l.data.foodItems.length-2} more`:''}`;
      } else if(l.data.diet){
        const foods=(l.data.items||'').split(',').slice(0,2).join(', ');
        detail=`${l.data.diet}: ${foods}${(l.data.items||'').split(',').length>2?' ...':''}`;
      } else {
        const _fixItems=(s)=>s.replace(/(\d)(oz|piece|slice|cup|tbsp|tsp|g|ml|lb|kg)/gi,'$1 $2');
        detail=`${mealName}: ${_fixItems((l.data.items||'').slice(0,40))}${(l.data.items||'').length>40?'...':''}`;
      }
      if(l.data.amount) detail+=`  -  ${l.data.amount}`;
    } else if(l.type==='shower'){
      detail=l.data.completed?`✓ Shower${l.data.hairWashed===true?' - Hair washed':l.data.hairWashed===false?' - Hair not washed':''}`:' Refused/skipped';
    } else if(l.type==='bm'){
      detail=l.data.occurred?`✓ BM  -  ${l.data.consistency}`:'No BM';
    } else if(l.type==='adl'){
      const entries=Object.entries(l.data.entries||{});
      detail=entries.slice(0,2).map(([k,v])=>{const item=[...ADL_ITEMS,...IADL_ITEMS].find(i=>i.key===k);return `${item?item.label:k}: ${v}`;}).join(' - ')+(entries.length>2?` +${entries.length-2} more`:'');
    } else if(l.type==='fluid'){
      detail=`${l.data.type}  -  ${l.data.amount}`;
    } else if(l.type==='note'){
      const txt=l.data.text||l.note||'';
      detail=txt.length>60?txt.slice(0,60)+'...':txt;
    }
    if(l.note&&l.type!=='note'&&l.type!=='vitals') detail+=` - ${l.note.slice(0,25)}${l.note.length>25?'...':''}`;
    return detail;
  };

  const renderEntry=l=>`<div class="status-row">
    <div class="status-dot" style="background:${cols[l.type]||'#888'}"></div>
    <div class="status-info">
      <div class="status-title"><i class="ti ${icons[l.type]||'ti-circle'}" style="color:${cols[l.type]};font-size:13px"></i> ${l.type==='adl'?'ADLs':l.type==='bm'?'BM':l.type.charAt(0).toUpperCase()+l.type.slice(1)}</div>
      <div class="status-detail">${buildDetail(l)}</div>
      <div class="status-detail" style="margin-top:1px;color:var(--text3)"> -  ${l.caregiver}</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
      <div class="status-time">${l.time}</div>
      <div style="display:flex;gap:4px">
        <button onclick="openEditLog(${l.id})" style="background:none;border:none;color:var(--blue);font-size:15px;cursor:pointer;padding:2px 4px" title="Edit"><i class="ti ti-pencil"></i></button>
        <button onclick="deleteLog(${l.id})" style="background:none;border:none;color:var(--danger);font-size:15px;cursor:pointer;padding:2px 4px" title="Delete"><i class="ti ti-x"></i></button>
      </div>
    </div>
  </div>`;

  const niceDate=formatDateNice;

  return `
  ${prnCards}

  <!-- DAILY MEDICATION CHECK-IN -->
  ${(function(){try{return renderDailyMedCheckin();}catch(e){console.error('renderDailyMedCheckin error:',e);return '';}})()}

  <!-- CONDITION CHECK-IN -->
  ${(function(){try{return renderConditionCheckin();}catch(e){console.error('renderConditionCheckin error:',e);return '';}})()}

  <!-- TODAY - collapsible -->
  <div style="border:1px solid var(--accent);border-radius:var(--radius);margin-bottom:8px;overflow:hidden;background:var(--surface)">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 14px;cursor:pointer"
      onclick="S.logTodayOpen=S.logTodayOpen===false?true:false;renderPage()">
      <div>
        <div style="font-size:14px;font-weight:700;color:var(--accent-light)">
          <i class="ti ti-calendar-today" style="color:var(--accent)"></i>
          Today — ${new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}
        </div>
        <div style="font-size:11px;color:var(--text3);margin-top:2px">${todayLogs.length} entr${todayLogs.length===1?'y':'ies'}</div>
      </div>
      <i class="ti ${S.logTodayOpen===false?'ti-chevron-down':'ti-chevron-up'}" style="color:var(--accent);font-size:18px;flex-shrink:0"></i>
    </div>
    ${S.logTodayOpen===false?'':`
    <div style="border-top:1px solid var(--border);padding:10px 14px">
      ${todayLogs.length===0?
        `<div style="text-align:center;padding:20px 0;color:var(--text3)">
          <i class="ti ti-clipboard" style="font-size:28px;display:block;margin-bottom:8px"></i>
          No entries yet today.<br/>
          <span style="font-size:12px">Use the tabs below to start logging.</span>
        </div>`:
        todayLogs.map(l=>renderEntry(l)).join('')}
    </div>`}
  </div>

  <!-- PREVIOUS DAYS -->
  ${(function(){
    if(!pastDates.length) return '';
    var out='<div style="font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.6px;margin:4px 0 8px;padding:0 2px">Previous days</div>';
    pastDates.forEach(function(date){
      var logs=[...(dateMap[date]||[])].reverse();
      var isOpen=S.logExpandedDate===date;
      var vc=logs.filter(function(l){return l.type==='vitals';}).length;
      var mc=logs.filter(function(l){return l.type==='meal';}).length;
      var hasAlert=logs.some(function(l){return l.type==='vitals'&&(l.data.bpStatus==='urgent'||l.data.bpStatus==='high');});
      var summary=[vc?vc+' vital'+(vc>1?'s':''):'',mc?mc+' meal'+(mc>1?'s':''):'',logs.length-vc-mc>0?(logs.length-vc-mc)+' more':''].filter(Boolean).join(' - ')||logs.length+' entries';
      out+='<div style="border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;overflow:hidden;background:var(--surface)">';
      out+='<div style="display:flex;align-items:center;justify-content:space-between;padding:12px 14px;cursor:pointer" onclick="S.logExpandedDate=S.logExpandedDate===\''+date+'\' ?null:\''+date+'\';renderPage()">';
      out+='<div><div style="font-size:14px;font-weight:600;color:var(--text)">'+niceDate(date)+(hasAlert?' <span style="font-size:10px;color:var(--danger)">⚠</span>':'')+'</div>';
      out+='<div style="font-size:11px;color:var(--text3);margin-top:2px">'+summary+'</div></div>';
      out+='<i class="ti '+(isOpen?'ti-chevron-up':'ti-chevron-down')+'" style="color:var(--text3);font-size:18px;flex-shrink:0"></i>';
      out+='</div>';
      if(isOpen) out+='<div style="border-top:1px solid var(--border);padding:10px 14px">'+logs.map(function(l){return renderEntry(l);}).join('')+'</div>';
      out+='</div>';
    });
    return out;
  })()}`;
}

// BP and vitals threshold helpers
function getBPStatus(bpStr,thresholds){
  if(!bpStr||!bpStr.includes('/')) return null;
  const [sys,dia]=bpStr.split('/').map(Number);
  if(isNaN(sys)||isNaN(dia)) return null;
  const highSys=thresholds.highSys||140;
  const urgentSys=thresholds.urgentSys||160;
  const highDia=thresholds.highDia||90;
  const urgentDia=thresholds.urgentDia||100;
  const lowSys=thresholds.lowSys||90;
  const lowDia=thresholds.lowDia||60;
  if(sys>=urgentSys||dia>=urgentDia) return {level:'urgent',label:'URGENT HIGH',color:'#c0392b',bg:'rgba(192,57,43,0.12)'};
  if(sys>=highSys||dia>=highDia) return {level:'high',label:'HIGH',color:'#e67e22',bg:'rgba(230,126,34,0.10)'};
  if(sys<lowSys||dia<lowDia) return {level:'low',label:'LOW  -  Check patient',color:'#3498db',bg:'rgba(52,152,219,0.10)'};
  if(sys>=120||dia>=80) return {level:'elevated',label:'Elevated',color:'#e8a05a',bg:'rgba(232,160,90,0.10)'};
  return {level:'normal',label:'Normal',color:'var(--accent-light)',bg:'rgba(91,188,176,0.08)'};
}

function getVitalStatus(type,val){
  const n=parseFloat(val);if(isNaN(n)||val==='') return null;
  if(type==='pulse'){
    if(n<40) return {level:'urgent',label:'CRITICALLY LOW  -  check patient immediately',color:'#c0392b'};
    if(n>150) return {level:'urgent',label:'CRITICALLY HIGH  -  notify physician immediately',color:'#c0392b'};
    if(n<50) return {level:'high',label:'⬇️ LOW pulse ('+n+' bpm)  -  monitor closely',color:'#e67e22'};
    if(n>120) return {level:'high',label:'⬆️ HIGH pulse ('+n+' bpm)  -  monitor closely',color:'#e67e22'};
    if(n<60) return {level:'elevated',label:'Slightly low ('+n+' bpm)',color:'#e8a05a'};
    if(n>100) return {level:'elevated',label:'Slightly elevated ('+n+' bpm)',color:'#e8a05a'};
    return {level:'normal',label:'Normal ('+n+' bpm)',color:'var(--accent-light)'};
  }
  if(type==='temp'){
    if(n>=104) return {level:'urgent',label:'HIGH FEVER  -  notify physician immediately',color:'#c0392b'};
    if(n<95) return {level:'urgent',label:'HYPOTHERMIA risk  -  notify physician',color:'#c0392b'};
    if(n>=103) return {level:'high',label:'⬆️ High fever ('+n+'°F)',color:'#e67e22'};
    if(n>=100.4) return {level:'high',label:'⬆️ Fever ('+n+'°F)',color:'#e67e22'};
    if(n<97) return {level:'high',label:'⬇️ Low temp ('+n+'°F)  -  monitor',color:'#e67e22'};
    return {level:'normal',label:'Normal ('+n+'°F)',color:'var(--accent-light)'};
  }
  if(type==='o2'){
    if(n<88) return {level:'urgent',label:'CRITICAL  -  O₂ '+n+'%  -  immediate attention',color:'#c0392b'};
    if(n<90) return {level:'urgent',label:'Dangerously low O₂ ('+n+'%)',color:'#c0392b'};
    if(n<95) return {level:'high',label:'⬇️ Low O₂ ('+n+'%)  -  monitor closely',color:'#e67e22'};
    return {level:'normal',label:'Normal ('+n+'%)',color:'var(--accent-light)'};
  }
  return null;
}

function renderBPTrend(){
  const hist=load('bpHistory_'+(S.activeClientId||'default'),[]);
  if(hist.length<2) return '<div style="font-size:12px;color:var(--text3);padding:8px 0">No BP history yet. Save at least 2 readings to see the trend.</div>';
  const last7=hist.slice(-7);
  const maxSys=Math.max(...last7.map(h=>h.sys),180);
  const minSys=Math.min(...last7.map(h=>h.sys),60);
  const svgH=80, svgW=300, pad=20;
  const pts=last7.map(function(h,i){
    const x=pad+(i/(last7.length-1))*(svgW-pad*2);
    const y=svgH-pad-((h.sys-minSys)/(maxSys-minSys||1))*(svgH-pad*2);
    return {x,y,h};
  });
  const polyline=pts.map(p=>p.x+','+p.y).join(' ');
  const dots=pts.map(function(p){
    const col=p.h.status==='urgent'?'var(--danger)':p.h.status==='high'?'#e8875a':p.h.status==='low'?'var(--blue)':'var(--accent)';
    return '<circle cx="'+p.x+'" cy="'+p.y+'" r="4" fill="'+col+'" title="'+p.h.bp+'"/>'
      +'<text x="'+p.x+'" y="'+(p.y-8)+'" text-anchor="middle" font-size="9" fill="var(--text2)">'+p.h.sys+'</text>';
  }).join('');
  const labels=pts.map(function(p,i){
    const d=p.h.date?p.h.date.slice(5):'';
    return '<text x="'+p.x+'" y="'+(svgH-4)+'" text-anchor="middle" font-size="9" fill="var(--text3)">'+d+'</text>';
  }).join('');
  const trend=last7.length>=3?(last7[last7.length-1].sys>last7[0].sys?'↑ Rising':'↓ Falling'):'—';
  const trendCol=trend.includes('Rising')?'var(--danger)':'var(--accent)';
  return '<div style="margin-top:8px">'
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">'
    +'<span style="font-size:12px;font-weight:600;color:var(--text)">BP Trend (last '+last7.length+' readings)</span>'
    +'<span style="font-size:12px;font-weight:700;color:'+trendCol+'">'+trend+'</span>'
    +'</div>'
    +'<svg width="100%" viewBox="0 0 '+svgW+' '+svgH+'" style="overflow:visible">'
    +'<polyline points="'+polyline+'" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linejoin="round"/>'
    +dots+labels
    +'</svg>'
    +'<div style="display:flex;gap:8px;font-size:10px;color:var(--text3);margin-top:4px">'
    +'<span style="color:var(--accent)">● Normal</span>'
    +'<span style="color:#e8875a">● High</span>'
    +'<span style="color:var(--danger)">● Urgent</span>'
    +'<span style="color:var(--blue)">● Low</span>'
    +'</div>'
    +'</div>';
}

function renderConditionTrendGraph(conditionKey, conditionLabel, color){
  var cid=S.activeClientId||'default';
  // Read from condHistory (the condition check-in Same/Changed/Improved)
  var hist=load('condHistory_'+cid,[]).filter(function(h){return h.condition===conditionKey;});
  if(hist.length<2){
    return '<div style="font-size:12px;color:var(--text3);padding:8px 0">No '+conditionLabel+' trend yet. Record at least 2 condition check-ins to see the trend.</div>';
  }
  // Last 14 entries
  var last=hist.slice(-14);
  // Map status to score
  var scoreMap={'improved':2,'same':1,'change':0,'worsened':0};
  var labelMap={'improved':'Improved','same':'Stable','change':'Changed','worsened':'Worsened'};
  var colorMap={'improved':'var(--accent)','same':'var(--text3)','change':'var(--danger)','worsened':'var(--danger)'};
  var svgW=300, svgH=80, pad=20;
  var scores=last.map(function(h){return scoreMap[h.status]!==undefined?scoreMap[h.status]:1;});
  var maxV=2, minV=0;
  var pts=last.map(function(h,i){
    var sc=scoreMap[h.status]!==undefined?scoreMap[h.status]:1;
    var x=pad+(i/(last.length-1))*(svgW-pad*2);
    var y=svgH-pad-((sc-minV)/(maxV-minV))*(svgH-pad*2);
    return {x:x,y:y,h:h,sc:sc};
  });
  var polyline=pts.map(function(p){return p.x+','+p.y;}).join(' ');
  var dots=pts.map(function(p){
    var col=colorMap[p.h.status]||'var(--text3)';
    return '<circle cx="'+p.x+'" cy="'+p.y+'" r="4" fill="'+col+'" />'      +'<text x="'+p.x+'" y="'+(p.y-8)+'" text-anchor="middle" font-size="9" fill="var(--text2)">'+p.h.date.slice(5)+'</text>';
  }).join('');
  // Y-axis labels
  var yLabels='<text x="2" y="'+(svgH-pad)+'" font-size="8" fill="var(--text3)">Changed</text>'    +'<text x="2" y="'+(svgH-pad-(1/(maxV-minV))*(svgH-pad*2))+'" font-size="8" fill="var(--text3)">Stable</text>'    +'<text x="2" y="'+(svgH-pad-(2/(maxV-minV))*(svgH-pad*2))+'" font-size="8" fill="var(--text3)">Better</text>';
  // Trend arrow
  var recent=scores.slice(-3);
  var avg=recent.reduce(function(a,b){return a+b;},0)/recent.length;
  var trend=avg>=1.5?'↑ Improving':avg<=0.5?'↓ Declining':'→ Stable';
  var trendCol=avg>=1.5?'var(--accent)':avg<=0.5?'var(--danger)':'var(--text3)';
  return '<div style="margin-top:8px">'    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">'    +'<span style="font-size:12px;font-weight:600;color:var(--text)">'+conditionLabel+' Trend ('+last.length+' readings)</span>'    +'<span style="font-size:12px;font-weight:700;color:'+trendCol+'">'+trend+'</span>'    +'</div>'    +'<svg width="100%" viewBox="0 0 '+svgW+' '+svgH+'" style="overflow:visible">'    +'<polyline points="'+polyline+'" fill="none" stroke="'+color+'" stroke-width="2" stroke-linejoin="round"/>'    +dots+yLabels    +'</svg>'    +'<div style="display:flex;gap:8px;font-size:10px;color:var(--text3);margin-top:4px">'    +'<span style="color:var(--accent)">● Improved</span>'    +'<span style="color:var(--text3)">● Stable</span>'    +'<span style="color:var(--danger)">● Changed</span>'    +'</div>'    +'</div>';
}

// Cognitive-specific trend graph reading from cog_obs scores
function renderCognitiveTrendGraph(){
  var cid=S.activeClientId||'default';
  var obs=load('cog_obs_'+cid,[]);
  if(obs.length<2){
    return '<div style="font-size:12px;color:var(--text3);padding:8px 0">No cognitive trend yet. Record at least 2 observations to see the trend.</div>';
  }
  var last=obs.slice(-14);
  // Score each observation: count how many categories are rated "normal/none/mild" vs "moderate/severe"
  var svgW=300, svgH=80, pad=20;
  var pts=last.map(function(obs,i){
    var total=0,good=0;
    COG_CATEGORIES.forEach(function(cat){
      if(obs[cat.key]){
        total++;
        var v=obs[cat.key].toLowerCase();
        if(v.includes('normal')||v.includes('intact')||v.includes('mild')||v.includes('oriented')||v.includes('calm')||v.includes('good')) good++;
      }
    });
    var score=total>0?good/total:0.5;
    var x=pad+(i/(last.length-1||1))*(svgW-pad*2);
    var y=svgH-pad-(score*(svgH-pad*2));
    return {x:x,y:y,score:score,date:obs.date||''};
  });
  var polyline=pts.map(function(p){return p.x+','+p.y;}).join(' ');
  var dots=pts.map(function(p){
    var col=p.score>=0.7?'var(--accent)':p.score>=0.4?'#e8875a':'var(--danger)';
    return '<circle cx="'+p.x+'" cy="'+p.y+'" r="4" fill="'+col+'" />'      +'<text x="'+p.x+'" y="'+(p.y-8)+'" text-anchor="middle" font-size="9" fill="var(--text2)">'+p.date.slice(5)+'</text>';
  }).join('');
  var recent=pts.slice(-3);
  var avgScore=recent.reduce(function(a,p){return a+p.score;},0)/(recent.length||1);
  var trend=avgScore>=0.65?'↑ Stable/Improving':avgScore>=0.4?'→ Mixed':'↓ Declining';
  var trendCol=avgScore>=0.65?'var(--accent)':avgScore>=0.4?'#e8875a':'var(--danger)';
  return '<div style="margin-top:8px">'    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">'    +'<span style="font-size:12px;font-weight:600;color:var(--text)">Cognitive Trend ('+last.length+' observations)</span>'    +'<span style="font-size:12px;font-weight:700;color:'+trendCol+'">'+trend+'</span>'    +'</div>'    +'<svg width="100%" viewBox="0 0 '+svgW+' '+svgH+'" style="overflow:visible">'    +'<polyline points="'+polyline+'" fill="none" stroke="#7ab8e8" stroke-width="2" stroke-linejoin="round"/>'    +dots    +'</svg>'    +'<div style="display:flex;gap:8px;font-size:10px;color:var(--text3);margin-top:4px">'    +'<span style="color:var(--accent)">● Good</span>'    +'<span style="color:#e8875a">● Mixed</span>'    +'<span style="color:var(--danger)">● Declining</span>'    +'</div>'    +'</div>';
}

function saveAllBPThresholds(){
  const get=(id,fallback)=>parseFloat(document.getElementById(id)?.value)||fallback;
  const t={
    highSys:get('bp-highSys',140),
    highDia:get('bp-highDia',90),
    urgentSys:get('bp-urgentSys',160),
    urgentDia:get('bp-urgentDia',100),
    lowSys:get('bp-lowSys',90),
    lowDia:get('bp-lowDia',60)
  };
  // Validate
  if(t.highSys>=t.urgentSys){
    const msg=document.getElementById('bp-threshold-msg');
    if(msg) msg.innerHTML='<div style="color:var(--danger);font-size:12px;margin-top:6px">Urgent systolic must be higher than High systolic.</div>';
    return;
  }
  save('bpThresholds',t);
  const msg=document.getElementById('bp-threshold-msg');
  if(msg) msg.innerHTML='<div style="color:var(--accent-light);font-size:12px;margin-top:6px"><i class="ti ti-check"></i> Thresholds saved! High ≥'+t.highSys+'/'+t.highDia+' - Urgent ≥'+t.urgentSys+'/'+t.urgentDia+'</div>';
  toast('BP thresholds saved');
  // Re-render to apply new thresholds to current BP reading
  setTimeout(()=>renderPage(),300);
}

function saveVitals(){
  if(requiresClockIn()) return;
  
  const f=S.form.vitals;
  if(!f.bp){toast('Blood pressure is required. Other vitals are optional.');return;}
  const thresholds=load('bpThresholds',{highSys:140,urgentSys:160,highDia:90,urgentDia:100,lowSys:90,lowDia:60});
  const bpStatus=getBPStatus(f.bp,thresholds);
  const bpParts=f.bp.split('/');
  const systolic=parseInt(bpParts[0])||0;
  const diastolic=parseInt(bpParts[1])||0;
  // BP alerts
  if(bpStatus&&bpStatus.level==='urgent'){
    const _t=load('bpThresholds',{});
    const _urgInstr=_t.urgentInstruction||'';
    const _hiInstr=_t.highInstruction||'';
    const _loInstr=_t.lowInstruction||'';
    addNotif('[!] URGENT: High BP '+f.bp+' for '+(patientProfile.name||'patient')+' by '+S.user.name+' at '+now()+('. ')+(_urgInstr?'INSTRUCTION: '+_urgInstr:''),'all');
    S.bpAlertModal={level:'urgent',bp:f.bp,instruction:_urgInstr,threshold:thresholds.urgentSys+'/'+thresholds.urgentDia};
    // Don't return - continue to process glucose and save the log
  } else if(bpStatus&&bpStatus.level==='high'){
    const _t2=load('bpThresholds',{});
    addNotif('[!] High BP '+f.bp+' by '+S.user.name+' at '+now()+'. Monitor closely.'+(_t2.highInstruction?' INSTRUCTION: '+_t2.highInstruction:''),'all');
    S.bpAlertModal={level:'high',bp:f.bp,instruction:_t2.highInstruction||'',threshold:thresholds.highSys+'/'+thresholds.highDia};
    // Don't return - continue to process glucose and save the log
  } else if(bpStatus&&bpStatus.level==='low'){
    const _tLow=load('bpThresholds',{});
    const _loInstr=_tLow.lowInstruction||'';
    addNotif('[!] LOW BP '+f.bp+' for '+(patientProfile.name||'patient')+' by '+S.user.name+' at '+now()+(_loInstr?' INSTRUCTION: '+_loInstr:''),'all');
    S.bpAlertModal={level:'low',bp:f.bp,instruction:_loInstr,threshold:(thresholds.lowSys||90)+'/'+(thresholds.lowDia||60)};
    // Don't return - continue to process glucose and save the log
  }

  // Glucose is now logged separately via the Glucose tab

  // Check PRN medications  -  see if any triggers are met
  const meds=load('medications',[]);
  const prnTriggered=[];
  meds.filter(m=>m.active&&m.isPRN&&m.prn).forEach(med=>{
    const {trigger,threshold}=med.prn;
    let triggered=false;
    let triggerReason='';
    if(trigger==='bp_high'&&systolic&&threshold&&systolic>=threshold){
      triggered=true;triggerReason='BP '+f.bp+' >= '+threshold+' systolic';
    } else if(trigger==='bp_low'&&systolic&&threshold&&systolic<=threshold){
      triggered=true;triggerReason='BP '+f.bp+' <= '+threshold+' systolic';
    } else if(trigger==='glucose_high'&&glucoseVal&&threshold&&glucoseVal>=threshold){
      triggered=true;triggerReason='Glucose '+glucoseVal+' mg/dL >= '+threshold;
    } else if(trigger==='glucose_low'&&glucoseVal&&threshold&&glucoseVal<=threshold){
      triggered=true;triggerReason='Glucose '+glucoseVal+' mg/dL <= '+threshold;
    }
    if(triggered){
      // Check max daily doses not exceeded
      const prnLog=load('prnLog',[]);
      const todayGiven=prnLog.filter(p=>p.medId===med.id&&p.date===todayISO()).length;
      const maxOk=!med.prn.maxDaily||todayGiven<med.prn.maxDaily;
      // Check min interval
      const lastGiven=prnLog.filter(p=>p.medId===med.id).sort((a,b)=>b.timestamp-a.timestamp)[0];
      const intervalOk=!lastGiven||!med.prn.minInterval||
        (Date.now()-lastGiven.timestamp)>=(med.prn.minInterval*60*60*1000);
      prnTriggered.push({med,triggerReason,maxOk,intervalOk,todayGiven});
    }
  });

  // Store triggered PRNs in state for modal
  if(prnTriggered.length) S.prnSuggestions=prnTriggered;

  S.logs.push({id:Date.now(),type:'vitals',date:today(),time:now(),clientId:S.activeClientId,
    caregiver:S.user.name,data:{...f,bpStatus:bpStatus?.level||'normal',systolic,diastolic},note:f.note});
  addNotif('Vitals recorded by '+(S.user.name)+' at '+(now())+'.','all');
  S.form.vitals={bp:'',pulse:'',temp:'',o2:'',weight:'',note:''};
  // Show BP alert modal if set, otherwise render page
  if(S.bpAlertModal){renderShell();return;}
  // Explicitly clear DOM inputs in case browser autofill repopulates them
  ['bp-input','pulse-input','temp-input','o2-input','weight-input','glucose-input'].forEach(function(id){
    var el=document.getElementById(id);
    if(el) el.value='';
  });
  saveLogs();
  checkBPPattern();
  // Track BP history for trend
  if(f.bp&&systolic){
    const bpHist=load('bpHistory_'+(S.activeClientId||'default'),[]);
    bpHist.push({date:todayISO(),time:now(),bp:f.bp,sys:systolic,dia:diastolic,status:bpStatus?.level||'normal'});
    save('bpHistory_'+(S.activeClientId||'default'),bpHist.slice(-30));
  }
  toast('Vitals saved');

  // If PRN meds triggered  -  go to log and show suggestions
  if(prnTriggered.length){
    S.tab='log';
    renderShell();
  } else {
    goTab('log');
  }
}

function checkFoodAgainstDietProfile(foodName){
  var dp=getClientDietProfile();
  var plans=dp.plans||[];
  var conflicts=[];
  var foodLow=foodName.toLowerCase();
  
  plans.forEach(function(plan){
    var p=DIET_PLANS[plan];
    if(!p||!p.avoid) return;
    p.avoid.forEach(function(avoid){
      if(foodLow.indexOf(avoid.toLowerCase())>=0||avoid.toLowerCase().indexOf(foodLow)>=0){
        conflicts.push({plan:plan,avoid:avoid});
      }
    });
  });
  
  // Also check existing DIABETIC_RESTRICTED list
  if(plans.some(function(p){return p==='Diabetic Diet';})){
    if(DIABETIC_RESTRICTED.some(function(r){return foodLow.indexOf(r)>=0||r.indexOf(foodLow)>=0;})){
      if(!conflicts.find(function(c){return c.plan==='Diabetic Diet';})){
        conflicts.push({plan:'Diabetic Diet',avoid:foodName});
      }
    }
  }
  
  return conflicts;
}

function checkFoodAgainstAllergies(foodName){
  var allergies=patientProfile.allergies||'';
  if(!allergies.trim()) return [];
  var foodLow=foodName.toLowerCase().trim();
  var allergyList=allergies.split(/[,;\/\n]+/).map(function(a){return a.trim().toLowerCase();}).filter(Boolean);
  var matches=[];
  allergyList.forEach(function(a){
    if(!a) return;
    // Check exact match, partial match, or related terms
    if(foodLow.includes(a)||a.includes(foodLow)){
      matches.push(a);
      return;
    }
    // Common allergy groupings
    var groups={
      'shellfish':['shrimp','crab','lobster','clam','oyster','mussel','scallop','prawn','crawfish'],
      'tree nuts':['almond','cashew','walnut','pecan','pistachio','hazelnut','macadamia','brazil nut'],
      'peanuts':['peanut','peanut butter','groundnut'],
      'dairy':['milk','cheese','butter','cream','yogurt','whey','casein','lactose'],
      'eggs':['egg','mayonnaise','mayo'],
      'gluten':['wheat','barley','rye','bread','pasta','flour'],
      'fish':['salmon','tuna','tilapia','cod','halibut','bass','flounder'],
      'soy':['soy','tofu','edamame','miso','tempeh']
    };
    // If allergy is a group, check if food is in the group
    if(groups[a]&&groups[a].some(function(f){return foodLow.includes(f);})){
      matches.push(a);
      return;
    }
    // If food matches a group and allergy is a member
    Object.keys(groups).forEach(function(grp){
      if(groups[grp].includes(foodLow)&&a===grp) matches.push(a);
      if(groups[grp].some(function(f){return a.includes(f);})){
        if(groups[grp].some(function(f){return foodLow.includes(f);})) matches.push(a);
      }
    });
  });
  return [...new Set(matches)];
}

function getDietFoodCategories(planName){
  // Direct match
  if(DIET_FOOD_CATEGORIES[planName]) return DIET_FOOD_CATEGORIES[planName];
  // Partial match
  for(var key in DIET_FOOD_CATEGORIES){
    if(planName.toLowerCase().indexOf(key.toLowerCase())>=0||key.toLowerCase().indexOf(planName.toLowerCase())>=0){
      return DIET_FOOD_CATEGORIES[key];
    }
  }
  return null;
}
