function toggleSupplement(s){
  if(!S.form.meal.supplements) S.form.meal.supplements=[];
  const idx=S.form.meal.supplements.indexOf(s);
  if(idx>=0) S.form.meal.supplements.splice(idx,1);
  else S.form.meal.supplements.push(s);
  renderPage();
}

function addFoodItem(){
  const name=document.getElementById('food-name')?.value?.trim();
  const amount=document.getElementById('food-amount')?.value;
  const unit=document.getElementById('food-unit')?.value||'oz';
  const portionEaten=S.form.meal.newItemPortion||'All of it';
  if(!name){toast('Please enter a food name.');return;}
  if(!amount||parseFloat(amount)<=0){toast('Please enter an amount.');return;}
  if(!S.form.meal.foodItems) S.form.meal.foodItems=[];
  S.form.meal.foodItems.push({name,amount:parseFloat(amount),unit,portionEaten});
  S.form.meal.newItemPortion='All of it';
  S.form.meal._tmpName='';
  S.form.meal._tmpAmount='';
  renderPage();
}

function removeFoodItem(idx){
  if(!S.form.meal.foodItems) return;
  S.form.meal.foodItems.splice(idx,1);
  renderPage();
}

function saveMeal(){
  const note=document.getElementById('meal-note')?.value||'';
  const f=S.form.meal;
  if(f.type==='Supplements'){
    const supps=f.supplements||[];
    if(!supps.length){toast('Please select at least one supplement.');return;}
    const givenStr=f.suppGiven===true?'All given':f.suppGiven==='partial'?'Partially given':'Refused/not given';
    S.logs.push({id:Date.now(),type:'meal',date:today(),time:now(),clientId:S.activeClientId,caregiver:S.user.name,
      data:{meal:'Supplements',items:supps.join(', '),amount:givenStr,foodItems:[]},note});
    S.form.meal={type:'Breakfast',items:'',amount:'Full portion',note:'',foodItems:[],newItemPortion:'All of it',supplements:[],suppGiven:null};
    saveLogs();toast('Supplement log saved');goTab('log');
    return;
  }
  const foodItems=f.foodItems||[];
  if(!foodItems.length){toast('Please add at least one food item.');return;}
  const mealType=f.type||'Meal';
  const itemsSummary=foodItems.map(i=>`${i.amount} ${i.unit} ${i.name} (${i.portionEaten})`).join(', ');

  // Check for diabetic-restricted foods - show popup AND notify
  if(hasDiagnosis('diabetes')||hasDiagnosis('prediabetes')){
    const foodNames=foodItems.map(i=>i.name);
    const flagged=checkDiabeticFoods(foodNames);
    if(flagged.length){
      addNotif('[ALERT] DIETARY ALERT: '+(patientProfile.name||'Client')+' (diabetic/pre-diabetic) was given restricted food(s): '+(flagged.join(', '))+'. Logged by '+(S.user.name)+' at '+(now())+'.','all');
      S.foodAlertModal={foods:flagged,client:patientProfile.name||'Client',condition:hasDiagnosis('diabetes')?'Diabetes':'Pre-diabetes'};
    }
  }

  S.logs.push({id:Date.now(),type:'meal',date:today(),time:now(),clientId:S.activeClientId,caregiver:S.user.name,
    data:{meal:mealType,items:itemsSummary,amount:f.amount,foodItems},note});
  S.form.meal={type:'Breakfast',items:'',amount:'Full portion',note:'',foodItems:[],newItemPortion:'All of it',supplements:[],suppGiven:null};
  saveLogs();toast('Meal saved');goTab('log');
}

function renderFluid(){
  const f=S.form.fluid;
  const types=['Water','Juice','Milk','Tea','Coffee','Soup/Broth','Nutritional shake','Other'];
  const isSoup=f.type==='Soup/Broth';
  const isShake=f.type==='Nutritional shake';
  const amounts=isSoup?['4 oz (½ cup)','8 oz (1 cup)','12 oz (1½ cups)','16 oz (2 cups)']:
                isShake?['4 oz','6 oz','8 oz','10 oz','12 oz']:
                ['4 oz','6 oz','8 oz','10 oz','12 oz','16 oz','20 oz','24 oz','32 oz'];
  const pending=S.fluidPending||[];

  return `<div class="card">
    <div class="card-title"><i class="ti ti-droplet"></i>Record fluid intake</div>
    ${pending.length>0?`
    <div style="background:rgba(91,188,176,0.06);border:1px solid var(--accent);border-radius:var(--radius-sm);padding:10px;margin-bottom:12px">
      <div style="font-size:12px;font-weight:600;color:var(--accent-light);margin-bottom:8px">Queued (${pending.length} item${pending.length!==1?'s':''})  -  tap Save all when done</div>
      ${pending.map((item,i)=>`
      <div style="display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(91,188,176,0.2)">
        <div style="font-size:13px;color:var(--text)">💧 ${item.type}  -  ${item.amount}${item.note?' - '+item.note:''}</div>
        <button onclick="S.fluidPending.splice(${i},1);renderPage()" style="background:none;border:none;color:var(--danger);cursor:pointer;font-size:16px"><i class="ti ti-x"></i></button>
      </div>`).join('')}
      <button class="btn btn-primary" style="width:100%;margin-top:10px" onclick="saveAllFluids()">
        <i class="ti ti-check"></i> Save all ${pending.length} fluid${pending.length!==1?'s':''}
      </button>
    </div>`:''}
    <div class="field"><label class="lbl">Fluid type</label>
      <div class="chips">${types.map(t=>`<div class="chip ${f.type===t?'on':''}" onclick="toggleChip(S.form.fluid,'type','${t}',['amount'])">${t}</div>`).join('')}</div>
    </div>
    <div class="field"><label class="lbl">Amount${isSoup?' (cups shown as oz equivalent)':''}</label>
      <div class="chips">${amounts.map(a=>`<div class="chip ${f.amount===a?'on':''}" onclick="toggleChip(S.form.fluid,'amount','${a}')">${a}</div>`).join('')}</div>
      ${isShake?`<div style="margin-top:8px;display:flex;gap:8px;align-items:center">
        <input type="number" id="custom-oz" placeholder="Or enter oz (e.g. 8)" min="1" max="64" step="1" style="flex:1;padding:10px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:14px;outline:none" oninput="S.form.fluid.amount=this.value+\' oz\'"/>
        <span style="font-size:13px;color:var(--text2)">oz</span>
      </div>`:''}
    </div>
    <div class="field"><label class="lbl">Notes (optional)</label>
      <textarea id="fluid-note" placeholder="e.g. Drank with straw, refused initially..." oninput="S.form.fluid.note=this.value" style="width:100%;border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px;font-size:14px;background:var(--surface2);color:var(--text);min-height:60px;resize:vertical">${f.note}</textarea>
    </div>
    <div style="display:flex;gap:8px">
      <button class="voice-btn ${S.recording&&S.recordTarget==='fluid-note'?'listening':''} " onclick="toggleVoice('fluid-note')"><i class="ti ${S.recording&&S.recordTarget==='fluid-note'?'ti-microphone-off':'ti-microphone'}"></i> ${S.recording&&S.recordTarget==='fluid-note'?'Listening...':'Voice'}</button>
      <button class="btn" style="flex:1" onclick="addFluidPending()"><i class="ti ti-plus"></i> Add more</button>
      <button class="btn btn-primary" style="flex:1" onclick="saveFluid()"><i class="ti ti-check"></i> Save</button>
    </div>
    <div style="font-size:11px;color:var(--text3);margin-top:6px;text-align:center">"Add more" queues items - "Save" saves current item only - Queue shows above</div>
  </div>

  <div class="card">
    <div class="card-title"><i class="ti ti-chart-bar"></i>Today's fluid total</div>
    ${(()=>{
      const fluids=S.logs.filter(l=>l.type==='fluid');
      const goal=patientProfile.fluidGoalOz||64;
      const totalOz=fluids.reduce((sum,l)=>{
        if(l.data.ozVal) return sum+l.data.ozVal;
        const amtStr=l.data.amount||'';
        const ozMatch=amtStr.match(/(\d+\.?\d*)\s*oz/);
        if(ozMatch) return sum+parseFloat(ozMatch[1]);
        let amt=0;
        if(amtStr.includes('1½')||amtStr.includes('1.5'))amt=1.5;
        else if(amtStr.includes('½')||amtStr.includes('.5'))amt=0.5;
        else amt=parseFloat(amtStr)||0;
        const unit=l.data.unit||'oz';
        if(unit==='oz') return sum+amt;
        if(unit==='ml') return sum+(amt/29.574);
        if(unit==='cups'||amtStr.includes('cup')) return sum+(amt*8);
        return sum+amt;
      },0);
      const pct=Math.min(100,(totalOz/goal)*100);
      const color=pct>=100?'var(--accent)':pct>=60?'var(--blue)':'var(--danger)';
      return `
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px">

}


function addFluidPending(){
  const f=S.form.fluid;
  const note=document.getElementById('fluid-note')?.value||f.note||'';
  if(!f.type){toast('Please select a fluid type.');return;}
  if(!f.amount){toast('Please select an amount.');return;}
  if(!S.fluidPending) S.fluidPending=[];
  S.fluidPending.push({type:f.type,amount:f.amount,note,unit:'oz'});
  // Reset form for next item
  S.form.fluid={type:'Water',amount:'',unit:'oz',note:''};
  toast('Added to queue  -  select next fluid or tap Save all');
  renderPage();
}

function saveAllFluids(){
  if(!S.fluidPending||!S.fluidPending.length){toast('Nothing queued.');return;}
  S.fluidPending.forEach(item=>{
    const amtStr=item.amount||'';
    const ozMatch=amtStr.match(/(\d+\.?\d*)\s*oz/);
    const ozVal=ozMatch?parseFloat(ozMatch[1]):0;
    S.logs.push({id:Date.now()+Math.random(),type:'fluid',date:today(),time:now(),clientId:S.activeClientId,caregiver:S.user.name,
      data:{type:item.type,amount:item.amount,unit:'oz',ozVal},note:item.note||''});
  });
  const count=S.fluidPending.length;
  S.fluidPending=[];
  S.form.fluid={type:'Water',amount:'',unit:'oz',note:''};
  saveLogs();
  toast(`✓ ${count} fluid${count!==1?'s':''} saved`);
  goTab('log');
}

function saveFluid(){
  if(requiresClockIn()) return;
  
  const f=S.form.fluid;
  const note=document.getElementById('fluid-note')?.value||f.note;
  if(!f.type){toast('Please select a fluid type.');return;}
  if(!f.amount){toast('Please select an amount.');return;}
  // Calculate oz value from amount string
  let ozVal=0;
  const amtStr=f.amount;
  if(amtStr==='Full bottle'){
    // Ask for oz if full bottle  -  default 8oz shake
    const customOz=document.getElementById('custom-oz')?.value;
    ozVal=customOz?parseFloat(customOz):8;
  } else {
    const ozMatch=amtStr.match(/(\d+\.?\d*)\s*oz/);
    if(ozMatch) ozVal=parseFloat(ozMatch[1]);
    else if(amtStr.includes('cup')){
      const cupMatch=amtStr.match(/(\d+\.?\d*)/);
      ozVal=cupMatch?parseFloat(cupMatch[1])*8:0;
    }
  }
  // Build clean display string (no double oz)
  const displayAmount=amtStr.endsWith(' oz')?amtStr:
    amtStr==='Full bottle'?`${ozVal} oz (full bottle)`:amtStr;
  S.logs.push({id:Date.now(),type:'fluid',date:today(),time:now(),clientId:S.activeClientId,caregiver:S.user.name,
    data:{type:f.type,amount:displayAmount,unit:'oz',ozVal},note});
  S.form.fluid={type:'Water',amount:'',unit:'oz',note:''};
  saveLogs();toast('Fluid intake saved');goTab('log');
}

// -- NOTIFICATIONS TAB --------------------------------------------
function renderNotif(){
  const mine=myNotifs();
  const unread=mine.filter(n=>!n.read).length;
  // DON'T auto-read all — let user read individually or use Mark all read

  if(!mine.length) return `<div class="empty"><i class="ti ti-bell"></i>No notifications yet.</div>`;

  const byDate={};
  [...mine].reverse().forEach(n=>{
    const d=n.date||today();
    if(!byDate[d]) byDate[d]=[];
    byDate[d].push(n);
  });

  const dates=Object.keys(byDate).sort((a,b)=>b.localeCompare(a));
  // Default: today expanded, past collapsed  -  but always toggleable
  if(S.notifExpandedDate===undefined) S.notifExpandedDate=today();

  return `
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div class="card-title" style="margin-bottom:0">
        <i class="ti ti-bell"></i> Notifications
        ${unread>0?`<span style="background:var(--danger);color:white;font-size:11px;font-weight:700;padding:2px 7px;border-radius:100px;margin-left:6px">${unread} unread</span>`:''}
      </div>
      <div style="display:flex;gap:6px">
        ${unread>0?`<button onclick="markAllNotifsRead()" style="background:none;border:1px solid var(--accent);border-radius:100px;color:var(--accent);padding:4px 10px;font-size:11px;cursor:pointer">Mark all read</button>`:''}
        <button onclick="clearAllNotifs()" style="background:none;border:1px solid var(--border);border-radius:100px;color:var(--text3);padding:4px 10px;font-size:11px;cursor:pointer">Clear all</button>
      </div>
    </div>
    ${dates.map(date=>{
      const notes=byDate[date];
      const isOpen=S.notifExpandedDate===date;
      const hasUrgent=notes.some(n=>n.text&&(n.text.includes('URGENT')||n.text.includes('MISSED')||n.text.includes('OUT')||n.text.includes('MISMATCH')));
      const isToday=date===today();
      return `
      <div style="border:1px solid ${hasUrgent?'var(--danger)':'var(--border)'};border-radius:var(--radius-sm);margin-bottom:8px;overflow:hidden">
        <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 12px;cursor:pointer;background:${hasUrgent?'rgba(192,57,43,0.05)':isToday?'rgba(91,188,176,0.04)':'transparent'}"
          onclick="S.notifExpandedDate=S.notifExpandedDate==='${date}'?null:'${date}';renderPage()">
          <div style="display:flex;align-items:center;gap:8px">
            ${hasUrgent?'<i class="ti ti-alert-circle" style="color:var(--danger);font-size:16px"></i>':'<i class="ti ti-bell" style="color:var(--text3);font-size:15px"></i>'}
            <div>
              <div style="font-size:14px;font-weight:600;color:var(--text)">${isToday?'Today':formatDateNice(date)}</div>
              <div style="font-size:11px;color:var(--text3)">${notes.length} notification${notes.length!==1?'s':''}${hasUrgent?' - Urgent':''}</div>
            </div>
          </div>
          <i class="ti ${isOpen?'ti-chevron-up':'ti-chevron-down'}" style="color:var(--text3);font-size:18px"></i>
        </div>
        ${isOpen?`
        <div style="border-top:1px solid var(--border)">
          ${notes.map(n=>{
            const isUrgent=n.text&&(n.text.includes('URGENT')||n.text.includes('')||n.text.includes('OUT')||n.text.includes('MISMATCH'));
            return `
            <div onclick="markNotifRead('${n.id||n.time}')" style="display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-bottom:1px solid var(--border);background:${n.read?'transparent':isUrgent?'rgba(192,57,43,0.05)':'rgba(91,188,176,0.04)'};cursor:pointer">
              <div style="width:8px;height:8px;border-radius:50%;background:${n.read?'var(--border)':isUrgent?'var(--danger)':'var(--accent)'};flex-shrink:0;margin-top:5px;transition:background 0.2s"></div>
              <div style="flex:1;min-width:0">
                <div style="font-size:13px;color:${n.read?'var(--text2)':'var(--text)'};line-height:1.4;font-weight:${n.read?'400':'500'}">${n.text}</div>
                <div style="font-size:11px;color:var(--text3);margin-top:3px">${n.time||''}${n.read?'':' · <span style="color:var(--accent);font-weight:600">Unread</span>'}</div>
              </div>
              <button onclick="dismissNotif('${n.id||n.time}');event.stopPropagation()" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px;flex-shrink:0;padding:2px 4px">
                <i class="ti ti-x"></i>
              </button>
            </div>`;}).join('')}
        </div>`:''}
      </div>`;
    }).join('')}
  </div>`;
}

function dismissNotif(id){
  S.notifications=S.notifications.filter(n=>n.id!==id&&n.time!==id);
  saveLogs();renderPage();
}

function markNotifRead(id){
  const n=S.notifications.find(n=>n.id===id||n.time===id);
  if(n&&!n.read){n.read=true;saveLogs();renderPage();}
}

function markAllNotifsRead(){
  myNotifs().forEach(n=>n.read=true);
  saveLogs();renderPage();
  toast('All notifications marked as read');
}

function clearAllNotifs(){
  if(!confirm('Clear all notifications?')) return;
  S.notifications=[];saveLogs();renderPage();
}

// -- REPORT TAB ---------------------------------------------------
function buildReportText(){
  const _period=S.reportPeriod||'week';
  const _periodNames={day:'DAILY',week:'WEEKLY',month:'MONTHLY','3month':'3-MONTH',all:'FULL'};
  const _periodName=_periodNames[_period]||'WEEKLY';
  const d=new Date();
  const dateStr=d.toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  const lines=[];
  lines.push('------------------------------');
  lines.push('  STEWARDS OF CARE — '+_periodName+' REPORT');
  lines.push('------------------------------');
  lines.push('Client: '+(patientProfile.name||'N/A'));
  lines.push('Period: '+_periodName+' ending '+dateStr);
  lines.push('Generated: '+now()+' by '+S.user.name);
  lines.push('');

  // Get logs for the selected period
  const allLogs=load('logs',[]);
  const _today=todayISO();
  function _periodStart(p){
    var dd=new Date(_today+'T12:00:00');
    if(p==='day') return _today;
    if(p==='week'){dd.setDate(dd.getDate()-6);return localDateStr(dd);}
    if(p==='month'){dd.setDate(dd.getDate()-29);return localDateStr(dd);}
    if(p==='3month'){dd.setDate(dd.getDate()-89);return localDateStr(dd);}
    return '2000-01-01';
  }
  const _start=_periodStart(_period);
  // Combine stored logs + current S.logs (today in memory)
  const allCombined=[...allLogs,...S.logs.filter(l=>!allLogs.find(al=>al.id===l.id))];
  const periodLogs=allCombined.filter(l=>{
    const ld=l.date&&l.date.length===10?l.date:(l.date?localDateStr(new Date(l.date+'T12:00:00')):_today);
    return ld>=_start&&ld<=_today;
  });
  // Override S.logs reference below to use period logs
  const _logs=periodLogs;

  // Vitals
  const vitals=_logs.filter(l=>l.type==='vitals');
  lines.push('-- VITALS ---------------------');
  if(!vitals.length){lines.push('No vitals recorded.');}
  else vitals.forEach(v=>{
    lines.push(`${v.time}  Logged by ${v.caregiver}`);
    if(v.data.bp) lines.push(`  Blood pressure: ${v.data.bp}`);
    if(v.data.pulse) lines.push(`  Pulse: ${v.data.pulse} bpm`);
    if(v.data.temp) lines.push(`  Temperature: ${v.data.temp}°F`);
    if(v.data.o2) lines.push(`  O₂ saturation: ${v.data.o2}%`);
    if(v.data.weight) lines.push(`  Weight: ${v.data.weight} lbs`);
    if(v.note) lines.push(`  Note: ${v.note}`);
  });
  lines.push('');

  // Meals
  const meals=_logs.filter(l=>l.type==='meal');
  lines.push('-- MEALS / INTAKE -------------');
  if(!meals.length){lines.push('No meals recorded.');}
  else meals.forEach(m=>{
    const meal=m.data.meal.charAt(0).toUpperCase()+m.data.meal.slice(1);
    lines.push(`${m.time}  ${meal}  -  ${m.data.amount}`);
    lines.push(`  Items: ${m.data.items}`);
    if(m.note) lines.push(`  Note: ${m.note}`);
    lines.push(`  Logged by: ${m.caregiver}`);
  });
  lines.push('');

  // Hygiene
  const showers=_logs.filter(l=>l.type==='shower');
  const bms=_logs.filter(l=>l.type==='bm');
  lines.push('-- HYGIENE --------------------');
  if(!showers.length){lines.push('Shower: Not recorded.');}
  else showers.forEach(s=>{
    lines.push(`${s.time}  Shower: ${s.data.completed?'Completed ✓':'Refused/skipped ✗'}`);
    if(s.note) lines.push(`  Note: ${s.note}`);
    lines.push(`  Logged by: ${s.caregiver}`);
  });
  if(!bms.length){lines.push('BM: Not recorded.');}
  else bms.forEach(b=>{
    lines.push(`${b.time}  BM: ${b.data.occurred?'Occurred ✓  -  '+b.data.consistency:'No BM ✗'}`);
    if(b.note) lines.push(`  Note: ${b.note}`);
    lines.push(`  Logged by: ${b.caregiver}`);
  });
  lines.push('');

  // Notes (all + specific to user)
  const notes=_logs.filter(l=>l.type==='note'&&l.data.visibility==='all');
  lines.push('-- PASS-ON NOTES --------------');
  if(!notes.length){lines.push('No shared notes.');}
  else notes.forEach(n=>{
    lines.push(`${n.time}  From: ${n.caregiver}`);
    lines.push(`  ${n.data.text}`);
  });
  lines.push('');
  lines.push('------------------------------');
  lines.push('End of report  -  Stewards of Care App');
  lines.push('------------------------------');
  return lines.join('\n');
}

function deleteProfile(id){
  // Security: only Lead Caregiver can delete
  if(S.user.role!=='Lead Caregiver'&&S.user.role!=='Care Manager'){
    toast('Only the Lead Caregiver or Care Manager can remove caregivers.');
    return;
  }
  const cg=CAREGIVERS.find(c=>c.id===id);
  if(!cg) return;
  // Cannot delete yourself
  if(id===S.user.id){toast('You cannot remove yourself.');return;}
  // Cannot delete another Lead Caregiver without PIN
  if(cg.role==='Lead Caregiver'||cg.role==='Care Manager'){
    toast('Cannot remove another Lead Caregiver or Care Manager.');
    return;
  }
  S.deleteCaregiverId=id;
  S.deleteCaregiverName=cg.name;
  S.showDeleteCgModal=true;
  renderShell();
}

function confirmDeleteCaregiver(){
  const pin=document.getElementById('delete-cg-pin')?.value?.trim();
  if(!pin){toast('Enter your PIN to confirm');return;}
  // Check PIN against CAREGIVERS array (source of truth) and S.user
  const me=CAREGIVERS.find(function(c){return c.id===S.user.id;});
  const storedPin=me?me.pin:(S.user.pin||'');
  if(String(storedPin)!==String(pin)){
    const errEl=document.getElementById('delete-cg-error');
    if(errEl) errEl.textContent='Incorrect PIN. Try again.';
    toast('Incorrect PIN');
    return;
  }
  CAREGIVERS=CAREGIVERS.filter(c=>c.id!==S.deleteCaregiverId);
  save('caregivers',CAREGIVERS);
  addNotif('[Security] Caregiver '+S.deleteCaregiverName+' removed by '+S.user.name+' at '+now(),'all');
  toast(S.deleteCaregiverName+' removed');
  S.showDeleteCgModal=false;
  S.deleteCaregiverId=null;
  S.deleteCaregiverName=null;
  renderPage();
}

function cleanupCaregivers(){
  // Remove anyone from CAREGIVERS who is also in CLIENTS (they are a patient, not a caregiver)
  const clientNames=CLIENTS.map(c=>c.name.toLowerCase().trim());
  const before=CAREGIVERS.length;
  CAREGIVERS=CAREGIVERS.filter(function(cg){
    const isClient=clientNames.includes(cg.name.toLowerCase().trim());
    if(isClient) toast('Removed '+cg.name+' from caregiver list');
    return !isClient;
  });
  save('caregivers',CAREGIVERS);
  const removed=before-CAREGIVERS.length;
  if(removed===0){
    toast('No duplicates found - caregiver list is clean');
  } else {
    toast('Cleaned up '+removed+' caregiver(s) who are patients');
  }
  renderPage();
}

function renderReport(){
  // Get all unique dates from logs + shift history
  const allLogs=load('logs',[]);
  const shiftHistory=load('shiftHistory',[]);

  // Normalize any date string to ISO YYYY-MM-DD format
  const normalizeDate=(d)=>{
    if(!d) return todayISO();
    // Already ISO format
    if(/^\d{4}-\d{2}-\d{2}$/.test(d)) return d;
    // Try parsing old "Wed May 21 2026" or "Thu May 21" formats
    try{
      const parsed=new Date(d+'T12:00:00');
      if(!isNaN(parsed.getTime())) return localDateStr(parsed);
    }catch(e){}
    return todayISO();
  };

  // Build a map of dates → logs  -  normalize all dates to ISO
  const dateMap={};
  allLogs.forEach(l=>{
    const d=normalizeDate(l.date);
    if(!dateMap[d]) dateMap[d]={logs:[],shift:null};
    dateMap[d].logs.push(l);
  });
  shiftHistory.forEach(s=>{
    const d=normalizeDate(s.date);
    if(!dateMap[d]) dateMap[d]={logs:[],shift:null};
    dateMap[d].shift=s;
  });
  // Also include today even if no logs yet
  const td=todayISO();
  if(!dateMap[td]) dateMap[td]={logs:S.logs,shift:S.shiftStart&&S.shiftStart.caregiver?S.shiftStart:null};
  else dateMap[td].logs=S.logs;

  // Period filter
  const _period=S.reportPeriod||'week';
  const _today=todayISO();
  function _startOfPeriod(p){
    var d=new Date(_today+'T12:00:00');
    if(p==='day') return _today;
    if(p==='week'){d.setDate(d.getDate()-6);return localDateStr(d);}
    if(p==='month'){d.setDate(d.getDate()-29);return localDateStr(d);}
    if(p==='3month'){d.setDate(d.getDate()-89);return localDateStr(d);}
    return '2000-01-01'; // 'all'
  }
  const _start=_startOfPeriod(_period);

  const allDates=Object.keys(dateMap)
    .filter(d=>{
      const data=dateMap[d];
      return (data.logs&&data.logs.length>0)||(data.shift&&data.shift.clockedOut);
    })
    .sort((a,b)=>b.localeCompare(a));

  const dates=allDates.filter(d=>d>=_start);

  // Helper: compute oz from fluid log
  const fluidOz=l=>{
    if(l.data.ozVal) return l.data.ozVal;
    const amtStr=l.data.amount||'';
    const ozMatch=amtStr.match(/(\d+\.?\d*)\s*oz/);
    if(ozMatch) return parseFloat(ozMatch[1]);
    const amt=parseFloat(amtStr)||0;
    if(l.data.unit==='cups') return amt*8;
    return amt;
  };

  const renderDateDetail=(date,data,renderSection)=>{
    const logs=data.logs||[];
    const shift=data.shift;
    const vitals=logs.filter(l=>l.type==='vitals');
    const meals=logs.filter(l=>l.type==='meal');
    const fluids=logs.filter(l=>l.type==='fluid');
    const showers=logs.filter(l=>l.type==='shower');
    const bms=logs.filter(l=>l.type==='bm');
    const adls=logs.filter(l=>l.type==='adl');
    const notes=logs.filter(l=>l.type==='note');
    const totalOz=fluids.reduce((s,l)=>s+fluidOz(l),0);
    const goal=patientProfile.fluidGoalOz||64;
    const thresholds=load('bpThresholds',{highSys:140,urgentSys:160,highDia:90,urgentDia:100,lowSys:90,lowDia:60});
    if(!renderSection) renderSection=(key,label,content)=>`<div style="margin-bottom:10px"><div style="font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px">${label}</div>${content}</div>`;

    // Find restricted foods in today's meal logs
    const todayRestrictedFoods=[];
    meals.forEach(function(m){
      (m.data.foodItems||[]).forEach(function(fi){
        if(fi.isAvoid) todayRestrictedFoods.push({food:fi.name,meal:m.data.mealType||'Meal',time:m.time,caregiver:m.caregiver||''});
      });
    });

    // Build period summary stats
  var _totalVitals=0,_totalMeals=0,_totalFluids=0,_totalMeds=0,_totalNotes=0,_shifts=0;
  dates.forEach(function(d){
    var data=dateMap[d];
    var logs=data.logs||[];
    _totalVitals+=logs.filter(function(l){return l.type==='vitals';}).length;
    _totalMeals+=logs.filter(function(l){return l.type==='meal';}).length;
    _totalFluids+=logs.filter(function(l){return l.type==='fluid';}).length;
    _totalMeds+=logs.filter(function(l){return l.type==='medication';}).length;
    _totalNotes+=logs.filter(function(l){return l.type==='note';}).length;
    if(data.shift&&data.shift.clockedOut) _shifts++;
  });
  var _periodLabels={'day':'Today','week':'Last 7 days','month':'Last 30 days','3month':'Last 3 months','all':'All time'};
  var _periodLabel=_periodLabels[_period]||'Last 7 days';

  return `
    <!-- PERIOD SELECTOR -->
    <div class="card" style="padding:12px 14px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <div class="card-title" style="margin:0"><i class="ti ti-chart-bar" style="color:var(--accent)"></i> Report period</div>
        <div style="display:flex;gap:6px">
          <button onclick="copyReport()" style="padding:5px 10px;border:1px solid var(--border);border-radius:100px;background:none;color:var(--text2);font-size:11px;cursor:pointer"><i class="ti ti-copy"></i> Copy</button>
          <button onclick="downloadReport()" style="padding:5px 10px;border:1px solid var(--border);border-radius:100px;background:none;color:var(--text2);font-size:11px;cursor:pointer"><i class="ti ti-download"></i> Download</button>
        </div>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        ${['day','week','month','3month','all'].map(p=>`
          <button onclick="S.reportPeriod='${p}';renderPage()" style="padding:6px 14px;border-radius:100px;border:1px solid ${_period===p?'var(--accent)':'var(--border)'};background:${_period===p?'var(--accent)':'none'};color:${_period===p?'white':'var(--text2)'};font-size:12px;font-weight:${_period===p?'600':'400'};cursor:pointer">
            ${{day:'Today',week:'7 Days',month:'30 Days','3month':'3 Months',all:'All Time'}[p]}
          </button>`).join('')}
      </div>
    </div>

    <!-- SUMMARY CARD -->
    <div class="card" style="background:linear-gradient(135deg,var(--accent),#7ab8e8);color:white;padding:14px">
      <div style="font-size:13px;font-weight:700;opacity:0.9;margin-bottom:10px;text-transform:uppercase;letter-spacing:0.5px">${_periodLabel} Summary — ${patientProfile.name||'Client'}</div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">
        <div style="background:rgba(255,255,255,0.15);border-radius:8px;padding:8px;text-align:center">
          <div style="font-size:22px;font-weight:700">${dates.length}</div>
          <div style="font-size:10px;opacity:0.85">Days logged</div>
        </div>
        <div style="background:rgba(255,255,255,0.15);border-radius:8px;padding:8px;text-align:center">
          <div style="font-size:22px;font-weight:700">${_totalVitals}</div>
          <div style="font-size:10px;opacity:0.85">Vital checks</div>
        </div>
        <div style="background:rgba(255,255,255,0.15);border-radius:8px;padding:8px;text-align:center">
          <div style="font-size:22px;font-weight:700">${_shifts}</div>
          <div style="font-size:10px;opacity:0.85">Shifts</div>
        </div>
        <div style="background:rgba(255,255,255,0.15);border-radius:8px;padding:8px;text-align:center">
          <div style="font-size:22px;font-weight:700">${_totalMeals}</div>
          <div style="font-size:10px;opacity:0.85">Meals logged</div>
        </div>
        <div style="background:rgba(255,255,255,0.15);border-radius:8px;padding:8px;text-align:center">
          <div style="font-size:22px;font-weight:700">${_totalFluids}</div>
          <div style="font-size:10px;opacity:0.85">Fluid logs</div>
        </div>
        <div style="background:rgba(255,255,255,0.15);border-radius:8px;padding:8px;text-align:center">
          <div style="font-size:22px;font-weight:700">${_totalNotes}</div>
          <div style="font-size:10px;opacity:0.85">Notes</div>
        </div>
      </div>
    </div>

    ${todayRestrictedFoods.length>0?`
    <div style="background:rgba(232,135,90,0.08);border:1.5px solid #e8875a;border-radius:var(--radius-sm);padding:12px;margin-bottom:12px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <i class="ti ti-alert-triangle" style="color:#e8875a;font-size:18px"></i>
        <span style="font-size:13px;font-weight:700;color:#e8875a">Dietary restriction alert</span>
      </div>
      <div style="font-size:12px;color:var(--text2);margin-bottom:8px">The following restricted foods were consumed today:</div>
      ${todayRestrictedFoods.map(rf=>'<div style="display:flex;align-items:center;gap:6px;padding:6px 0;border-bottom:1px solid rgba(232,135,90,0.15)">'
        +'<span style="font-size:13px;font-weight:600;color:var(--text)">'+rf.food+'</span>'
        +'<span style="font-size:11px;color:var(--text3)">'+rf.meal+' · '+rf.time+(rf.caregiver?' · logged by '+rf.caregiver:'')+'</span>'
        +'</div>').join('')}
      <div style="font-size:11px;color:#e8875a;margin-top:8px;font-style:italic">This has been logged in the notification feed.</div>
    </div>`:''}
    ${shift?`<div style="background:var(--surface2);border-radius:var(--radius-sm);padding:10px;margin-bottom:10px;display:flex;gap:16px;flex-wrap:wrap">
      <div><div style="font-size:10px;color:var(--text3);text-transform:uppercase">Caregiver</div><div style="font-size:13px;font-weight:500">${shift.caregiver||' - '}</div></div>
      <div><div style="font-size:10px;color:var(--text3);text-transform:uppercase">Clock in</div><div style="font-size:13px;font-weight:500">${shift.time||' - '}</div></div>
      <div><div style="font-size:10px;color:var(--text3);text-transform:uppercase">Clock out</div><div style="font-size:13px;font-weight:500">${shift.clockOutTime||'Active'}</div></div>
      ${shift.durationMins?`<div><div style="font-size:10px;color:var(--text3);text-transform:uppercase">Duration</div><div style="font-size:13px;font-weight:500">${formatDuration(shift.durationMins)}</div></div>`:''}
    </div>`:''}
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px">
      <div style="background:${vitals.length?'rgba(91,188,176,0.08)':'var(--surface2)'};border-radius:var(--radius-sm);padding:8px;text-align:center">
        <div style="font-size:18px">${vitals.length?'❤️':' - '}</div><div style="font-size:10px;color:var(--text2)">Vitals</div>
        <div style="font-size:11px;font-weight:600;color:${vitals.length?'var(--accent-light)':'var(--text3)'}">${vitals.length?vitals.length+' logged':'None'}</div>

      <div style="background:${fluids.length?'rgba(91,188,176,0.08)':'var(--surface2)'};border-radius:var(--radius-sm);padding:8px;text-align:center">

      <div style="background:${meals.length?'rgba(91,188,176,0.08)':'var(--surface2)'};border-radius:var(--radius-sm);padding:8px;text-align:center">
        <div style="font-size:18px">${meals.length?'':' - '}</div><div style="font-size:10px;color:var(--text2)">Meals</div>
        <div style="font-size:11px;font-weight:600;color:${meals.length?'var(--accent-light)':'var(--text3)'}">${meals.length?meals.length+' logged':'None'}</div>
      </div>
      <div style="background:${showers.length?'rgba(91,188,176,0.08)':'var(--surface2)'};border-radius:var(--radius-sm);padding:8px;text-align:center">
        <div style="font-size:18px">🚿</div><div style="font-size:10px;color:var(--text2)">Hygiene</div>
        <div style="font-size:11px;font-weight:600;color:${showers.find(s=>s.data.completed)?'var(--accent-light)':'var(--text3)'}">${showers.find(s=>s.data.completed)?'Done':showers.length?'Refused':'None'}</div>
      </div>
      <div style="background:${adls.length?'rgba(91,188,176,0.08)':'var(--surface2)'};border-radius:var(--radius-sm);padding:8px;text-align:center">
        <div style="font-size:18px">${adls.length?'':' - '}</div><div style="font-size:10px;color:var(--text2)">ADLs</div>
        <div style="font-size:11px;font-weight:600;color:${adls.length?'var(--accent-light)':'var(--text3)'}">${adls.length?adls.length+' logged':'None'}</div>

      <div style="background:${bms.length?'rgba(91,188,176,0.08)':'var(--surface2)'};border-radius:var(--radius-sm);padding:8px;text-align:center">
        <div style="font-size:18px"></div><div style="font-size:10px;color:var(--text2)">BM</div>
        <div style="font-size:11px;font-weight:600;color:${bms.find(b=>b.data.occurred)?'var(--accent-light)':bms.length?'var(--warn)':'var(--text3)'}">${bms.find(b=>b.data.occurred)?'Yes':bms.length?'No BM':'None'}</div>
      </div>
    </div>
    ${vitals.length?renderSection('vitals','❤️ Vitals',vitals.map(v=>{
      const bpStat=getBPStatus(v.data.bp,thresholds);
      return `<div style="padding:7px 0;border-bottom:1px solid var(--border);font-size:12px;color:var(--text2)">
        <span style="color:var(--text3)">${v.time}</span>
        ${v.data.bp?` - BP <span style="color:${bpStat?bpStat.color:'var(--text)'};">${v.data.bp}</span>`:''}
        ${v.data.pulse?` - Pulse ${v.data.pulse}`:''}${v.data.temp?` - Temp ${v.data.temp}°F`:''}
        ${v.data.o2?` - O₂ ${v.data.o2}%`:''}${v.data.weight?` - ${v.data.weight} lbs`:''}
        ${v.note?`<div style="font-size:11px;color:var(--text3);margin-top:2px">${v.note}</div>`:''}
      </div>`;}).join('')):''}
    ${meals.length?renderSection('meals','Meals',meals.map(m=>`<div style="padding:7px 0;border-bottom:1px solid var(--border);font-size:12px">
      <span style="color:var(--text3)">${m.time}</span> - <span style="font-weight:500;color:var(--text)">${m.data.meal||'Meal'}</span>
      ${m.data.items?`<div style="color:var(--text2);margin-top:2px">${m.data.items.replace(/(\\d)(oz|piece|slice|cup|tbsp|tsp|g|ml|lb|kg)/gi,'$1 $2')}</div>`:''}
      ${m.data.amount?`<div style="color:var(--text3);font-size:11px">${m.data.amount}</div>`:''}
    </div>`).join('')):''}
    ${fluids.length?renderSection('fluids',`💧 Fluids  -  ${totalOz.toFixed(0)} oz of ${goal} oz`,fluids.map(f=>`<div style="padding:5px 0;border-bottom:1px solid var(--border);font-size:12px;color:var(--text2)">
      <span style="color:var(--text3)">${f.time}</span> - ${f.data.type} ${f.data.amount}${f.note?' - '+f.note:''}
    </div>`).join('')):''}
    ${adls.length?renderSection('adls','ADLs',adls.map(a=>`<div style="padding:5px 0;border-bottom:1px solid var(--border);font-size:12px;color:var(--text2)">
      <span style="color:var(--text3)">${a.time}</span>
      ${a.data?.sameAsBaseline?'<span style="color:var(--accent-light)"> - Same as baseline</span>':''}
      ${a.data?.changes?.length?`<div style="color:#e67e22;font-size:11px">Changes: ${a.data.changes.join(' | ')}</div>`:''}
      ${a.note&&!a.data?.sameAsBaseline?`<div style="font-size:11px;color:var(--text3)">${a.note}</div>`:''}
    </div>`).join('')):''}
    ${notes.length?renderSection('notes','📝 Notes',notes.map(n=>`<div style="padding:6px 0;border-bottom:1px solid var(--border);font-size:12px">
      <span style="color:var(--text3)">${n.time}</span>

      <div style="color:var(--text2);margin-top:2px">${n.note}</div>
    </div>`).join('')):''}
    <div style="display:flex;gap:8px;margin-top:12px">
      <button class="btn" style="flex:1" onclick="copyReportForDate('${date}')"><i class="ti ti-copy"></i> Copy</button>
      <button class="btn btn-primary" style="flex:1" onclick="shareReportForDate('${date}')"><i class="ti ti-share"></i> Share</button>
    </div>`;
  };


  return `
  <!-- BP TREND CHART -->
  ${(()=>{
    const trend=getBPTrend();
    if(trend.length<2) return '';

    const range=maxSys-minSys||1;
    const w=100/trend.length;
    const pct=(val)=>Math.round(((maxSys-val)/range)*80)+10;
    // Consecutive high days
    const byDate={};
    trend.forEach(r=>{if(!byDate[r.date])byDate[r.date]=[];byDate[r.date].push(r);});
    const dates=Object.keys(byDate).sort();
    let streak=0;
    dates.forEach(d=>{
      const anyHigh=byDate[d].some(r=>r.sys>=thresholds.highSys||r.dia>=thresholds.highDia);
      if(anyHigh)streak++;else streak=0;

      <div class="card-title"><i class="ti ti-chart-line" style="color:var(--danger)"></i> Blood pressure trend  -  last ${trend.length} readings</div>
      ${streak>=3?`<div style="background:rgba(192,57,43,0.08);border:1px solid var(--danger);border-radius:var(--radius-sm);padding:8px;margin-bottom:10px;font-size:12px;color:var(--danger)">

        <!-- Threshold lines -->
        <div style="position:absolute;left:0;right:0;top:${pct(thresholds.urgentSys)}%;border-top:1px dashed var(--danger);opacity:0.5"></div>
        <div style="position:absolute;left:0;right:0;top:${pct(thresholds.highSys)}%;border-top:1px dashed #e67e22;opacity:0.5"></div>
        <div style="position:absolute;left:0;right:0;top:${pct(thresholds.lowSys)}%;border-top:1px dashed var(--blue);opacity:0.5"></div>
        <!-- Data points -->
        ${trend.map((r,i)=>{
          const x=(i/(trend.length-1))*90+5;
          const y=pct(r.sys);
          const color=r.sys>=thresholds.urgentSys?'var(--danger)':r.sys>=thresholds.highSys?'#e67e22':r.sys<thresholds.lowSys?'var(--blue)':'var(--accent)';
          return `<div style="position:absolute;left:${x}%;top:${y}%;width:8px;height:8px;border-radius:50%;background:${color};transform:translate(-50%,-50%)" title="${r.date} ${r.time}: ${r.sys}/${r.dia}"></div>`;
        }).join('')}
        <!-- Connect dots with lines -->
        <svg style="position:absolute;inset:0;width:100%;height:100%" viewBox="0 0 100 100" preserveAspectRatio="none">
          <polyline points="${trend.map((r,i)=>((i/(trend.length-1))*90+5).toFixed(1)+','+pct(r.sys)).join(' ')}"
            fill="none" stroke="var(--accent)" stroke-width="1.5" opacity="0.7"/>
        </svg>
      </div>
      <!-- Legend -->
      <div style="display:flex;gap:12px;flex-wrap:wrap;font-size:11px;color:var(--text3);margin-bottom:8px">
        <span style="color:var(--danger)"> -  Urgent (${thresholds.urgentSys})</span>
        <span style="color:#e67e22"> -  High (${thresholds.highSys})</span>
        <span style="color:var(--blue)"> -  Low (${thresholds.lowSys})</span>

function copyReportForDate(date){
  const txt=buildReportTextForDate(date);
  navigator.clipboard.writeText(txt).then(()=>toast('Report copied!')).catch(()=>toast('Copy failed'));
}

function shareReportForDate(date){
  const txt=buildReportTextForDate(date);
  if(navigator.share){navigator.share({title:'Care Report  -  '+date,text:txt}).catch(()=>{});}
  else{navigator.clipboard.writeText(txt).then(()=>toast('Copied!')).catch(()=>{});}
}

function buildReportTextForDate(date){
  const allLogs=load('logs',[]);
  const logs=allLogs.filter(l=>(l.date||today())===date);
  const shiftHistory=load('shiftHistory',[]);
  const shift=shiftHistory.find(s=>s.date===date);
  const lines=[
    '-------------------------------',
    `  CARE REPORT  -  ${date}`,
    '-------------------------------',
    `Patient: ${patientProfile.name||' - '}`,
    shift?`Caregiver: ${shift.caregiver} - ${shift.time} → ${shift.clockOutTime||'Active'}`:'',
    ''
  ];
  const vitals=logs.filter(l=>l.type==='vitals');
  if(vitals.length){lines.push('-- VITALS ---------------------');vitals.forEach(v=>{lines.push(`${v.time}: BP ${v.data.bp||' - '} - Pulse ${v.data.pulse||' - '} - Temp ${v.data.temp||' - '}°F - O₂ ${v.data.o2||' - '}%`);});}
  const meals=logs.filter(l=>l.type==='meal');
  if(meals.length){lines.push('');lines.push('-- MEALS ----------------------');meals.forEach(m=>{lines.push(`${m.time}: ${m.data.mealType||m.data.meal||'Meal'}  -  ${m.data.items||''} (${m.data.portion||m.data.amount||''})`);});}
  // Flag restricted foods
  var restrictedInReport=[];
  meals.forEach(function(m){(m.data.foodItems||[]).forEach(function(fi){if(fi.isAvoid)restrictedInReport.push(fi.name+' ('+( m.data.mealType||'Meal')+' '+m.time+')');});});
  if(restrictedInReport.length){lines.push('');lines.push('⚠ DIETARY ALERT - RESTRICTED FOODS EATEN:');restrictedInReport.forEach(function(f){lines.push('  • '+f);});lines.push('  Action required: notify supervising nurse/physician');}
  const fluids=logs.filter(l=>l.type==='fluid');
  if(fluids.length){lines.push('');lines.push('-- FLUIDS ---------------------');fluids.forEach(f=>{lines.push(`${f.time}: ${f.data.type}  -  ${f.data.amount}`);});}
  const notes=logs.filter(l=>l.type==='note');
  if(notes.length){lines.push('');lines.push('-- NOTES ----------------------');notes.forEach(n=>{lines.push(`${n.time}: ${n.data.text||n.note||''}`);});}
  lines.push('');lines.push('-------------------------------');
  lines.push('Stewards of Care');
  return lines.filter(l=>l!==undefined).join('\n');
}

function copyReport(){
  const txt=buildReportText();
  navigator.clipboard.writeText(txt).then(()=>toast('Report copied!')).catch(()=>{
    // Fallback
    const ta=document.createElement('textarea');
    ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
    toast('Report copied!');
  });
}

function shareReport(){
  const txt=buildReportText();
  const d=new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  if(navigator.share){
    navigator.share({title:`Stewards of Care Report  -  ${d}`,text:txt}).catch(()=>{});
  } else {
    copyReport();
    toast('Copied! Paste into WhatsApp or email.');
  }
}

function downloadReport(){
  const txt=buildReportText();
  const d=todayISO();
  const blob=new Blob([txt],{type:'text/plain'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`carelog-report-${d}.txt`;a.click();
  URL.revokeObjectURL(url);
  toast('Report downloaded');
}

  // CHANGE MODE  -  show all ADLs to log what's different

function saveADLBaseline(){
  const cid=S.activeClientId||'default';
  const form=S.adlBaselineForm||{};
  const notes=document.getElementById('adl-baseline-notes')?.value||'';
  const bl={date:todayISO(),setBy:S.user.name,notes,...form};
  save('adlBaseline_'+cid,bl);
  S.adlBaselineForm={};
  S.adlMode='choose';
  toast('ADL baseline saved');
  renderPage();
}

function saveADLSameAsBaseline(){
  const cid=S.activeClientId||'default';
  const baseline=load('adlBaseline_'+cid,null);
  if(!baseline){toast('No baseline set yet.');S.adlMode='baseline';renderPage();return;}
  const data={...baseline,sameAsBaseline:true};
  delete data.date;delete data.setBy;delete data.notes;
  S.logs.push({id:Date.now(),type:'adl',date:today(),time:now(),clientId:S.activeClientId,caregiver:S.user.name,
    data:{entries:data,sameAsBaseline:true},note:'All ADLs within baseline'});
  saveLogs();
  S.adlMode='choose';
  toast('ADLs logged  -  same as baseline');
  goTab('log');
}

function saveADLWithChanges(){
  const cid=S.activeClientId||'default';
  const baseline=load('adlBaseline_'+cid,null);
  const note=document.getElementById('adl-notes')?.value||S.adlNotes||'';
  const allItems=[...ADL_ITEMS,...IADL_ITEMS];

  // Build final entries  -  changed items use new value, others use baseline
  const data={};
  const changes=[];
  allItems.forEach(item=>{
    const newVal=S.adlForm[item.key]||'';
    const blVal=baseline?baseline[item.key]:'';
    if(newVal&&newVal!==blVal){
      data[item.key]=newVal;
      changes.push(`${item.label}: ${blVal||'not set'} → ${newVal}`);
    } else if(blVal){
      data[item.key]=blVal;
    }
  });
  if(S.adlForm.fallPrevention?.length) data.fallPrevention=S.adlForm.fallPrevention.join(', ');

  if(!Object.keys(data).length&&!S.adlForm.fallPrevention?.length){
    toast('Please select at least one activity or change.');return;
  }

  // Alert team if changes detected
  if(changes.length){
    addNotif('[!] ADL CHANGE: '+(patientProfile.name||'Client')+'  -  '+(changes.join(' | '))+'. Logged by '+(S.user.name)+' at '+(now())+'.','all');
  }

  S.logs.push({id:Date.now(),type:'adl',date:today(),time:now(),clientId:S.activeClientId,caregiver:S.user.name,
    data:{entries:data,changes,hasChanges:changes.length>0},note:note||(changes.length?'Changes: '+changes.join('; '):'ADL log')});

  S.adlForm={};S.adlNotes='';S.adlMode='choose';
  saveLogs();
  toast(changes.length?`${changes.length} ADL change${changes.length!==1?'s':''} logged`:'ADL log saved');
  goTab('log');
}

// Keep original saveADL as fallback
function saveADL(){
  saveADLWithChanges();
}

function toggleFallMeasure(fi){
  const f=FALL_PREVENTION[fi];
  if(!f) return;
  const cid=S.activeClientId||'default';
  const fpBaseline=load('fallBaseline_'+cid,null);
  if(!S.fallForm) S.fallForm={measures:[...(fpBaseline?.measures||[])]};
  if(!S.fallForm.measures) S.fallForm.measures=[...(fpBaseline?.measures||[])];
  const idx=S.fallForm.measures.indexOf(f);
  if(idx>=0) S.fallForm.measures.splice(idx,1);
  else S.fallForm.measures.push(f);
  renderPage();
}

function saveFallBaseline(){
  const cid=S.activeClientId||'default';
  const measures=S.fallBaseline||[];
  if(!measures.length){toast('Please select at least one standard measure.');return;}
  save('fallBaseline_'+cid,{measures,setBy:S.user.name,date:todayISO()});
  S.fallMode='choose';S.fallBaseline=null;
  toast('Standard fall prevention measures saved');renderPage();
}

function saveFallSameAsBaseline(){
  const cid=S.activeClientId||'default';
  const fpBaseline=load('fallBaseline_'+cid,null);
  if(!fpBaseline) return;
  S.logs.push({id:Date.now(),type:'note',date:today(),time:now(),clientId:S.activeClientId,caregiver:S.user.name,
    data:{category:'Fall prevention',measures:fpBaseline.measures,sameAsBaseline:true},
    note:'Fall prevention: All standard measures in place  -  '+fpBaseline.measures.join(', ')});
  saveLogs();
  S.fallMode='choose';
  toast('Fall prevention logged  -  standard measures confirmed');goTab('log');
}

function saveFallChanges(){
  const cid=S.activeClientId||'default';
  const fpBaseline=load('fallBaseline_'+cid,null);
  const note=document.getElementById('fall-change-note')?.value||'';
  const currentMeasures=S.fallForm?.measures||fpBaseline?.measures||[];
  const standardMeasures=fpBaseline?.measures||[];
  const added=currentMeasures.filter(m=>!standardMeasures.includes(m));
  const removed=standardMeasures.filter(m=>!currentMeasures.includes(m));
  const changes=[];
  if(added.length) changes.push('Added: '+added.join(', '));
  if(removed.length) changes.push('Removed: '+removed.join(', '));
  if(changes.length){
    addNotif('[!] FALL PREVENTION CHANGE: '+(patientProfile.name||'Client')+'  -  '+(changes.join(' | '))+'. By '+(S.user.name)+' at '+(now())+'.','all');
  }
  S.logs.push({id:Date.now(),type:'note',date:today(),time:now(),clientId:S.activeClientId,caregiver:S.user.name,
    data:{category:'Fall prevention',measures:currentMeasures,changes,hasChanges:changes.length>0},
    note:'Fall prevention'+(changes.length?'  -  CHANGES: '+changes.join('; '):'  -  standard measures')+'. '+note});
  saveLogs();
  S.fallMode='choose';S.fallForm=null;
  toast(changes.length?`Fall prevention changes logged`:'Fall prevention logged');goTab('log');
}

function toggleFallPrevention(fi){
  const f=FALL_PREVENTION[fi];
  if(!f) return;
  if(!S.adlForm.fallPrevention) S.adlForm.fallPrevention=[];
  const idx=S.adlForm.fallPrevention.indexOf(f);
  if(idx>=0) S.adlForm.fallPrevention.splice(idx,1);
  else S.adlForm.fallPrevention.push(f);
  renderPage();
}

function getFoodMeasureOptions(foodName){
  const f=foodName.toLowerCase();

  if(f.includes('egg')){
    return {units:['whole egg','egg white only','scrambled'],amounts:['1','2','3','4'],label:'Qty & type'};
  }
  if(f.includes('fish')||f.includes('salmon')||f.includes('tuna')||f.includes('sardine')||f.includes('trout')){
    return {units:['oz'],amounts:['2','3','4','6','8'],label:'Amount'};
  }
  if(f.includes('chicken')||f.includes('turkey')||f.includes('poultry')){
    return {units:['oz'],amounts:['2','3','4','6','8'],label:'Amount'};
  }
  // Grapes  -  pieces or cups
  if(f.includes('grape')){
    return {units:['pieces','cup','½ cup'],amounts:['5','10','15','20','½','1'],label:'Qty or amount'};
  }
  // Small berries  -  count + size OR cups
  if(f.includes('strawberr')){
    return {units:['small','medium','large','cup','½ cup'],amounts:['2','3','4','5','6','8','½','1'],label:'Qty & size'};
  }
  if(f.includes('blueberr')||f.includes('raspberr')||f.includes('blackberr')){
    return {units:['cup','½ cup','¼ cup','oz'],amounts:['¼','½','¾','1','1½'],label:'Amount'};
  }
  if(f.includes('berr')){
    return {units:['cup','½ cup','pieces'],amounts:['¼','½','1','5','10','15'],label:'Amount or count'};
  }
  // Whole fruits  -  count + size
  if(f.includes('banana')){
    return {units:['small','medium','large'],amounts:['½','1','2'],label:'Qty & size'};
  }
  if(f.includes('orange')||f.includes('apple')||f.includes('pear')||f.includes('peach')||f.includes('plum')||f.includes('nectarine')){
    return {units:['small','medium','large'],amounts:['½','1','2'],label:'Qty & size'};
  }
  if(f.includes('mango')){
    return {units:['cup','half','whole'],amounts:['¼','½','¾','1'],label:'Amount'};
  }
  if(f.includes('fig')||f.includes('date')){
    return {units:['pieces'],amounts:['1','2','3','4','5'],label:'Count'};
  }
  if(f.includes('cherry')){
    return {units:['pieces','cup','½ cup'],amounts:['5','10','15','20','½','1'],label:'Qty or amount'};
  }
  if(f.includes('melon')||f.includes('watermelon')||f.includes('cantaloupe')){
    return {units:['cup','slice','oz'],amounts:['½','1','1½','2'],label:'Amount'};
  }
  if(f.includes('avocado')){
    return {units:['whole','half','quarter','oz'],amounts:['¼','½','1'],label:'Amount'};
  }
  // Leafy greens
  if(f.includes('spinach')||f.includes('kale')||f.includes('lettuce')||f.includes('greens')){
    return {units:['cup','oz'],amounts:['½','1','1½','2'],label:'Amount'};
  }
  // Vegetables
  if(f.includes('broccoli')||f.includes('carrot')||f.includes('tomato')||f.includes('pepper')||
     f.includes('squash')||f.includes('beet')||f.includes('vegetable')){
    return {units:['cup','oz','piece'],amounts:['½','1','1½','2'],label:'Amount'};
  }
  // Grains
  if(f.includes('bread')||f.includes('toast')||f.includes('pita')){
    return {units:['slice','piece'],amounts:['½','1','2'],label:'Slices'};
  }
  if(f.includes('rice')||f.includes('quinoa')||f.includes('pasta')||f.includes('oat')||
     f.includes('grain')||f.includes('cereal')||f.includes('barley')||f.includes('bulgur')){
    return {units:['cup','½ cup','oz'],amounts:['¼','½','¾','1','1½'],label:'Amount'};
  }
  // Dairy
  if(f.includes('milk')||f.includes('yogurt')||f.includes('cheese')||f.includes('cottage')){
    return {units:['cup','oz','tbsp'],amounts:['¼','½','¾','1','2'],label:'Amount'};
  }
  // Oils
  if(f.includes('olive oil')||f.includes('oil')){
    return {units:['tsp','tbsp'],amounts:['½','1','2','3'],label:'Amount'};
  }
  // Nuts & seeds
  if(f.includes('almond')||f.includes('walnut')||f.includes('pistachio')||
     f.includes('nut')||f.includes('seed')){
    return {units:['oz','tbsp','handful'],amounts:['½','1','2'],label:'Amount'};
  }
  // Legumes
  if(f.includes('bean')||f.includes('lentil')||f.includes('chickpea')||f.includes('pea')||f.includes('tofu')){
    return {units:['cup','oz'],amounts:['¼','½','¾','1'],label:'Amount'};
  }
  if(f.includes('popcorn')){
    return {units:['cup'],amounts:['1','2','3','4'],label:'Amount'};
  }
  // Default
  return {units:['oz','cup','tbsp','piece','serving'],amounts:['½','1','2','3','4'],label:'Amount'};
}

function toggleDietFood(idx){
  const selectedDiet=S.dietForm.diet||dietProfile.diet||'';
  const dietData=DIETS[selectedDiet];
  if(!dietData) return;
  const allFoods=Object.values(dietData.foods).flat();
  const f=allFoods[idx];
  if(!f) return;
  // Toggle: if already selected and this is the active panel, deselect. Otherwise select and open panel.
  if(S.dietFoodPanel&&S.dietFoodPanel.food===f){
    // Already open  -  close panel but keep food selected
    S.dietFoodPanel=null;
  } else {
    const opts=getFoodMeasureOptions(f);
    S.dietFoodPanel={food:f,idx,amount:opts.amounts[1]||'1',unit:opts.units[0]||'oz'};
    if(!S.dietForm.foods.includes(f)) S.dietForm.foods.push(f);
  }
  renderPage();
}

function saveDietMeal(){
  const note=document.getElementById('diet-meal-note')?.value||S.dietForm.note;
  const activeDiet=S.dietForm.diet||dietProfile.diet||'';
  if(!activeDiet){toast('Please select a diet plan first.');return;}
  if(!S.dietForm.foods.length){toast('Please select at least one food.');return;}
  const foodAmounts=S.dietForm.foodAmounts||{};
  const itemsWithAmounts=S.dietForm.foods.map(f=>foodAmounts[f]?`${f} (${foodAmounts[f]})`:f).join(', ');

  // Check for diabetic-restricted foods if client has diabetes/pre-diabetes
  if(hasDiagnosis('diabetes')||hasDiagnosis('prediabetes')){
    const flagged=checkDiabeticFoods(S.dietForm.foods);
    if(flagged.length){
      addNotif('[ALERT] DIETARY ALERT: '+(patientProfile.name||'Client')+' (diabetic) was given restricted food(s): '+(flagged.join(', '))+'. Logged by '+(S.user.name)+' at '+(now())+'.','all');
      toast('Restricted food flagged  -  team alerted');
    }
  }
  // Also check dietary restrictions set in profile
  checkDietaryRestrictions(S.dietForm.foods);

  S.logs.push({id:Date.now(),type:'meal',date:today(),time:now(),clientId:S.activeClientId,caregiver:S.user.name,
    data:{meal:'Diet meal',items:itemsWithAmounts,amount:S.dietForm.amount,diet:activeDiet,foodAmounts,flagged:(hasDiagnosis('diabetes')||hasDiagnosis('prediabetes'))?checkDiabeticFoods(S.dietForm.foods):[]},note});
  S.dietForm={diet:dietProfile.diet||'',category:'',foods:[],foodAmounts:{},amount:'Full portion',note:''};
  S.dietFoodPanel=null;
  saveLogs();toast('Diet meal saved');goTab('log');
}

  'banana','grapes','mango','pineapple','watermelon','corn',

function checkDiabeticFoods(foods){
  const flagged=[];
  foods.forEach(food=>{
    const fl=food.toLowerCase();
    if(DIABETIC_RESTRICTED.some(r=>fl.includes(r)||r.includes(fl))){
      flagged.push(food);
    }
  });
  return [...new Set(flagged)];
}

function checkDietaryRestrictions(foods){
  const restrictions=[...(patientProfile.foodRestrictions||[]),...(dietProfile.restrictions||[])];
  const dietPlan=patientProfile.dietPlan||'';
  if(!restrictions.length&&!dietPlan) return;
  const flagged=[];
  foods.forEach(food=>{
    const fl=food.toLowerCase();
    restrictions.forEach(r=>{
      const rl=r.toLowerCase().replace('no ','');
      if(fl.includes(rl)||rl.includes(fl)){
        flagged.push(food+' (restricted: '+r+')');
      }
    });
  });
  if(flagged.length){
    addNotif('[!] RESTRICTION ALERT: '+(patientProfile.name||'Client')+' was given food against dietary restrictions: '+(flagged.join(', '))+'. Logged by '+(S.user.name)+'.','all');
  }
}

function hasDiagnosis(key){
  // Check diagnosis chips array
  if((patientProfile.diagnoses||[]).includes(key)) return true;
  // Check free-text diagnosis field
  const dxText=(patientProfile.diagnosis||'').toLowerCase();
  const k=key.toLowerCase().replace(/-/g,' ').replace('prediabetes','pre-diabetes');
  if(dxText.includes(k)) return true;
  if(k==='prediabetes'&&(dxText.includes('pre-diabetes')||dxText.includes('pre diabetes'))) return true;
  if(k==='diabetes'&&(dxText.includes('diabetes')||dxText.includes('diabetic'))) return true;
  if(k==='dementia'&&(dxText.includes('dementia')||dxText.includes('alzheimer'))) return true;
  if(k==='hypertension'&&(dxText.includes('hypertension')||dxText.includes('high blood pressure'))) return true;
  if(k==='depression'&&dxText.includes('depression')) return true;
  if(k==='parkinsons'&&(dxText.includes('parkinson'))) return true;
  if(k==="parkinson's disease"&&(dxText.includes('parkinson')||(patientProfile.diagnoses||[]).some(function(d){return d.toLowerCase().includes('parkinson');}))) return true;
  if(k==="alzheimer's disease"&&(dxText.includes('alzheimer')||(patientProfile.diagnoses||[]).some(function(d){return d.toLowerCase().includes('alzheimer');}))) return true;
  if(k==='type 1 diabetes'||k==='type 2 diabetes'||k==='diabetes'){if(dxText.includes('diabetes')||(patientProfile.diagnoses||[]).some(function(d){return d.toLowerCase().includes('diabetes');})) return true;}
  if(k==='cognitive_decline'&&(dxText.includes('dementia')||dxText.includes('alzheimer')||dxText.includes('cognitive'))) return true;
  // Check otherDiagnoses array
  return (patientProfile.otherDiagnoses||[]).some(function(d){return d.toLowerCase().includes(k);});
}

  const a=document.createElement('a');
  a.href=doc.data;
  a.download=doc.name;
  a.click();
  toast(''+doc.name+' downloading...');
}

function handleDocumentUpload(input){
  const file=input.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=(e)=>{
    if(!patientProfile.documents) patientProfile.documents=[];
    patientProfile.documents.push({
      name:file.name,
      type:file.type,
      size:file.size,
      data:e.target.result,
      uploadedAt:now(),
      uploadedBy:S.user.name,
      uploadedDate:todayISO()
    });
    savePatientProfile();
    toast(''+file.name+' uploaded');
    renderPage();
  };
  reader.readAsDataURL(file);
}

// Auto-format DOB as MM/DD/YYYY
function formatDOB(val){
  const d=val.replace(/\D/g,'').slice(0,8);
  if(d.length<=2) return d;
  if(d.length<=4) return d.slice(0,2)+'/'+d.slice(2);
  return d.slice(0,2)+'/'+d.slice(2,4)+'/'+d.slice(4);
}
// Auto-format phone as (XXX) XXX-XXXX
function formatPhone(val){
  const d=val.replace(/\D/g,'').slice(0,10);
  if(d.length<=3) return d;
  if(d.length<=6) return '('+d.slice(0,3)+') '+d.slice(3);
  return '('+d.slice(0,3)+') '+d.slice(3,6)+'-'+d.slice(6);
}

function getClientConditions(){
  const p=patientProfile;
  // Read from BOTH diagnosis text field AND diagnoses array (chips)
  const textDx=(p.diagnosis||'').split(',').map(function(d){return d.trim();}).filter(Boolean);
  const chipDx=(p.diagnoses||[]);
  // Combine and deduplicate
  const combined=textDx.concat(chipDx);
  const allDx=combined.filter(function(d,i){return d&&combined.indexOf(d)===i;})
    .concat(p.otherDiagnoses||[])
    .filter(Boolean);
  const matched=[];
  const usedLabels=[];
  allDx.forEach(function(dx){
    var dxLow=dx.toLowerCase();
    Object.keys(CONDITION_BASELINES).forEach(function(key){
      var keyLow=key.toLowerCase();
      var isMatch=dxLow.indexOf(keyLow)>=0 || keyLow.indexOf(dxLow)>=0;
      if(!isMatch) return;
      var cfg=CONDITION_BASELINES[key];
      // Deduplicate by label - don't add same label twice
      if(usedLabels.indexOf(cfg.label)>=0) return;
      // If dx contains 'mixed dementia', prefer 'Mixed Dementia' key over 'Dementia'
      if(key==='Dementia' && dxLow.indexOf('mixed')>=0) return;
      if(!matched.find(function(m){return m.key===key;})){
        matched.push({key:key,label:cfg.label,dx:dx});
        usedLabels.push(cfg.label);
      }
    });
  });
  return matched;
}

function addConditionAndBaseline(condKey){
  // Add the condition to the client's diagnosis AND show the baseline form
  var cur=patientProfile.diagnosis||'';
  // Map key back to display name
  var displayName=condKey;
  if(!cur.includes(displayName)){
    patientProfile.diagnosis=cur?cur+', '+displayName:displayName;
    savePatientProfile();
  }
  toast(displayName+' added — fill in the baseline below');
  renderPage();
}

function renderBaselineSection(){
  const conditions=getClientConditions();
  if(!conditions.length) return '<div style="font-size:13px;color:var(--text2);padding:8px 0">No conditions with baseline tracking. Add diagnoses in the Personal Information section above.</div>';
  const baselines=getClientBaselines();
  const isLead=(S.user.role==="Lead Caregiver"||S.user.role==="Care Manager");
  var html='';

  conditions.forEach(function(cond){
    const bl=baselines[cond.key]||{};
    const locked=bl._locked||false;
    const config=CONDITION_BASELINES[cond.key];
    if(!config) return;

    var fieldsHtml='';
    config.fields.forEach(function(f){
      const val=(bl[f.id]||'').replace(/"/g,'&quot;');
      const ck=cond.key.replace(/'/g,"\'");
      if(locked){
        fieldsHtml+='<div style="margin-bottom:8px"><div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.3px;margin-bottom:2px">'+f.label+'</div>'

      } else if(f.type==='select'){
        var opts='<option value="">Select...</option>';
        f.options.forEach(function(o){opts+='<option value="'+o+'"'+(bl[f.id]===o?' selected':'')+'>'+o+'</option>';});
        fieldsHtml+='<div class="field"><label class="lbl">'+f.label+'</label>'
          +'<div style="position:relative">'
          +'<select onchange="saveClientBaseline(this.dataset.ck,this.dataset.fid,this.value)" data-ck="'+ck+'" data-fid="'+f.id+'" style="width:100%;padding:10px 32px 10px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:13px;outline:none;appearance:none;-webkit-appearance:none">'+opts+'</select>'
          +'<i class="ti ti-chevron-down" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--accent);font-size:13px"></i>'
          +'</div></div>';
      } else {
        fieldsHtml+='<div class="field"><label class="lbl">'+f.label+'</label>'
          +'<input type="text" placeholder="'+(f.placeholder||'')+'" value="'+val+'" onchange="saveClientBaseline(this.dataset.ck,this.dataset.fid,this.value)" data-ck="'+ck+'" data-fid="'+f.id+'" style="width:100%;padding:10px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:13px;outline:none"/>'
          +'</div>';
      }
    });

    const lockedBadge=locked
      ?'<span style="font-size:10px;background:rgba(91,188,176,0.15);color:var(--accent-light);padding:2px 8px;border-radius:100px;border:1px solid var(--accent);margin-left:6px">Set '+bl._setDate+'</span>'
      :'';
    const actionBtn=isLead
      ?(locked
        ?'<button onclick="unlockBaseline(\''+cond.key.replace(/'/g,"\'")+'\')" style="background:none;border:1px solid var(--blue);border-radius:100px;color:var(--blue);padding:3px 10px;font-size:11px;cursor:pointer"><i class="ti ti-pencil"></i> Edit</button>'
        :'<button onclick="lockBaseline(\''+cond.key.replace(/'/g,"\'")+'\')" style="background:var(--accent);border:none;border-radius:100px;color:white;padding:5px 12px;font-size:11px;cursor:pointer;font-weight:600"><i class="ti ti-lock"></i> Set baseline</button>')
      :'';

    html+='<div style="border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:12px;overflow:hidden">'
      +'<div style="background:var(--surface2);padding:12px 14px;display:flex;align-items:center;justify-content:space-between">'
      +'<div style="display:flex;align-items:center;gap:8px">'
      +'<i class="ti ti-activity" style="color:var(--accent);font-size:16px"></i>'
      +'<span style="font-size:14px;font-weight:600;color:var(--text)">'+cond.label+'</span>'
      +lockedBadge
      +'</div>'+actionBtn+'</div>'
      +'<div style="padding:14px">'+fieldsHtml+'</div>'
      +'</div>';
  });

  // Show buttons to add condition baselines not yet in diagnosis (Lead only)
  if(isLead){
    var allBaselineKeys=["Dementia","Mixed Dementia","Parkinson\'s Disease","Alzheimer\'s Disease","Pre-diabetes","Type 2 Diabetes","Hypertension","Depression","Anxiety","Fall Risk"];
    var notInDx=allBaselineKeys.filter(function(k){
      return !conditions.find(function(c){return c.key===k;});
    });
    if(notInDx.length>0){
      html+='<div style="margin-top:12px;padding-top:10px;border-top:1px dashed var(--border)">';
      html+='<div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px"><i class="ti ti-plus"></i> Add condition baseline</div>';
      html+='<div style="display:flex;flex-wrap:wrap;gap:6px">';
      notInDx.forEach(function(k){
        var cfg=CONDITION_BASELINES[k];
        if(!cfg) return;
        var safeKey=k.replace(/'/g,"\\'");
        html+='<button onclick="addConditionAndBaseline(\''+safeKey+'\')" style="padding:6px 12px;border-radius:100px;border:1px dashed var(--accent);background:rgba(91,188,176,0.06);color:var(--accent-light);font-size:12px;cursor:pointer;font-family:inherit">+ '+cfg.label+'</button>';
      });
      html+='</div></div>';
    }
  }

  return html||'<div style="font-size:13px;color:var(--text2)">No matching baseline templates found.</div>';
}



function getClientDietProfile(){
  return load('dietProfile_'+(S.activeClientId||'default'),{plans:[],presetFoods:[],restrictions:[],texture:'Regular'});

function saveClientDietProfile(dp){
  save('dietProfile_'+(S.activeClientId||'default'),dp);
}

function toggleDietPlan(plan){
  var dp=getClientDietProfile();
  if(!dp.plans) dp.plans=[];
  var idx=dp.plans.indexOf(plan);
  if(idx>=0) dp.plans.splice(idx,1);
  else dp.plans.push(plan);
  saveClientDietProfile(dp);
  renderPage();
}

function addPresetFood(){
  var input=document.getElementById('preset-food-input');
  if(!input||!input.value.trim()) return;
  var dp=getClientDietProfile();
  if(!dp.presetFoods) dp.presetFoods=[];
  dp.presetFoods.push(input.value.trim());
  saveClientDietProfile(dp);
  input.value='';
  renderPage();
}

function removePresetFood(idx){
  var dp=getClientDietProfile();
  dp.presetFoods.splice(idx,1);
  saveClientDietProfile(dp);
  renderPage();
}
