  var textures=['Regular','Soft','Minced','Pureed','Thickened liquids'];
  html+='<div style="margin-bottom:14px">';
  html+='<div style="font-size:12px;color:var(--text2);margin-bottom:6px">Food texture / consistency</div>';
  html+='<div style="display:flex;flex-wrap:wrap;gap:5px">';
  textures.forEach(function(t){
    var sel=(dp.texture||'Regular')===t;
    if(locked){
      if(sel) html+='<span style="padding:4px 12px;border-radius:100px;font-size:12px;background:var(--accent);color:white;font-weight:500">'+t+'</span>';
      else html+='<span style="padding:4px 12px;border-radius:100px;font-size:12px;color:var(--text3)">'+t+'</span>';
    } else {
      html+='<div onclick="setClientTexture(this.dataset.tex)" data-tex="'+t+'" style="padding:4px 12px;border-radius:100px;font-size:12px;cursor:pointer;'+(sel?'background:var(--accent);color:white;font-weight:500':'border:1px solid var(--border);color:var(--text2)')+'">'+t+'</div>';
    }
  });
  html+='</div></div>';

  // Lock/unlock
  if(isLead){
    if(locked){
      html+='<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-top:1px solid var(--border)">';
      html+='<div style="font-size:11px;color:var(--text3)">Set '+dp._setDate+' by '+dp._setBy+'</div>';
      html+='<button onclick="unlockDietProfile()" style="background:none;border:1px solid var(--blue);border-radius:100px;color:var(--blue);padding:4px 12px;font-size:11px;cursor:pointer"><i class="ti ti-pencil"></i> Edit</button>';
      html+='</div>';
    } else {
      html+='<button onclick="lockDietProfile()" style="width:100%;padding:10px;background:var(--accent);border:none;border-radius:var(--radius-sm);color:white;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit"><i class="ti ti-lock"></i> Save & lock diet profile</button>';
    }
  } else {
    html+='<div style="font-size:11px;color:var(--text3);text-align:center">Diet profile is managed by the Lead Caregiver</div>';
  }

  return html;
}

function toggleQuickDiagnosis(d){
  var cur=patientProfile.diagnosis||'';
  if(cur.includes(d)){
    patientProfile.diagnosis=cur.split(', ').filter(function(x){return x.trim()!==d;}).join(', ');
  } else {
    patientProfile.diagnosis=cur?cur+', '+d:d;
  }
  savePatientProfile();renderPage();
}

function renderPatient(){
  const p=patientProfile;
  const term=p.terminology||'Patient';
  const activeClient=getActiveClient();
  const isLead=(S.user.role==='Lead Caregiver'||S.user.role==='Care Manager')||S.user.role==='Care Manager';
  const isNew=!p.dob&&!p.diagnosis&&!p.allergies&&!p.notes;

  // Auto-calculate age from DOB
  const calcAge=(dob)=>{
    if(!dob) return null;
    try{
      const parts=dob.split('/');
      if(parts.length!==3) return null;
      const bd=new Date(parseInt(parts[2]),parseInt(parts[0])-1,parseInt(parts[1]));
      const today=new Date();
      let age=today.getFullYear()-bd.getFullYear();
      const m=today.getMonth()-bd.getMonth();
      if(m<0||(m===0&&today.getDate()<bd.getDate())) age--;
      return isNaN(age)||age<0||age>130?null:age;
    }catch(e){return null;}
  };
  const age=calcAge(p.dob);

  // Section collapse state
  const sec=S.patientSections||{personal:true,health:true,restrictions:true,physician:false,specialists:false,emergency:false,insurance:false,documents:false,notes:false};
  if(!S.patientSections) S.patientSections=sec;
  // Load lock state from localStorage  -  scoped to this client so each client has own locks
  const lockKey='profileSectionLocked_'+(S.activeClientId||'default');
  const savedLocks=load(lockKey,{});
  // Merge with any in-memory state (in-memory wins for current session)
  if(!S.profileSectionLocked) S.profileSectionLocked={};
  // Restore from storage if memory is empty (e.g. after page refresh)
  Object.keys(savedLocks).forEach(k=>{
    if(S.profileSectionLocked[k]===undefined) S.profileSectionLocked[k]=savedLocks[k];
  });
  const locked=S.profileSectionLocked;
  const lockSection=(key)=>`lockProfileSection('${key}');toast('Saved & locked')`;
  const unlockSection=(key)=>`unlockProfileSection('${key}')`;

  const toggle=(k)=>`S.patientSections=S.patientSections||{};S.patientSections['${k}']=!S.patientSections['${k}'];renderPage()`;

  // Helper: render a locked read-only summary overlay
  const lockedOverlay=(key)=>`
    <div style="padding:12px 14px">
      <div style="background:rgba(91,188,176,0.06);border:1px solid var(--accent);border-radius:var(--radius-sm);padding:12px;display:flex;align-items:center;gap:10px">
        <i class="ti ti-lock" style="color:var(--accent);font-size:20px;flex-shrink:0"></i>
        <div style="flex:1">
          <div style="font-size:13px;font-weight:600;color:var(--accent-light)">Section saved & locked</div>
          <div style="font-size:11px;color:var(--text2);margin-top:2px">Tap ✏️ Edit in the header to make changes</div>
        </div>
      </div>
    </div>`;

  const sectionHeader=(key,icon,label,color)=>`
    <div style="display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:14px 16px;background:${locked[key]?'rgba(91,188,176,0.06)':color||'var(--surface2)'};border-radius:${sec[key]?'var(--radius-sm) var(--radius-sm) 0 0':'var(--radius-sm)'}"
      onclick="${toggle(key)}">
      <div style="display:flex;align-items:center;gap:10px">
        <i class="ti ${icon}" style="font-size:18px;color:var(--accent)"></i>
        <div>
          <div style="display:flex;align-items:center;gap:6px">
            <span style="font-size:14px;font-weight:600;color:var(--text)">${label}</span>
            ${locked[key]?'<i class="ti ti-lock" style="font-size:11px;color:var(--accent)"></i>':''}
          </div>
          <div style="font-size:11px;color:var(--text3);margin-top:1px">${sec[key]?'Tap to collapse ▲':'Tap to expand ▼'}</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:8px" onclick="event.stopPropagation()">
        ${locked[key]?`<button onclick="${unlockSection(key)}" style="background:none;border:1px solid var(--blue);border-radius:100px;color:var(--blue);padding:3px 10px;font-size:11px;cursor:pointer"><i class="ti ti-pencil"></i> Edit</button>`:''}
        <div style="width:30px;height:30px;border-radius:50%;background:rgba(91,188,176,0.12);border:1px solid var(--accent);display:flex;align-items:center;justify-content:center">
          <i class="ti ${sec[key]?'ti-chevron-up':'ti-chevron-down'}" style="color:var(--accent);font-size:15px"></i>
        </div>
      </div>
    </div>`;

  return `
  ${isNew?`<div style="background:linear-gradient(135deg,var(--accent),var(--purple));border-radius:var(--radius);padding:14px 16px;margin-bottom:8px;color:white">
    <div style="font-size:15px;font-weight:700;margin-bottom:4px">👋 Complete ${p.name||'client'}'s profile</div>
    <div style="font-size:12px;opacity:0.9">Fill in each section below. Tap any section header to expand it.</div>
  </div>`:''}

  <!-- CRITICAL FLAGS BANNER  -  shows at very top when flags are set -->
  ${(p.dnrStatus&&p.dnrStatus!=='Not specified')||(p.fallRisk&&p.fallRisk!=='Not specified'&&p.fallRisk!=='Low'&&p.fallRisk!=='')||(p.allergies)?`
  <div style="background:rgba(192,57,43,0.08);border:2px solid var(--danger);border-radius:var(--radius);padding:12px 14px;margin-bottom:8px">
    <div style="font-size:12px;font-weight:700;color:var(--danger);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px">Critical  -  read before shift</div>
    <div style="display:flex;flex-direction:column;gap:6px">
      ${p.dnrStatus&&p.dnrStatus!=='Not specified'?`<div style="font-size:13px;font-weight:700;color:var(--danger)">🚫 ${p.dnrStatus}</div>`:''}
      ${p.fallRisk&&p.fallRisk!=='Not specified'&&p.fallRisk!=='Low'&&p.fallRisk!==''?`<div style="font-size:13px;font-weight:700;color:var(--danger)">${p.fallRisk}  -  follow fall prevention plan</div>`:''}
      ${p.allergies?`<div style="font-size:13px;font-weight:700;color:var(--danger)">🚫 Allergies: ${p.allergies}</div>`:''}
    </div>
  </div>`:''}

  <!-- ACTIVE CLIENT BANNER -->
  <div style="background:var(--accent);border-radius:var(--radius);padding:10px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between">
    <div>
      <div style="font-size:11px;color:rgba(255,255,255,0.8);text-transform:uppercase;letter-spacing:0.5px">Active ${term.toLowerCase()}</div>
      <div style="font-size:16px;font-weight:600;color:white">${activeClient?activeClient.name:'None selected'}</div>
    </div>
    <button onclick="renderClientSelect()" style="background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.4);border-radius:100px;color:white;padding:5px 12px;font-size:12px;cursor:pointer">Switch</button>
  </div>

  ${isLead&&CLIENTS.length>1?`<div class="card" style="padding:0;overflow:hidden;margin-bottom:8px">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 14px;cursor:pointer;background:var(--surface2)"
      onclick="S.allClientsOpen=!S.allClientsOpen;renderPage()">
      <div style="display:flex;align-items:center;gap:8px">
        <i class="ti ti-users" style="color:var(--accent)"></i>
        <span style="font-size:14px;font-weight:600;color:var(--text)">All clients (${CLIENTS.length})</span>
      </div>
      <i class="ti ${S.allClientsOpen?'ti-chevron-up':'ti-chevron-down'}" style="color:var(--text3);font-size:16px"></i>
    </div>
    ${S.allClientsOpen?`<div style="padding:0 14px 10px">
      ${CLIENTS.map(c=>`
      <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">
        <div onclick="selectClient('${c.id}','patient')" style="width:36px;height:36px;border-radius:50%;background:var(--purple);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:white;flex-shrink:0;cursor:pointer">${getInitials(c.name)}</div>
        <div onclick="selectClient('${c.id}','patient')" style="flex:1;cursor:pointer;min-width:0">
          <div style="font-size:13px;font-weight:500;color:var(--accent-light)">${c.name} ${c.id===S.activeClientId?'<span style="font-size:10px;color:var(--accent)">● Active</span>':''}</div>
          <div style="font-size:11px;color:var(--text3)">${c.terminology||'Patient'}${c.room?' - Room '+c.room:''}</div>
        </div>
        <div style="display:flex;gap:5px;flex-shrink:0">
          ${c.id!==S.activeClientId?`<button onclick="switchClient('${c.id}')" style="background:none;border:1px solid var(--accent);border-radius:100px;color:var(--accent-light);padding:3px 8px;font-size:11px;cursor:pointer">Switch</button>`:''}
          <button onclick="removeClient('${c.id}')" style="background:none;border:1px solid var(--danger);border-radius:100px;color:var(--danger);padding:3px 8px;font-size:11px;cursor:pointer"><i class="ti ti-x"></i></button>
        </div>
      </div>`).join('')}
    </div>`:''}
  </div>`:''}

  <!-- -- 1. PERSONAL INFORMATION -- -->
  <div class="card" style="padding:0;overflow:hidden;margin-bottom:8px">
    ${sectionHeader('personal','ti-user','Personal Information')}
    ${sec.personal?`<div style="padding:14px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <div style="position:relative;display:inline-block">
          <select onchange="patientProfile.terminology=this.value;savePatientProfile();renderPage()" style="padding:5px 32px 5px 10px;background:var(--surface2);border:1px solid var(--accent);border-radius:var(--radius-sm);color:var(--text);font-size:13px;outline:none;appearance:none;-webkit-appearance:none;cursor:pointer">
            ${['Patient','Resident','Client'].map(t=>`<option value="${t}" ${term===t?'selected':''}>${t}</option>`).join('')}
          </select>
          <i class="ti ti-chevron-down" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);color:var(--accent);font-size:13px;pointer-events:none"></i>
        </div>
        ${S.profileEditMode?'<span style="font-size:11px;color:var(--blue);font-weight:500">✏️ Editing</span>':('')}
        <button onclick="S.profileEditMode=!S.profileEditMode;renderPage()" style="background:none;border:1px solid ${S.profileEditMode?'var(--accent)':'var(--blue)'};border-radius:100px;color:${S.profileEditMode?'var(--accent-light)':'var(--blue)'};padding:4px 12px;font-size:12px;cursor:pointer">
          <i class="ti ${S.profileEditMode?'ti-lock-open':'ti-pencil'}"></i> ${S.profileEditMode?'Lock':'Edit'}
        </button>
      </div>
      ${S.profileEditMode?`
      <div class="field"><label class="lbl">Full name</label>
        <input type="text" value="${p.name||''}" placeholder="Full name" oninput="patientProfile.name=this.value" style="width:100%;padding:10px;background:var(--surface2);border:1px solid var(--blue);border-radius:var(--radius-sm);color:var(--text);font-size:15px;outline:none"/>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <div class="field"><label class="lbl">Date of birth</label>
          <input type="text" placeholder="MM/DD/YYYY" value="${p.dob||''}" id="dob-input" oninput="const f=formatDOB(this.value);this.value=f;patientProfile.dob=f" inputmode="numeric" style="width:100%;padding:10px;background:var(--surface2);border:1px solid var(--blue);border-radius:var(--radius-sm);color:var(--text);font-size:14px;outline:none"/>
        </div>
        <div class="field"><label class="lbl">Room / unit</label>
          <input type="text" placeholder="Room #" value="${p.room||''}" oninput="patientProfile.room=this.value" style="width:100%;padding:10px;background:var(--surface2);border:1px solid var(--blue);border-radius:var(--radius-sm);color:var(--text);font-size:14px;outline:none"/>
        </div>
      </div>
      <div class="field"><label class="lbl">Preferred language</label>
        <input type="text" placeholder="e.g. English, Spanish..." value="${p.language||''}" oninput="patientProfile.language=this.value" style="width:100%;padding:10px;background:var(--surface2);border:1px solid var(--blue);border-radius:var(--radius-sm);color:var(--text);font-size:14px;outline:none"/>
      </div>
      <button class="btn btn-primary" style="width:100%" onclick="savePatientProfile();S.profileEditMode=false;toast('Personal info saved');renderPage()"><i class="ti ti-check"></i> Save personal info</button>
      `:`
      <!-- VIEW MODE -->
      <div style="display:flex;flex-direction:column;gap:8px">
        <div style="display:flex;gap:8px">
          <div style="flex:2;background:var(--surface2);border-radius:var(--radius-sm);padding:10px">
            <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px">Full name</div>
            <div style="font-size:15px;font-weight:700;color:var(--text);margin-top:2px">${p.name||' - '}</div>
          </div>
          <div style="background:var(--surface2);border-radius:var(--radius-sm);padding:10px;min-width:70px">
            <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px">Room</div>
            <div style="font-size:14px;color:var(--text);margin-top:2px">${p.room||' - '}</div>
          </div>
        </div>
        <div style="display:flex;gap:8px">
          <div style="flex:1;background:var(--surface2);border-radius:var(--radius-sm);padding:10px">
            <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px">Date of birth</div>
            <div style="font-size:14px;color:var(--text);margin-top:2px">${p.dob||' - '}</div>
          </div>
          <div style="flex:1;background:${age?'rgba(91,188,176,0.08)':'var(--surface2)'};border-radius:var(--radius-sm);padding:10px;border:${age?'1px solid var(--accent)':'none'}">
            <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px">Age</div>
            <div style="font-size:18px;font-weight:700;color:${age?'var(--accent-light)':'var(--text3)'};margin-top:2px">${age?age+' yrs':' - '}</div>
          </div>
        </div>
        ${p.language?`<div style="background:var(--surface2);border-radius:var(--radius-sm);padding:8px 10px;font-size:12px;color:var(--text2)">🗣️ Language: ${p.language}</div>`:''}
      </div>`}
    </div>`:''}
  </div>

  <!-- -- 2. HEALTH & MEDICAL -- -->
  <div class="card" style="padding:0;overflow:hidden;margin-bottom:8px">
    ${sectionHeader('health','ti-heart-rate','Health & Medical','rgba(91,188,176,0.06)')}
    ${sec.health?(locked.health?lockedOverlay('health'):`<div style="padding:14px">

      <!-- CRITICAL FLAGS  -  always at top of health section -->
      <div style="margin-bottom:16px">
        <div style="font-size:11px;font-weight:600;color:var(--danger);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px">Critical status flags</div>

        <!-- DNR / POLST -->
        <div class="field" style="margin-bottom:10px">
          <label class="lbl">DNR / POLST status</label>
          <div style="position:relative">
            <select id="dnr-status" onchange="patientProfile.dnrStatus=this.value;savePatientProfile();renderPage()"
              style="width:100%;padding:10px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:13px;outline:none;appearance:none;-webkit-appearance:none">
              <option value="Not specified" ${(p.dnrStatus||'')==='Not specified'||!p.dnrStatus?'selected':''}>Not specified</option>
              <option value="DNR" ${(p.dnrStatus||'')==='DNR'?'selected':''}>DNR  -  Do Not Resuscitate</option>
              <option value="DNI" ${(p.dnrStatus||'')==='DNI'?'selected':''}>DNI  -  Do Not Intubate</option>
              <option value="DNR/DNI" ${(p.dnrStatus||'')==='DNR/DNI'?'selected':''}>DNR/DNI  -  Both</option>
              <option value="POLST-Full" ${(p.dnrStatus||'')==='POLST-Full'?'selected':''}>POLST on file  -  Full code</option>
              <option value="POLST-Limited" ${(p.dnrStatus||'')==='POLST-Limited'?'selected':''}>POLST on file  -  Limited interventions</option>
              <option value="POLST-Comfort" ${(p.dnrStatus||'')==='POLST-Comfort'?'selected':''}>POLST on file  -  Comfort measures only</option>
              <option value="Full-Code" ${(p.dnrStatus||'')==='Full-Code'?'selected':''}>Full code  -  Resuscitate</option>
            </select>
            <i class="ti ti-chevron-down" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--text2);font-size:13px"></i>
          </div>
          ${p.dnrStatus&&p.dnrStatus!=='Not specified'?'<div style="background:rgba(192,57,43,0.08);border:1px solid var(--danger);border-radius:var(--radius-sm);padding:8px 12px;margin-top:6px"><span style="color:var(--danger);font-weight:700;font-size:13px">'+p.dnrStatus+'</span></div>':''}
        </div>

        <!-- Fall Risk -->
        <div class="field">
          <label class="lbl">Fall risk level</label>
          <div class="chips">
            ${['Not assessed','Low risk','Medium risk','High risk'].map(r=>'<div class="chip '+((p.fallRisk||'Not assessed')===r?'on':'')+'" onclick="patientProfile.fallRisk=\''+r+'\';savePatientProfile();renderPage()">'+r+'</div>').join('')}
          </div>
          ${p.fallRisk&&p.fallRisk!=='Not assessed'&&p.fallRisk!=='Low risk'?'<div style="background:rgba(192,57,43,0.08);border:1px solid var(--danger);border-radius:var(--radius-sm);padding:8px 12px;margin-top:6px"><span style="color:var(--danger);font-weight:700;font-size:13px">'+p.fallRisk+'  -  review fall prevention plan</span></div>':''}        </div>
      </div>
      <div style="border-top:1px solid var(--border);margin-bottom:14px"></div>

      <div class="field"><label class="lbl">Primary diagnosis / conditions</label>
        <div style="font-size:11px;color:var(--text2);margin-bottom:6px">Tap to add common diagnoses, or type below:</div>
        <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px">
          ${["Parkinson's Disease","Alzheimer's Disease","Dementia","Type 1 Diabetes","Type 2 Diabetes","Pre-diabetes","Hypertension","Heart Failure (CHF)","COPD","Stroke / CVA","Arthritis","Osteoporosis","Depression","Anxiety","Kidney Disease","Cancer"].map(d=>{
            const isSelected=(p.diagnosis||'').includes(d);
            const safeD=d.replace(/'/g,"\\'");
            return `<div onclick="toggleQuickDiagnosis('${safeD}')"
              style="padding:6px 12px;border-radius:100px;font-size:12px;cursor:pointer;font-weight:${isSelected?'700':'500'};border:2px solid ${isSelected?'var(--accent)':'var(--border)'};background:${isSelected?'var(--accent)':'var(--surface2)'};color:${isSelected?'white':'var(--text2)'};transition:all 0.15s">
              ${isSelected?'✓ ':''}${d}
            </div>`;
          }).join('')}
        </div>
        <textarea placeholder="e.g. Dementia, Type 2 Diabetes, Hypertension..." oninput="patientProfile.diagnosis=this.value;savePatientProfile()" style="width:100%;border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px;font-size:14px;background:var(--surface2);color:var(--text);min-height:60px;resize:vertical;outline:none">${p.diagnosis||''}</textarea>
        <div style="margin-top:8px">
          <div style="font-size:12px;color:var(--text2);margin-bottom:6px">Other / additional diagnoses:</div>
          <input type="text" id="other-diagnosis-input" placeholder="Type and press Enter to add..." style="width:100%;padding:10px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:14px;outline:none"
            onkeydown="if(event.key==='Enter'&&this.value.trim()){if(!patientProfile.otherDiagnoses)patientProfile.otherDiagnoses=[];patientProfile.otherDiagnoses.push(this.value.trim());savePatientProfile();this.value='';renderPage();}"/>
          <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px">
            ${(p.otherDiagnoses||[]).map((d,i)=>`
              <div style="display:flex;align-items:center;gap:4px;padding:4px 10px;background:var(--surface2);border:1px solid var(--accent);border-radius:100px;font-size:12px;color:var(--text)">
                ${d}
                <span onclick="patientProfile.otherDiagnoses.splice(${i},1);savePatientProfile();renderPage()" style="cursor:pointer;color:var(--danger);font-weight:700;margin-left:2px">×</span>
              </div>`).join('')}
          </div>
        </div>
      </div>
      <div class="field"><label class="lbl" style="color:var(--danger)">Allergies</label>

// -- TIME & SHIFT HELPERS -----------------------------------------
function formatDuration(mins){
  if(!mins||mins<0) return '0m';
  const h=Math.floor(mins/60);const m=mins%60;
  return h>0?`${h}h ${m}m`:`${m}m`;
}

function getMyShiftHistory(){
  const history=load('shiftHistory',[]);
  return history.filter(s=>s.caregiver===S.user.name);
}

function getHoursInRange(shifts,startMs,endMs){
  return shifts.filter(s=>s.timestamp>=startMs&&s.timestamp<=endMs)
    .reduce((sum,s)=>sum+(s.durationMins||0),0);
}

function handleRoleChange(val){
  // SECURITY: Prevent self-assigning Lead Caregiver role without authorization
  const protectedRoles=['Lead Caregiver','Care Manager'];
  if(protectedRoles.includes(val)&&!protectedRoles.includes(S.user.role)){
    // Need Lead Caregiver PIN to upgrade role
    S.roleChangeRequest=val;
    S.showRolePinModal=true;
    renderShell();
    return;
  }
  if(val==='Other'){
    S.user.role='Other';
    renderPage();
  } else {
    changeMyRole(val);
  }
}

function changeMyRole(role){
  const idx=CAREGIVERS.findIndex(c=>c.id===S.user.id);
  if(idx>=0){CAREGIVERS[idx].role=role;save('caregivers',CAREGIVERS);}
  S.user.role=role;
  toast('Role updated to '+role);
  renderShell();
}

function verifyRoleChangePIN(){
  const pin=document.getElementById('role-change-pin')?.value?.trim();
  if(!pin){toast('Enter a PIN');return;}
  // Find any existing Lead Caregiver and check their PIN
  const leads=CAREGIVERS.filter(c=>c.role==='Lead Caregiver'||c.role==='Care Manager');
  if(!leads.length){
    // No lead exists yet - allow if PIN matches current user
    const me=CAREGIVERS.find(c=>c.id===S.user.id);
    if(me&&me.pin===pin){
      changeMyRole(S.roleChangeRequest);
      S.showRolePinModal=false;S.roleChangeRequest=null;
      renderShell();
    } else {
      toast('Incorrect PIN');
    }
    return;
  }
  const match=leads.find(c=>c.pin===pin);
  if(match){
    changeMyRole(S.roleChangeRequest);
    addNotif('[Security] '+S.user.name+' role changed to '+S.roleChangeRequest+' authorized by '+match.name+' at '+now(),'all');
    S.showRolePinModal=false;S.roleChangeRequest=null;
    toast('Role updated — authorized by Lead Caregiver');
    renderShell();
  } else {
    document.getElementById('role-pin-error').textContent='Incorrect PIN. Ask your Lead Caregiver to authorize this.';
    toast('Incorrect PIN');
  }
}

  <!-- MY PROFILE CARD  -  always visible -->

  ${collapse('contact','ti-address-book','Contact info',

  ${collapse('visibility','ti-adjustments','Profile visibility','',

function shareTimesheet(period){
  const history=getMyShiftHistory();
  const now_ms=Date.now();
  const days=period==='biweekly'?14:7;
  const start=new Date(now_ms-days*86400000);
  const shifts=history.filter(s=>s.timestamp>=start.getTime());
  const payRate=getMyPayRate();
  const totalMins=shifts.reduce((s,sh)=>s+(sh.durationMins||0),0);
  const lines=[
    '-------------------------------',
    `  CARELOG ${period==='biweekly'?'BI-WEEKLY':'WEEKLY'} TIMESHEET`,
    '-------------------------------',
    `Caregiver: ${S.user.name}`,
    `Role: ${S.user.role}`,
    `Period: ${start.toLocaleDateString()}  -  ${new Date().toLocaleDateString()}`,
    `Generated: ${now()}`,
    '',
    '-- SHIFTS ---------------------'
  ];
  if(!shifts.length){lines.push('No completed shifts this period.');}
  else shifts.forEach(s=>{
    lines.push(`${s.date}`);
    lines.push(`  In: ${s.time}  Out: ${s.clockOutTime||' - '}  Duration: ${formatDuration(s.durationMins)}`);
    if(payRate>0) lines.push(`  Pay: $${((s.durationMins/60)*payRate).toFixed(2)}`);
  });
  lines.push('');
  lines.push('-- TOTALS ---------------------');
  lines.push(`Total hours: ${formatDuration(totalMins)}`);
  if(payRate>0){
    lines.push(`Hourly rate: $${payRate}/hr`);
    lines.push(`Total pay: $${((totalMins/60)*payRate).toFixed(2)}`);
  }
  // Mileage
  const mileageLog=load('mileageLog',[]).filter(m=>m.caregiver===S.user.name&&new Date(m.date)>=start);
  if(mileageLog.length>0){
    const totalMiles=mileageLog.reduce((s,m)=>s+parseFloat(m.miles||0),0);
    const totalReimb=mileageLog.reduce((s,m)=>s+parseFloat(m.reimbursement||0),0);
    lines.push(`Mileage: ${totalMiles.toFixed(1)} miles - $${totalReimb.toFixed(2)}`);
  }
  lines.push('');
  lines.push('-------------------------------');
  lines.push('Stewards of Care App');
  const txt=lines.join('\n');
  if(navigator.share){navigator.share({title:`Timesheet  -  ${S.user.name}`,text:txt}).catch(()=>{});}
  else{navigator.clipboard.writeText(txt).then(()=>toast('Timesheet copied!')).catch(()=>toast('Copy failed'));}
}

function shareMileage(){
  const mileageLog=load('mileageLog',[]).filter(m=>m.caregiver===S.user.name);
  const total=mileageLog.reduce((s,m)=>s+parseFloat(m.reimbursement||0),0);
  const miles=mileageLog.reduce((s,m)=>s+parseFloat(m.miles||0),0);
  const lines=['MILEAGE REPORT  -  '+S.user.name,''];
  mileageLog.forEach(m=>{lines.push(`${m.date}: ${m.miles} mi  -  ${m.purpose||' - '}  -  $${m.reimbursement}`);});
  lines.push('');lines.push(`Total: ${miles.toFixed(1)} miles - $${total.toFixed(2)}`);
  const txt=lines.join('\n');
  if(navigator.share){navigator.share({title:'Mileage Report',text:txt}).catch(()=>{});}
  else{navigator.clipboard.writeText(txt).then(()=>toast('Copied!')).catch(()=>{});}
}

function autoCalcEndDate(){
  const qty=parseInt(document.getElementById('med-qty')?.value)||0;
  const start=document.getElementById('med-start')?.value;
  const times=[...document.querySelectorAll('.med-time-chip.on')].length||1;
  if(!qty||!start) return;
  const daysOfSupply=Math.ceil(qty/times);
  const endDate=new Date(start+'T12:00:00');
  endDate.setDate(endDate.getDate()+daysOfSupply-1);
  const endField=document.getElementById('med-end');
  if(endField) endField.value=localDateStr(endDate);
}

function verifyMedQty(medId,expected){
  const input=document.getElementById('qty-'+medId);
  const actual=parseInt(input?.value);
  if(isNaN(actual)){toast('Enter actual count on hand.');return;}
  const meds=load('medications',[]);
  const med=meds.find(m=>m.id===medId);
  if(!med) return;
  if(actual===expected){
    toast('Count matches  -  all '+expected+' doses accounted for.');
    return;
  }
  // Trigger full-screen mismatch modal
  const diff=Math.abs(expected-actual);
  const over=actual>expected;
  S.mismatchModal={medId,medName:med.name,medDose:med.dose,expected,reported:actual,diff,over};
  // Alert team immediately
  addNotif('[!] MEDICATION DISCREPANCY: '+(med.name)+' '+(med.dose)+'  -  expected '+(expected)+' on hand, actual count is '+(actual)+'. Difference of '+(diff)+'. Requires immediate acknowledgment by '+(S.user.name)+'.','all');
  renderShell();
}

function parseTimeValue(t){
  // Convert "7:00 AM" / "1:00 PM" to minutes since midnight for sorting
  const m=t.match(/(\d+):(\d+)\s*(AM|PM)/i);
  if(!m) return 0;
  let h=parseInt(m[1]),mn=parseInt(m[2]);
  const ap=m[3].toUpperCase();
  if(ap==='PM'&&h!==12) h+=12;
  if(ap==='AM'&&h===12) h=0;
  return h*60+mn;
}

function addMedication(){
  // Commit any active voice recording to the field before reading values
  if(S.recording){
    try{if(S.recognizer)S.recognizer.stop();}catch(e){}
    S.recording=false;S.recordTarget=null;S.recognizer=null;
  }
  // Make sure voice interim text is committed
  ['med-name','med-dose','med-notes'].forEach(function(id){
    var el=document.getElementById(id);
    if(el&&el._voiceBase!==undefined){el.value=el._voiceBase;delete el._voiceBase;}
  });
  const name=document.getElementById('med-name')?.value?.trim();
  const dose=document.getElementById('med-dose')?.value?.trim();
  const route=document.getElementById('med-route')?.value||'By mouth';
  const notes=document.getElementById('med-notes')?.value?.trim()||'';
  const start=document.getElementById('med-start')?.value||todayISO();
  const qtyDispensed=parseInt(document.getElementById('med-qty')?.value)||null;
  const lowAlert=parseInt(document.getElementById('med-low')?.value)||7;
  const isPRN=S.medFormType==='prn';

  if(!name){toast('Please enter medication name.');return;}

  let times=[];
  let prn=null;

  if(isPRN){
    const trigger=document.getElementById('prn-trigger')?.value||'manual';
    const threshold=parseFloat(document.getElementById('prn-threshold')?.value)||null;
    const condition=document.getElementById('prn-condition')?.value||'';
    const maxDaily=parseInt(document.getElementById('prn-maxdaily')?.value)||null;
    const minInterval=parseInt(document.getElementById('prn-interval')?.value)||null;
    if(!trigger){toast('Please select a PRN trigger.');return;}
    prn={trigger,threshold,condition,maxDaily,minInterval};
    times=[];
  } else {
    times=[...document.querySelectorAll('.med-time-chip.on')]
      .map(el=>el.dataset.time)
      .sort((a,b)=>parseTimeValue(a)-parseTimeValue(b));
    if(!times.length){toast('Please select at least one dose time.');return;}
  }

  let end=document.getElementById('med-end')?.value||'';
  if(!end&&qtyDispensed&&start&&times.length){
    const daysOfSupply=Math.ceil(qtyDispensed/times.length);
    const endDate=new Date(start+'T12:00:00');
    endDate.setDate(endDate.getDate()+daysOfSupply-1);
    end=localDateStr(endDate);
  }

  const meds=load('medications',[]);
  meds.push({id:'med'+Date.now(),name,dose,route,notes,times,startDate:start,endDate:end,
    qtyDispensed,lowAlert,active:true,isPRN,prn,addedBy:S.user.name,addedAt:now()});
  save('medications',meds);

  const triggerDesc=prn?`  -  PRN: ${prn.trigger}${prn.threshold?' ≥'+prn.threshold:''}${prn.condition?' ('+prn.condition+')':''}`:`  -  ${times.join(', ')}`;
  addNotif(''+(isPRN?'PRN':'Scheduled')+' medication added: '+(name)+' '+(dose)+''+(qtyDispensed?' ('+qtyDispensed+' dispensed)':'')+''+(triggerDesc)+'. Added by '+(S.user.name)+'.','all');
  toast(`✓ ${isPRN?'PRN':'Scheduled'} medication added`);
  S.medFormType='scheduled';S.prnTrigger='';
  S.showMedForm=false;  // Collapse form after saving - user taps "+ Add another" to add more
  renderPage();
}

function givePRN(medId,triggerReason){
  const meds=load('medications',[]);
  const med=meds.find(m=>m.id===medId);
  if(!med){toast('Medication not found.');return;}
  const reason=document.getElementById('prn-reason-'+medId)?.value||triggerReason;

  // Deduct from inventory
  med.qtyDispensed=Math.max(0,(med.qtyDispensed||0)-1);
  save('medications',meds);

  // Log to PRN history
  const prnLog=load('prnLog',[]);
  const lastVitals=S.logs.filter(l=>l.type==='vitals').sort((a,b)=>b.id-a.id)[0];
  prnLog.push({
    id:'prn'+Date.now(),
    timestamp:Date.now(),
    date:todayISO(),
    time:now(),
    by:S.user.name,
    medId,
    medName:med.name,
    medDose:med.dose,
    route:med.route,
    triggerReason,
    reason,
    vitalsBP:lastVitals?.data?.bp||'',
    vitalsGlucose:lastVitals?.data?.glucose||'',
    clientId:S.activeClientId
  });
  save('prnLog',prnLog);

  // Alert team
  addNotif('[MED] PRN GIVEN: '+(med.name)+' '+(med.dose)+' given to '+(patientProfile.name||'client')+' by '+(S.user.name)+' at '+(now())+'. Reason: '+(reason)+'. Inventory reduced to '+(med.qtyDispensed)+' remaining.','all');

  // Low supply check
  if(med.qtyDispensed<=med.lowAlert&&med.qtyDispensed>0){
    addNotif('[!] REFILL NEEDED: '+(med.name)+'  -  only '+(med.qtyDispensed)+' dose'+(med.qtyDispensed!==1?'s':'')+' remaining.','all');
  } else if(med.qtyDispensed===0){
    addNotif('[STOP] OUT: '+(med.name)+' has no doses remaining. Restock immediately.','all');
  }

  // Remove from suggestions
  S.prnSuggestions=(S.prnSuggestions||[]).filter(p=>p.med.id!==medId);
  toast(`${med.name} given  -  inventory updated`);
  renderPage();
}

function declinePRN(medId){
  S.prnSuggestions=(S.prnSuggestions||[]).filter(p=>p.med.id!==medId);
  toast('PRN declined  -  not given');
  renderPage();
}

function toggleDose(medId,time){
  const key=today()+'-'+medId+'-'+time;
  const doseLog=load('doseLog',{});
  if(doseLog[key]){
    delete doseLog[key];
  } else {
    doseLog[key]={givenBy:S.user.name,time:now(),date:today()};
    const meds=load('medications',[]);
    const med=meds.find(m=>m.id===medId);
    if(med&&med.qtyDispensed){
      const totalGiven=Object.keys(doseLog).filter(k=>k.includes(medId)).length;
      const remaining=Math.max(0,med.qtyDispensed-totalGiven);
      if(remaining===0){
        addNotif('[STOP] '+(med.name)+' is OUT  -  no doses remaining. Please restock immediately.','all');
      } else if(remaining<=med.lowAlert){
        addNotif('[!] '+(med.name)+' running low  -  only '+(remaining)+' dose'+(remaining===1?'':'s')+' remaining.','all');
      }
    }
  }
  save('doseLog',doseLog);
  renderPage();
}

function checkMedQtyMismatch(medId){
  const reported=parseInt(document.getElementById('qty-'+medId)?.value);
  if(isNaN(reported)){toast('Enter a number to check.');return;}
  const doseLog=load('doseLog',{});
  const meds=load('medications',[]);
  const med=meds.find(m=>m.id===medId);
  if(!med||!med.qtyDispensed){toast('No dispensed quantity set.');return;}
  const totalGiven=Object.keys(doseLog).filter(k=>k.includes(medId)).length;
  const expected=Math.max(0,med.qtyDispensed-totalGiven);
  if(reported===expected){
    toast('Count matches  -  '+reported+' doses accounted for.');
  } else {
    const diff=Math.abs(reported-expected);
    const over=reported>expected;
    // Show blocking modal  -  caregiver must acknowledge
    S.mismatchModal={
      medName:med.name,
      medDose:med.dose,
      expected:expected,
      reported:reported,
      diff:diff,
      over:over,
      medId:medId
    };
    addNotif('[!] QUANTITY MISMATCH: '+med.name+' '+med.dose+' - expected '+expected+' remaining, counted '+reported+'. Difference of '+diff+'.','all');
    renderShell();
  }
}

function acknowledgeMismatch(){
  const note=document.getElementById('mismatch-note')?.value?.trim()||'';
  const m=S.mismatchModal;
  // Log the acknowledgment
  const log=load('mismatchLog',[]);
  log.push({
    date:todayISO(),time:now(),by:S.user.name,
    medId:m.medId,medName:m.medName,medDose:m.medDose,
    expected:m.expected,reported:m.reported,diff:m.diff,
    note:note,acknowledged:true
  });
  save('mismatchLog',log);
  // Add acknowledgment to notifications
  addNotif('MISMATCH ACKNOWLEDGED: '+m.medName+' '+m.medDose+' - discrepancy of '+m.diff+' dose'+(m.diff!==1?'s':'')+' acknowledged by '+S.user.name+' at '+now()+(note?' - Note: '+note:'')+'.','all');
  S.mismatchModal=null;
  toast('Discrepancy acknowledged and logged');
  renderShell();
}

function toggleMedActive(medId){
  const meds=load('medications',[]);
  const idx=meds.findIndex(m=>m.id===medId);
  if(idx>=0){meds[idx].active=!meds[idx].active;save('medications',meds);}
  renderPage();
}

// Check if an EOD (every other day) medication should be given today
function isEODGiveDay(med){
  if(!med.schedule||!med.schedule.includes('EOD')) return true; // not EOD, always give
  const start=med.startDate||todayISO();
  const startMs=new Date(start+'T12:00:00').getTime();
  const todayMs=new Date(todayISO()+'T12:00:00').getTime();
  const daysDiff=Math.round((todayMs-startMs)/(1000*60*60*24));
  return daysDiff>=0&&daysDiff%2===0; // give on day 0, 2, 4, 6...
}

  return 'dailyMeds_'+(S.activeClientId||'default');

function fillPillbox(){
  const log=load(pillboxKey(),{});
  const td=today();
  log[td]=S.user.name;
  // Reduce qty for each med by number of doses in schedule
  const dm=load(dailyMedsKey(),[]);
  dm.forEach(med=>{
    const doses=med.schedule.includes('Twice')?2:med.schedule.includes('Three')?3:1;
    if(med.qtyRemaining!==null&&med.qtyRemaining!==undefined){
      med.qtyRemaining=Math.max(0,med.qtyRemaining-doses);
      if(med.qtyRemaining<=med.refillAt){
        addNotif('[!] REFILL NEEDED: '+(med.name)+'  -  only '+(med.qtyRemaining)+' tablets remaining. Refill soon.','all');
      }
    }
  });
  save(dailyMedsKey(),dm);
  save(pillboxKey(),log);
  toast('Pillbox marked as filled for today');renderPage();
}

function logDailyMedGiven(medId,given){
  const log=load(pillboxKey(),{});
  const key=todayISO()+'-given-'+medId;
  // Prevent double-counting if already logged as given
  if(log[key]===true&&given){toast('Already logged as given.');return;}
  log[key]=given;
  save(pillboxKey(),log);

  if(given){
    // Reduce bottle count by 1
    const dailyMeds=load(dailyMedsKey(),[]);
    const idx=dailyMeds.findIndex(m=>m.id===medId);
    if(idx>=0&&dailyMeds[idx].qty!==null&&dailyMeds[idx].qty!==undefined){
      const current=dailyMeds[idx].qtyRemaining??dailyMeds[idx].qty;
      const newQty=Math.max(0,current-1);
      dailyMeds[idx].qtyRemaining=newQty;
      save(dailyMedsKey(),dailyMeds);
      if(newQty===0){
        addNotif('[STOP] OUT: '+(dailyMeds[idx].name)+' has no tablets remaining. Refill immediately.','all');
      } else if(newQty<=dailyMeds[idx].refillAt){
        addNotif('[!] REFILL NEEDED: '+(dailyMeds[idx].name)+'  -  only '+(newQty)+' tablet'+(newQty!==1?'s':'')+' remaining.','all');
      }
    }
    toast('Logged as given  -  count updated');
  } else {
    addNotif('[!] Medication NOT given this session  -  '+(medId)+'  -  logged by '+(S.user.name)+' at '+(now())+'.','all');
    toast('Logged as not given');
  }
  renderPage();
}

// Check for overdue doses and add alerts
// Central time parser  -  handles "7:00 PM", "10:00 AM" format
function parseTimeToMs(timeStr){
  const match=timeStr.match(/(\d+):(\d+)\s*(AM|PM)/i);
  if(!match) return null;
  let h=parseInt(match[1]);
  const m=parseInt(match[2]);
  const ampm=match[3].toUpperCase();
  if(ampm==='PM'&&h!==12) h+=12;
  if(ampm==='AM'&&h===12) h=0;
  const d=new Date();
  d.setHours(h,m,0,0);
  return d.getTime();
}

function getBPTrend(){
  // Get all vitals logs for active client, return last 14 BP readings
  const cid=S.activeClientId;
  const allLogs=load('logs',[]);
  const vitals=allLogs
    .filter(l=>l.type==='vitals'&&l.data&&l.data.bp&&l.data.bp.includes('/')&&(!cid||!l.clientId||l.clientId===cid))
    .sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time))
    .slice(-14);
  return vitals.map(v=>{
    const parts=v.data.bp.split('/');
    return {date:v.date,time:v.time,sys:parseInt(parts[0]),dia:parseInt(parts[1]),bpStatus:v.data.bpStatus||'normal',caregiver:v.caregiver};
  }).filter(v=>!isNaN(v.sys)&&!isNaN(v.dia));
}

function checkBPPattern(){
  // Fire alert if BP elevated 3+ consecutive days
  const trend=getBPTrend();
  if(trend.length<3) return;
  const thresholds=load('bpThresholds',{highSys:140,highDia:90});
  // Group by date
  const byDate={};
  trend.forEach(r=>{if(!byDate[r.date])byDate[r.date]=[];byDate[r.date].push(r);});
  const dates=Object.keys(byDate).sort();
  let consecutiveHighDays=0;
  dates.forEach(d=>{
    const dayReadings=byDate[d];
    const anyHigh=dayReadings.some(r=>r.sys>=thresholds.highSys||r.dia>=thresholds.highDia);
    if(anyHigh) consecutiveHighDays++;
    else consecutiveHighDays=0;
  });
  if(consecutiveHighDays>=3){
    const alertKey='bp-pattern-'+todayISO();
    if(!load(alertKey,false)){
      addNotif('[!] BP PATTERN: '+(patientProfile.name||'Client')+' has had elevated BP for '+(consecutiveHighDays)+' consecutive days. Physician notification may be needed.','all');
      save(alertKey,true);
    }
  }
}

function checkMedAlerts(){
  const meds=load('medications',[]);
  const doseLog=load('doseLog',{});
  const now_ms=Date.now();
  meds.filter(m=>m.active).forEach(med=>{
    (med.times||[]).forEach(t=>{
      const doseMs=parseTimeToMs(t);
      if(!doseMs) return;
      const overdueMins=(now_ms-doseMs)/60000;
      const key=today()+'-'+med.id+'-'+t;
      const given=doseLog[key];
      // Alert if overdue by more than 15 min and less than 3 hours
      if(!given&&overdueMins>15&&overdueMins<180){
        const alertKey='alert-'+key;
        const alerted=load(alertKey,false);
        if(!alerted){
          addNotif('[!] MISSED DOSE: '+(med.name)+' '+(med.dose)+' was due at '+(t)+' and has not been logged.','all');
          save(alertKey,true);
          renderShell();
        }
      }
    });
  });
}

function saveBacklogEntry(date,type){
  const t=document.getElementById('bl-time')?.value||'00:00';
  const note=document.getElementById('bl-note')?.value?.trim()||'';
  const formattedDate=date; // already ISO
  let entry={id:Date.now(),date:formattedDate,time:t||'(time not recorded)',
    clientId:S.activeClientId,caregiver:S.user.name,backdated:true};

  if(type==='vitals'){
    const bp=document.getElementById('bl-bp')?.value?.trim();
    if(!bp){toast('BP is required for vitals.');return;}
    const pulse=document.getElementById('bl-pulse')?.value||'';
    const temp=document.getElementById('bl-temp')?.value||'';
    const weight=document.getElementById('bl-weight')?.value||'';
    entry={...entry,type:'vitals',data:{bp,pulse,temp,weight,bpStatus:'normal',backdated:true},note:note||'Backdated entry'};
  } else if(type==='meal'){
    const items=document.getElementById('bl-items')?.value?.trim()||'';
    const mealChip=[...document.querySelectorAll('.chip.on')].find(c=>['Breakfast','Lunch','Dinner','Snack'].includes(c.textContent));
    const amountChip=[...document.querySelectorAll('.chip.on')].find(c=>['Full portion','3/4 eaten','Half eaten','Few bites','Refused'].includes(c.textContent));
    entry={...entry,type:'meal',data:{meal:mealChip?.textContent||'Meal',items,amount:amountChip?.textContent||'Amount not recorded',backdated:true},note};
  } else if(type==='fluid'){
    const typeChip=[...document.querySelectorAll('.chip.on')].find(c=>['Water','Juice','Milk','Tea','Coffee','Soup/Broth','Nutritional shake','Other'].includes(c.textContent));
    const amtChip=[...document.querySelectorAll('.chip.on')].find(c=>c.textContent.includes('oz'));
    entry={...entry,type:'fluid',data:{type:typeChip?.textContent||'Fluid',amount:amtChip?.textContent||'Amount not recorded',backdated:true},note};
  } else if(type==='adl'){
    if(!note){toast('Please enter an ADL summary.');return;}
    entry={...entry,type:'adl',data:{entries:{},backdated:true},note:'[BACKDATED] '+note};
  } else if(type==='note'){
    if(!note){toast('Please enter a note.');return;}
    entry={...entry,type:'note',data:{category:'Backdated',backdated:true},note:'[BACKDATED] '+note};
  } else if(type==='medication'){
    if(!note){toast('Please describe the medication given.');return;}
    entry={...entry,type:'note',data:{category:'Medication (backdated)',backdated:true},note:'[BACKDATED MED] '+note};
  }

  // Save to the historical logs storage
  const allLogs=load('logs',[]);
  allLogs.push(entry);
  save('logs',allLogs);

  // If it's for today, also update live state
  if(date===todayISO()) S.logs.push(entry);

  S.calBacklogType=null;
  toast(`✓ Backdated ${type} entry saved for ${formatDateNice(date)}`);
  renderPage();
}

function addCalendarEvent(){
  const title=document.getElementById('cal-title')?.value?.trim();
  const time=document.getElementById('cal-time')?.value||'';
  const assignedTo=document.getElementById('cal-assigned')?.value||'';
  const notes=document.getElementById('cal-notes')?.value?.trim()||'';
  if(!title){toast('Please enter an event title.');return;}
  const events=load('calendarEvents',[]);
  const ev={id:'ev'+Date.now(),title,date:S.calSelectedDate,time,assignedTo,notes,createdBy:S.user.name};
  events.push(ev);
  save('calendarEvents',events);
  // Notify assigned caregiver
  if(assignedTo){
    const cg=CAREGIVERS.find(c=>c.name===assignedTo);
    if(cg) addNotif(`📅 You have been assigned: ${title} on ${S.calSelectedDate}${time?' at '+time:''}. ${notes}`,cg.id);
  }
  addNotif('📅 New event: '+(title)+' on '+(S.calSelectedDate)+''+(time?' at '+time:'')+''+(assignedTo?'  -  assigned to '+assignedTo:'')+'. Added by '+(S.user.name)+'.','all');
  toast('Event added'+(assignedTo?' - '+assignedTo+' notified':''));
  renderPage();
}

function deleteCalendarEvent(id){
  if(!confirm('Delete this event?')) return;
  const events=load('calendarEvents',[]).filter(e=>e.id!==id);
  save('calendarEvents',events);
  renderPage();
}

function _wSetPhase(phase){
  _wPhase=phase%4;
  _wCount=_wPhases[_wPhase].c;
  const circle=document.getElementById('w-breath-circle');
  const count=document.getElementById('w-count');
  const label=document.getElementById('w-label');
  const instr=document.getElementById('w-instruction');
  if(circle) circle.style.transform=_wPhases[_wPhase].scale;
  if(count) count.textContent=_wCount;
  if(label) label.textContent=_wPhases[_wPhase].l;
  if(instr) instr.textContent='';
}

function startWellnessBreath(){
  if(_wTimer) clearInterval(_wTimer);
  _wRunning=true;
  _wSetPhase(0);
  _wTimer=setInterval(function(){
    if(!_wRunning) return;
    _wCount--;
    const count=document.getElementById('w-count');
    if(count) count.textContent=_wCount;
    if(_wCount<=0){
      _wSetPhase(_wPhase+1);
    }
  },1000);
}

function stopWellnessBreath(){
  _wRunning=false;
  if(_wTimer){clearInterval(_wTimer);_wTimer=null;}
  stopWellnessSound();
  // Reset UI
  var circle=document.getElementById('w-breath-circle');

}

// -- 4-7-8 BREATHING ANIMATION --
let _478Timer=null, _478Running=false, _478Phase=0, _478Count=0;
// phases: 0=inhale(4), 1=hold(7), 2=exhale(8)
const _478Phases=[
  {label:'Inhale',counts:4,waveY:20,color:'#1D9E75'},
  {label:'Hold',counts:7,waveY:20,color:'#085041'},
  {label:'Exhale',counts:8,waveY:75,color:'#5DCAA5'}
];

var _478CurrentY=70;
var _478TargetY=70;
var _478AnimFrame=null;

function _478AnimateWave(){
  var diff=_478TargetY-_478CurrentY;
  if(Math.abs(diff)<0.5){
    _478CurrentY=_478TargetY;
    _478AnimFrame=null;
    return;
  }
  _478CurrentY+=diff*0.08; // smooth easing
  var y=_478CurrentY;
  var fill=document.getElementById('w478-fill');
  var line=document.getElementById('w478-line');
  var dot=document.getElementById('w478-dot');
  if(fill) fill.setAttribute('d','M0,'+y+' Q80,'+y+' 160,'+y+' Q240,'+y+' 320,'+y+' L320,100 L0,100 Z');
  if(line) line.setAttribute('d','M0,'+y+' Q80,'+y+' 160,'+y+' Q240,'+y+' 320,'+y);
  if(dot) dot.setAttribute('cy',y);
  _478AnimFrame=requestAnimationFrame(_478AnimateWave);
}

function _478SetWave(phaseIdx){
  var ph=_478Phases[phaseIdx];
  _478TargetY=ph.waveY;
  var dot=document.getElementById('w478-dot');
  var lbl=document.getElementById('w478-label');
  var instr=document.getElementById('w478-instruction');
  if(dot) dot.setAttribute('fill',ph.color);
  if(lbl) lbl.textContent=ph.label;
  if(instr) instr.textContent=ph.label+' — '+ph.counts+' counts';
  // Start animation if not running
  if(!_478AnimFrame) _478AnimFrame=requestAnimationFrame(_478AnimateWave);
}

function start478(){
  if(_478Running) return;
  _478Running=true;
  _478Phase=0;
  _478Count=_478Phases[0].counts;
  _478SetWave(0);
  var countEl=document.getElementById('w478-count');
  if(countEl) countEl.textContent=_478Count;
  _478Timer=setInterval(function(){
    if(!_478Running) return;
    _478Count--;
    var countEl=document.getElementById('w478-count');
    if(countEl) countEl.textContent=_478Count>0?_478Count:'→';
    if(_478Count<=0){
      _478Phase=(_478Phase+1)%3;
      _478Count=_478Phases[_478Phase].counts;
      _478SetWave(_478Phase);
    }
  },1000);
}

function stop478(){
  _478Running=false;
  if(_478Timer){clearInterval(_478Timer);_478Timer=null;}
  var countEl=document.getElementById('w478-count');
  var lbl=document.getElementById('w478-label');

function makeWellnessReverb(audioCtx){
  var conv=audioCtx.createConvolver();
  var irLen=Math.floor(audioCtx.sampleRate*2);
  var ir=audioCtx.createBuffer(2,irLen,audioCtx.sampleRate);
  for(var ch=0;ch<2;ch++){
    var d=ir.getChannelData(ch);
    for(var i=0;i<irLen;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/irLen,2.8)*0.55;
  }
  conv.buffer=ir;
  return conv;
}

function startWellnessSound(){
  try{
    _wAudioCtx=new(window.AudioContext||window.webkitAudioContext)();
    var master=_wAudioCtx.createGain();
    master.gain.setValueAtTime(0,_wAudioCtx.currentTime);
    master.gain.linearRampToValueAtTime(S._use528?0.03:0.18,_wAudioCtx.currentTime+4);
    master.connect(_wAudioCtx.destination);
    _wGain=master;

    if(S._use528){
      // 528 Hz ethereal mode with 10 Hz alpha binaural
      var conv=makeWellnessReverb(_wAudioCtx);
      var wet=_wAudioCtx.createGain(); wet.gain.value=0.45;
      conv.connect(wet); wet.connect(master);

      var merger=_wAudioCtx.createChannelMerger(2);
      merger.connect(master);
      merger.connect(conv);

      if(!window._w528Oscs) window._w528Oscs=[];
      function bi528(freq,gain,detune,ch){
        var o=_wAudioCtx.createOscillator(),g=_wAudioCtx.createGain();
        o.type='sine'; o.frequency.value=freq;
        if(detune) o.detune.value=detune;
        g.gain.value=gain;
        o.connect(g); g.connect(merger,0,ch);
        o.start();
        window._w528Oscs.push(o);
      }

      if(S._bilateral528){
        // ADHD bilateral: 528L/518R = 10Hz alpha + 396L/376R = 20Hz beta
        bi528(528,0.42,-2,0); bi528(518,0.42,2,1);
        bi528(396,0.08,0,0);  bi528(376,0.08,0,1);
        bi528(264,0.10,0,0);  bi528(264,0.10,0,1);
        bi528(1056,0.04,1,0); bi528(1056,0.04,-1,1);
      } else {
        // Standard 528 Hz + 10 Hz alpha both ears
        bi528(528,0.44,-2,0); bi528(518,0.44,2,1);
        bi528(264,0.12,0,0);  bi528(264,0.12,0,1);
        bi528(1056,0.04,1,0); bi528(1056,0.04,-1,1);
        bi528(792,0.03,0,0);  bi528(792,0.03,0,1);
      }
    } else {
      // Original singing bowl mode
      var o1=_wAudioCtx.createOscillator();
      var g1=_wAudioCtx.createGain();
      o1.type='sine'; o1.frequency.value=128; g1.gain.value=0.5;
      o1.connect(g1);g1.connect(master); o1.start();

      var o2=_wAudioCtx.createOscillator();
      var g2=_wAudioCtx.createGain();
      o2.type='sine'; o2.frequency.value=192; g2.gain.value=0.25;
      o2.connect(g2);g2.connect(master); o2.start();

      var o3=_wAudioCtx.createOscillator();
      var g3=_wAudioCtx.createGain();
      o3.type='triangle'; o3.frequency.value=256; g3.gain.value=0.12;
      o3.connect(g3);g3.connect(master); o3.start();

      var lfo=_wAudioCtx.createOscillator();
      var lfoGain=_wAudioCtx.createGain();
      lfo.type='sine'; lfo.frequency.value=0.1; lfoGain.gain.value=0.06;
      lfo.connect(lfoGain); lfoGain.connect(master.gain); lfo.start();
    }

    _wSound=true;
  }catch(e){_wSound=false;}
}

function stopWellnessSound(){
  _wSound=false;
  // Stop all 528 oscillators
  if(window._w528Oscs){
    window._w528Oscs.forEach(function(o){try{o.stop();}catch(e){}});
    window._w528Oscs=[];
  }
  try{
    if(_wGain&&_wAudioCtx){
      _wGain.gain.cancelScheduledValues(_wAudioCtx.currentTime);
      _wGain.gain.setValueAtTime(0,_wAudioCtx.currentTime);
    }
  }catch(e){}
  // Close AudioContext immediately — kills all nodes
  try{if(_wAudioCtx){_wAudioCtx.close();}}catch(e){}
  _wAudioCtx=null;_wGain=null;_wOsc=null;
}

function saveActivity(){
  const f=S.activityForm||{};
  const types=f.types||[];
  if(!types.length){toast('Please select at least one activity.');return;}
  if(!f.duration){toast('Please select a duration.');return;}
  if(!f.response){toast('Please select client response.');return;}
  if(!f.perCarePlan){toast('Please confirm this activity is per care plan.');return;}
  const notes=document.getElementById('activity-notes')?.value?.trim()||'';
  const actLabels=types.map(id=>ACTIVITIES.find(a=>a.id===id)?.label||id);
  const entry={id:Date.now(),type:'activity',date:today(),time:now(),
    caregiver:S.user.name,clientId:S.activeClientId,
    data:{
      activityIds:types,
      activityLabel:actLabels.join(', '),
      activityCat:ACTIVITIES.find(a=>a.id===types[0])?.cat||'',
      duration:f.duration,intensity:f.intensity||'light',
      response:f.response,perCarePlan:f.perCarePlan
    },note:notes};
  S.logs.push(entry);
  saveLogs();
  if(f.intensity==='vigorous'){
    addNotif(`💪 Vigorous activity: ${actLabels.join(', ')} (${f.duration}) for ${patientProfile.name||'client'}. Response: ${f.response}. By ${S.user.name}.`,'lead');
  }
  S.activityForm={types:[],duration:'',intensity:'',response:'',notes:'',perCarePlan:true};
  toast(`✓ ${types.length} activit${types.length===1?'y':'ies'} logged  -  per care plan`);
  renderPage();
}

  </div>`}
`;
}

function markAllGiven(logKey,slot){
  if(requiresClockIn()) return;
  
  // Store given-status inside current shift (resets on every new clock-in)
  if(!S.shiftStart) S.shiftStart={medsGiven:{}};
  if(!S.shiftStart.medsGiven) S.shiftStart.medsGiven={};
  if(S.shiftStart.medsGiven[slot]){toast('Already marked as given for this slot.');return;}
  S.shiftStart.medsGiven[slot]={time:now(),by:S.user.name,date:todayISO()};
  save('shiftStart',S.shiftStart);

  const dailyMeds=load(dailyMedsKey(),[]);
  const slotMeds=dailyMeds.filter(m=>m.active&&(
    (slot==='AM'&&m.schedule.includes('AM'))||
    (slot==='Noon'&&(m.schedule.includes('NOON')||m.schedule==='QID'))||
    (slot==='PM'&&(m.schedule.includes('PM')||m.schedule==='QID'))||
    (slot==='Bedtime'&&m.schedule==='bedtime')
  ));

  // Reduce bottle count for each med in this slot
  let alerts=[];
  slotMeds.forEach(m=>{
    if(m.qty!==null&&m.qty!==undefined){
      const current=m.qtyRemaining??m.qty;
      const newQty=Math.max(0,current-1);
      m.qtyRemaining=newQty;
      // Check refill threshold
      if(newQty<=m.refillAt&&newQty>0){
        alerts.push(`REFILL NEEDED: ${m.name}  -  only ${newQty} tablet${newQty!==1?'s':''} remaining. Refill soon.`);
      }
      if(newQty===0){
        alerts.push(`⛔ OUT: ${m.name} has no tablets remaining. Refill immediately.`);
      }
    }
  });
  save(dailyMedsKey(),dailyMeds);

  // Log to daily dose history
  const doseLog=load(dailyDoseKey(),{});
  const dateKey=todayISO()+'-'+slot;
  if(!doseLog[dateKey]) doseLog[dateKey]={};
  slotMeds.forEach(m=>{
    doseLog[dateKey][m.id]={given:true,by:S.user.name,time:now()};
  });
  save(dailyDoseKey(),doseLog);

  // Send alerts
  alerts.forEach(a=>addNotif(a,'all'));
  addNotif('[OK] '+(slot)+' meds given to '+(patientProfile.name||'patient')+' by '+(S.user.name)+' at '+(now())+'.','all');
  toast(`${slot} meds given  -  counts updated`);
  renderPage();
}

function saveRefusal(slot){
  const medSel=document.getElementById('refusal-med-'+slot)?.value;
  const reason=S.refusalReason;
  const note=document.getElementById('refusal-note-'+slot)?.value||'';
  if(!medSel){toast('Please select a medication.');return;}
  if(!reason){toast('Please select a reason.');return;}
  const parts=medSel.split('|');
  const medId=parts[0];const medName=parts[1]||medSel;
  const log=load(pillboxKey(),{});
  const refusalKey=today()+'-refusal-'+slot;
  if(!log[refusalKey]) log[refusalKey]=[];
  log[refusalKey].push({medId,medName,reason,note,time:now(),by:S.user.name,date:today()});
  save(pillboxKey(),log);
  addNotif('[!] REFUSAL: '+(medName)+' ('+(slot)+') refused. Reason: '+(reason)+''+(note?'  -  '+note:'')+'. By '+(S.user.name)+' at '+(now())+'.','all');
  toast('Refusal documented');
  S.refusalSlot=null;S.refusalReason='';
  renderPage();
}

function logMissedMed(){
  if(!S.missedMedId){toast('Please select a medication.');return;}
  if(!S.missedReason){toast('Please select a reason.');return;}
  const note=document.getElementById('missed-note')?.value?.trim()||'';
  const log=load(missedMedKey(),[]);
  log.push({
    id:'missed'+Date.now(),
    date:todayISO(),
    time:now(),
    by:S.user.name,
    clientId:S.activeClientId,
    medId:S.missedMedId,
    medName:S.missedMedName,
    slot:S.missedSlot,
    reason:S.missedReason,
    note
  });
  save(missedMedKey(),log);
  // Alert team
  addNotif('[!] MISSED DOSE: '+(S.missedMedName)+' ('+(S.missedSlot)+') not given to '+(patientProfile.name||'client')+'. Reason: '+(S.missedReason)+'. By '+(S.user.name)+' at '+(now())+'.','all');
  // Reset form
  S.showMissedForm=false;S.missedMedId=null;S.missedMedName='';S.missedReason='';
  toast('Missed dose logged  -  team notified');
  renderPage();
}

function saveDailyMedEdit(medId){
  const meds=load(dailyMedsKey(),[]);
  const idx=meds.findIndex(m=>m.id===medId);
  if(idx<0){toast('Medication not found.');return;}
  meds[idx]={...meds[idx],
    name:document.getElementById('em-name-'+medId)?.value?.trim()||meds[idx].name,
    dose:document.getElementById('em-dose-'+medId)?.value?.trim()||'',
    amountPerDose:document.getElementById('em-amount-'+medId)?.value?.trim()||'1 tablet',
    schedule:document.getElementById('em-sched-'+medId)?.value||meds[idx].schedule,
    qtyRemaining:parseInt(document.getElementById('em-qty-'+medId)?.value)||meds[idx].qtyRemaining,
    notes:document.getElementById('em-notes-'+medId)?.value?.trim()||'',
    editedBy:S.user.name,editedAt:now()
  };
  save(dailyMedsKey(),meds);

  toast('Medication updated');

function removeDailyMed(medId){

function addDailyMed(){
  const nameEl=document.getElementById('dm-name');
  const name=nameEl?.value?.trim();
  const dose=document.getElementById('dm-dose')?.value?.trim()||'';
  const amountPerDose=document.getElementById('dm-amount-per')?.value||'1 tablet';
  const schedule=document.getElementById('dm-schedule')?.value||'AM';
  const startDate=document.getElementById('dm-startdate')?.value||todayISO();
  const supply=parseInt(document.getElementById('dm-qty')?.value)||null;
  const refillAt=14;
  const notes=document.getElementById('dm-notes')?.value?.trim()||'';
  const type=S.dmType||'medication';
  if(!name){toast(`Please enter ${type} name.`);return;}
  const meds=load(dailyMedsKey(),[]);
  meds.push({
    id:'dm'+Date.now(),name,dose,amountPerDose,schedule,
    startDate,supply,qty:supply,qtyRemaining:supply,
    refillAt,notes,active:true,type,
    addedBy:S.user.name
  });
  save(dailyMedsKey(),meds);
  // Stay on addmed page, clear form for another entry
  S.showAddMedInline=false;
  toast(`✓ ${name} added! Add another or tap ← to go back.`);
  // Clear fields for next entry
  setTimeout(function(){
    var fields=['dm-name','dm-dose','dm-amount-per','dm-qty','dm-notes'];
    fields.forEach(function(id){var el=document.getElementById(id);if(el)el.value='';});
    // Reset chip highlights
    document.querySelectorAll('[data-suppidx]').forEach(function(el){
      el.style.background='rgba(91,188,176,0.08)';
      el.style.color='var(--accent-light)';
    });
  },100);
}

function logPillboxFill(medId){
  const input=document.getElementById('fill-'+medId);
  const qty=parseInt(input?.value);
  if(!qty||qty<1){toast('Enter number of pills dispensed.');return;}
  const log=load(dailyDoseKey(),{});
  log[medId]=(log[medId]||0)+qty;
  save(dailyDoseKey(),log);
  const meds=load(dailyMedsKey(),[]);
  const med=meds.find(m=>m.id===medId);
  const remaining=Math.max(0,(med?.supply||0)-log[medId]);
  if(med&&remaining<=(med.refillAt||14)){
    addNotif('[!] '+(med.name)+' running low  -  '+(remaining)+' pills remaining. Refill needed soon.','all');
  }
  toast(`✓ ${qty} pills logged for ${med?.name||'medication'}`);renderPage();
}

function togglePillboxGiven(logKey){

function toggleDailyMedActive(medId){
  const meds=load(dailyMedsKey(),[]);
  const idx=meds.findIndex(m=>m.id===medId);
  if(idx>=0){meds[idx].active=!meds[idx].active;save(dailyMedsKey(),meds);}

function toggleMedManager(userId){

  else managers.push(userId);

  renderPage();
}

function renderSearchResults(q){
  const lq=q.toLowerCase().trim();
  if(!lq) return '';
  const results=[];

  // Search tabs by name/keyword
  const tabMap=[
    {id:'vitals',label:'Vitals',keywords:'blood pressure bp pulse temperature oxygen weight'},
    {id:'meals',label:'Meals',keywords:'breakfast lunch dinner snack food supplements diet'},
    {id:'fluid',label:'Fluids',keywords:'water juice milk tea coffee shake fluid drink'},
    {id:'adl',label:'ADLs',keywords:'bathing dressing grooming mobility fall prevention activities'},
    {id:'hygiene',label:'Hygiene',keywords:'shower bath hair bm bowel movement'},
    {id:'dailymeds',label:'Medications',keywords:'medications medication pill given am pm bedtime pillbox'},
    {id:'meds',label:'Short-term Medications',keywords:'antibiotic prescription medication dose schedule'},
    {id:'log',label:'Daily Log',keywords:'log history entries today'},
    {id:'notes',label:'Notes',keywords:'notes shift handoff message'},
    {id:'notif',label:'Alerts',keywords:'notifications alerts warnings urgent'},
    {id:'calendar',label:'Calendar',keywords:'calendar events appointments schedule lab'},
    {id:'cognitive',label:'Cognitive Tracking',keywords:'cognitive memory behavior mood orientation gait balance fall'},
    {id:'patient',label:'Patient Profile',keywords:'patient profile diagnosis allergies emergency contact doctor'},
    {id:'report',label:'Report',keywords:'report summary shift history export'},
    {id:'diet',label:'Diet Plan',keywords:'diet mediterranean mind dash nutrition food plan'},
    {id:'myprofile',label:'My Profile',keywords:'profile me caregiver hours pay mileage timesheet'}
  ];
  if(hasDiagnosis('parkinsons')) tabMap.push({id:'parkinsons',label:"Parkinson's Tracking",keywords:'parkinsons tremor rigidity voice gait freezing'});
  if(hasDiagnosis('diabetes')||hasDiagnosis('prediabetes')) tabMap.push({id:'diabetes',label:'Glucose / Diabetes',keywords:'glucose blood sugar diabetes insulin fasting bedtime'});

  tabMap.forEach(tab=>{
    if(tab.label.toLowerCase().includes(lq)||tab.keywords.includes(lq)){
      results.push({type:'tab',icon:'ti-layout-grid',label:tab.label,sub:'Go to tab',action:`goTab('${tab.id}');S.showSearch=false;S.searchQuery='';renderShell()`});
    }
  });

  // Search today's logs
  S.logs.forEach(l=>{
    const text=JSON.stringify(l.data||'').toLowerCase()+(l.note||'').toLowerCase()+(l.type||'').toLowerCase();
    if(text.includes(lq)){
      const typeLabel={vitals:'Vitals',meal:'Meal',fluid:'Fluid',adl:'ADL',hygiene:'Hygiene',note:'Note',bm:'BM',shower:'Shower'}[l.type]||l.type;
      results.push({type:'log',icon:'ti-clock',label:typeLabel+'  -  '+l.time,sub:(l.note||JSON.stringify(l.data||'')).slice(0,60),action:`goTab('log');S.showSearch=false;S.searchQuery='';renderShell()`});
    }
  });

  // Search medications
  const meds=load('medications',[]);
  meds.filter(m=>m.active).forEach(m=>{
    if(m.name.toLowerCase().includes(lq)||m.dose.toLowerCase().includes(lq)){
      results.push({type:'med',icon:'ti-pill',label:m.name+' '+m.dose,sub:'Short-term med - '+m.route,action:`goTab('meds');S.showSearch=false;S.searchQuery='';renderShell()`});
    }
  });

  // Search medications
  const dailyMeds=load(dailyMedsKey(),[]);
  dailyMeds.filter(m=>m.active).forEach(m=>{
    if(m.name.toLowerCase().includes(lq)||(m.dose||'').toLowerCase().includes(lq)){
      results.push({type:'dailymed',icon:'ti-pill-off',label:m.name+(m.dose?' '+m.dose:''),sub:'Medication - '+m.schedule,action:`goTab('dailymeds');S.showSearch=false;S.searchQuery='';renderShell()`});
    }
  });

  // Search calendar events
  const events=load('calendarEvents',[]);
  events.forEach(e=>{
    if((e.title||'').toLowerCase().includes(lq)||(e.notes||'').toLowerCase().includes(lq)){
      results.push({type:'event',icon:'ti-calendar',label:e.title,sub:formatDateNice(e.date)+(e.time?' at '+e.time:''),action:`goTab('calendar');S.showSearch=false;S.searchQuery='';renderShell()`});
    }
  });

  if(!results.length) return `
    <div style="padding:20px;text-align:center;color:var(--text3);font-size:13px">
      No results for "<strong>${q}</strong>"
    </div>`;

  return `
  <div style="background:var(--surface);border-bottom:1px solid var(--border);max-height:60vh;overflow-y:auto">
    ${results.slice(0,12).map(r=>`
    <div onclick="${r.action}" style="display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer;active:background:var(--surface2)">
      <i class="ti ${r.icon}" style="font-size:18px;color:var(--accent);flex-shrink:0"></i>
      <div style="flex:1;min-width:0">

      </div>
      <i class="ti ti-chevron-right" style="color:var(--text3);font-size:14px;flex-shrink:0"></i>
    </div>`).join('')}
    ${results.length>12?`<div style="padding:8px;text-align:center;font-size:11px;color:var(--text3)">${results.length-12} more results  -  type more to narrow down</div>`:''}
  </div>`;
}

function renderObsEntry(o, baseline){
  var changes=COG_CATEGORIES.filter(function(cat){return baseline&&o[cat.key]&&baseline[cat.key]&&o[cat.key]!==baseline[cat.key];});
  var isOpen=S.logExpandedDate===o.id;
  var borderColor=changes.length>0?'#e67e22':'var(--border)';
  var headerBg=changes.length>0?'rgba(230,126,34,0.04)':'transparent';
  var changeColor=changes.length>0?'#e67e22':'var(--accent-light)';
  var changeText=changes.length>0?('[!] '+changes.length+' change'+(changes.length>1?'s':'')+' from baseline'):'Consistent with baseline';
  var chevron=isOpen?'ti-chevron-up':'ti-chevron-down';
  var timeStr=formatDateNice(o.date)+' - '+o.time+(o.timeOfDay?' - '+o.timeOfDay:'');
  
  var detail='';
  if(isOpen){
    var catItems=COG_CATEGORIES.filter(function(cat){return o[cat.key];}).map(function(cat){
      var changed=baseline&&baseline[cat.key]&&o[cat.key]!==baseline[cat.key];
      var color=changed?'#e67e22':'var(--text2)';
      return '<div style="font-size:12px;padding:3px 0;color:'+color+'">'+cat.icon+' <strong>'+cat.label+':</strong> '+o[cat.key]+(changed?' <span style="font-size:10px">(was: '+baseline[cat.key]+')</span>':'')+'</div>';
    }).join('');
    var notesHtml=o.notes?'<div style="font-size:12px;color:var(--text2);margin-top:8px;padding:8px;background:var(--surface2);border-radius:4px;font-style:italic">'+o.notes+'</div>':'';
    detail='<div style="border-top:1px solid var(--border);padding:10px 12px">'+catItems+notesHtml+'</div>';
  }
  
  return '<div style="border:1px solid '+borderColor+';border-radius:var(--radius-sm);margin-bottom:8px;overflow:hidden">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 12px;cursor:pointer;background:'+headerBg+'" onclick="S.logExpandedDate=S.logExpandedDate===\''+o.id+'\'?null:\''+o.id+'\';renderPage()">'
    +'<div style="flex:1">'
    +'<div style="font-size:12px;font-weight:600;color:var(--text)">'+timeStr+'</div>'
    +'<div style="font-size:11px;margin-top:2px;color:'+changeColor+'">'+changeText+'</div>'
    +'</div>'
    +'<div style="display:flex;align-items:center;gap:8px">'
    +'<div style="font-size:11px;color:var(--text3)">'+o.by+'</div>'
    +'<i class="ti '+chevron+'" style="color:var(--text3);font-size:16px"></i>'
    +'</div></div>'
    +detail
    +'</div>';
}

function saveBaseline(){
  const cid=S.activeClientId||'default';
  const bl={date:todayISO(),setBy:S.user.name,notes:document.getElementById('bl-notes')?.value||''};
  COG_CATEGORIES.forEach(cat=>{
    const val=document.getElementById('bl-'+cat.key)?.value;
    if(val) bl[cat.key]=val;
  });
  save('cog_baseline_'+cid,bl);
  toast('Baseline saved');
  S.cogSection=null;
  renderPage();
}

function saveCogQuick(status){
  if(requiresClockIn()) return;
  
  const cid=S.activeClientId||'default';
  const obs=load('cog_obs_'+cid,[]);
  obs.push({
    id:Date.now(),date:todayISO(),time:now(),by:S.user.name,
    status:status,
    entries:{},
    note:status==='same'?'Same as baseline — no changes noted':''
  });
  save('cog_obs_'+cid,obs);
  // Also log to condition history
  const history=load('condHistory_'+cid,[]);
  history.push({date:todayISO(),time:now(),condition:'cognitive',status:status,note:'Cognitive status same as baseline',by:S.user.name});
  save('condHistory_'+cid,history);
  toast(status==='same'?'✓ Cognitive status — same as baseline':'Logged');
  S.cogSection=null;
  renderPage();
}

function saveCogObservation(){
  if(requiresClockIn()) return;
  
  const cid=S.activeClientId||'default';
  const obs={id:'cog'+Date.now(),date:todayISO(),time:now(),by:S.user.name,timeOfDay:S.cogTimeOfDay||'',notes:document.getElementById('obs-notes')?.value||''};
  let hasData=false;
  COG_CATEGORIES.forEach(cat=>{
    const val=document.getElementById('obs-'+cat.key)?.value;
    if(val){obs[cat.key]=val;hasData=true;}
  });
  if(!hasData){toast('Please select at least one observation.');return;}
  const observations=load('cog_obs_'+cid,[]);
  observations.push(obs);
  save('cog_obs_'+cid,observations);
  // Check for changes from baseline and alert
  const baseline=load('cog_baseline_'+cid,null);
  if(baseline){
    const changes=COG_CATEGORIES.filter(cat=>obs[cat.key]&&baseline[cat.key]&&obs[cat.key]!==baseline[cat.key]);
    if(changes.length>0){
      addNotif('[!] COGNITIVE CHANGE: '+(patientProfile.name||'Client')+' showing '+(changes.length)+' change'+(changes.length>1?'s':'')+' from baseline  -  '+(changes.map(c=>c.label).join(', '))+'. Logged by '+(S.user.name)+'.','all');
    }
  }
  toast('Observation saved');
  S.cogSection=null;
  S.cogTimeOfDay='';
  S._condObsVals={};
  renderPage();
}

function renderParkinsonsTrendGraph(){
  var cid=S.activeClientId||'default';
  var key='cond_parkinsons_'+cid;
  var obs=load(key+'_obs',[]);
  var baseline=load(key+'_baseline',null);
  if(obs.length<2){
    return '<div style="font-size:12px;color:var(--text3);padding:8px 0">No trend yet. Record at least 2 observations to see the Parkinson\'s trend.</div>';
  }
  var last=obs.slice(-14);
  var cats=PARKINSONS_CONFIG.categories;
  var svgW=300,svgH=80,pad=20;

  var pts=last.map(function(o,i){
    var total=0,good=0;
    cats.forEach(function(cat){
      if(o[cat.key]){
        total++;
        var v=o[cat.key].toLowerCase();
        if(v.indexOf('none')>=0||v.indexOf('mild')>=0||v.indexOf('normal')>=0||v.indexOf('minimal')>=0) good++;
      }
    });
    var score=total>0?good/total:0.5;
    var x=pad+(i/(last.length-1||1))*(svgW-pad*2);
    var y=svgH-pad-(score*(svgH-pad*2));
    return {x:x,y:y,score:score,date:o.date||''};
  });

  var polyline=pts.map(function(p){return p.x+','+p.y;}).join(' ');
  var dots=pts.map(function(p){
    var col=p.score>=0.7?'#9b7fd4':p.score>=0.4?'#e8875a':'var(--danger)';
    return '<circle cx="'+p.x+'" cy="'+p.y+'" r="4" fill="'+col+'"/>'      +'<text x="'+p.x+'" y="'+(p.y-8)+'" text-anchor="middle" font-size="9" fill="var(--text2)">'+p.date.slice(5)+'</text>';
  }).join('');

  var recentScores=pts.slice(-3).map(function(p){return p.score;});
  var avg=recentScores.reduce(function(a,b){return a+b;},0)/(recentScores.length||1);
  var trend=avg>=0.65?'Stable/Improving':avg>=0.4?'Mixed':'Declining';
  var trendCol=avg>=0.65?'#9b7fd4':avg>=0.4?'#e8875a':'var(--danger)';

  return '<div style="margin-top:8px">'    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">'    +'<span style="font-size:12px;font-weight:600;color:var(--text)">Parkinson\'s Trend ('+last.length+' obs)</span>'    +'<span style="font-size:12px;font-weight:700;color:'+trendCol+'">'+trend+'</span>'    +'</div>'    +'<svg width="100%" viewBox="0 0 '+svgW+' '+svgH+'" style="overflow:visible">'    +'<polyline points="'+polyline+'" fill="none" stroke="#9b7fd4" stroke-width="2" stroke-linejoin="round"/>'    +dots+'</svg>'    +'<div style="display:flex;gap:8px;font-size:10px;color:var(--text3);margin-top:4px">'    +'<span style="color:#9b7fd4">● Stable</span>'    +'<span style="color:#e8875a">● Mixed</span>'    +'<span style="color:var(--danger)">● Declining</span>'    +'</div></div>';
}

function renderFallRiskTrendGraph(){
  var cid=S.activeClientId||'default';
  // Fall risk uses condHistory Same/Changed/Improved from condition check-in
  var hist=load('condHistory_'+cid,[]).filter(function(h){
    return h.condition==='fall risk'||h.condition==='Fall Risk'||h.condition==='fallrisk';
  });
  if(hist.length<2){
    return '<div style="font-size:12px;color:var(--text3);padding:8px 0">No Fall Risk trend yet. Record at least 2 condition check-ins to see the trend.</div>';
  }
  var last=hist.slice(-14);
  var scoreMap={'improved':2,'same':1,'change':0,'worsened':0};
  var svgW=300,svgH=80,pad=20;
  var scores=last.map(function(h){return scoreMap[h.status]!==undefined?scoreMap[h.status]:1;});
  var pts=last.map(function(h,i){
    var sc=scoreMap[h.status]!==undefined?scoreMap[h.status]:1;
    var x=pad+(i/(last.length-1||1))*(svgW-pad*2);
    var y=svgH-pad-((sc/2)*(svgH-pad*2));
    return {x:x,y:y,h:h};
  });
  var polyline=pts.map(function(p){return p.x+','+p.y;}).join(' ');
  var colorMap={'improved':'var(--accent)','same':'#e8875a','change':'var(--danger)','worsened':'var(--danger)'};
  var dots=pts.map(function(p){
    var col=colorMap[p.h.status]||'#e8875a';
    return '<circle cx="'+p.x+'" cy="'+p.y+'" r="4" fill="'+col+'"/>'      +'<text x="'+p.x+'" y="'+(p.y-8)+'" text-anchor="middle" font-size="9" fill="var(--text2)">'+p.h.date.slice(5)+'</text>';
  }).join('');
  var recent=scores.slice(-3);
  var avg=recent.reduce(function(a,b){return a+b;},0)/(recent.length||1);
  var trend=avg>=1.5?'Risk Reducing':avg>=0.8?'Stable':'Risk Increasing';
  var trendCol=avg>=1.5?'var(--accent)':avg>=0.8?'#e8875a':'var(--danger)';
  return '<div style="margin-top:8px">'    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">'    +'<span style="font-size:12px;font-weight:600;color:var(--text)">Fall Risk Trend ('+last.length+' readings)</span>'    +'<span style="font-size:12px;font-weight:700;color:'+trendCol+'">'+trend+'</span>'    +'</div>'    +'<svg width="100%" viewBox="0 0 '+svgW+' '+svgH+'" style="overflow:visible">'    +'<polyline points="'+polyline+'" fill="none" stroke="#e8875a" stroke-width="2" stroke-linejoin="round"/>'    +dots+'</svg>'    +'<div style="display:flex;gap:8px;font-size:10px;color:var(--text3);margin-top:4px">'    +'<span style="color:var(--accent)">● Improved</span>'    +'<span style="color:#e8875a">● Stable</span>'    +'<span style="color:var(--danger)">● Increasing</span>'    +'</div></div>';
}


function setCondTOD(condId, val, el){
  // Save to state
  S['cond_'+condId+'_tod']=val;
  // Update chip styles without re-rendering the page
  var chips=el.parentNode.querySelectorAll('.chip');
  chips.forEach(function(c){c.classList.remove('on');});
  el.classList.add('on');
}

function setCogTOD(val, el){
  // Save to state
  S.cogTimeOfDay=val;
  // Update chip styles without re-rendering the page
  var chips=el.parentNode.querySelectorAll('.chip');
  chips.forEach(function(c){c.classList.remove('on');});
  el.classList.add('on');
}
